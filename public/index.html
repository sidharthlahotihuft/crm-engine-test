/* ===== api =============================================================== */
const API_BASE = "";
let TOKEN = localStorage.getItem("huft_token") || null;
const api = {
  async req(method, path, body) {
    const res = await fetch(API_BASE + path, {
      method,
      headers:{"content-type":"application/json",...(TOKEN?{Authorization:"Bearer "+TOKEN}:{})},
      body:body?JSON.stringify(body):undefined,
    });
    if (res.status===401){TOKEN=null;localStorage.removeItem("huft_token");window.location.reload();return;}
    if (!res.ok){const e=await res.json().catch(()=>({}));const err=new Error(e.error||"HTTP "+res.status);err.status=res.status;throw err;}
    return res.json();
  },
  get(p){return this.req("GET",p)},post(p,b){return this.req("POST",p,b)},
  put(p,b){return this.req("PUT",p,b)},del(p){return this.req("DELETE",p)},
};
async function callClaude(system,prompt,expectJson){
  const data=await api.post("/api/generate",{system,prompt});
  const text=data.text||"";
  if(!expectJson)return text;
  const clean=text.replace(/```json|```/g,"").trim();
  const s=clean.search(/[\[{]/);
  return JSON.parse(s>=0?clean.slice(s):clean);
}

// British English grammar/spelling proofread. Returns {hasIssues, issues:[{wrong,right,why}], corrected:{header,body,subject,cta}}
async function grammarCheckCopy(fields){
  const sys=`You are a British English copy editor for HUFT (a premium Indian pet care brand). Proofread the supplied marketing copy.
RULES:
- Enforce British English spelling and conventions (e.g. "flavour" not "flavor", "realise" not "realize", "personalised" not "personalized", "centre" not "center", single quotes for quotations, no Oxford comma unless needed for clarity).
- Fix grammar, punctuation, spacing, capitalisation and obvious typos.
- DO NOT change tone, voice, meaning, line breaks, emoji, bullet markers (✓) or CTA intent. Preserve formatting and structure exactly.
- If the copy is already correct, return hasIssues:false and leave corrected identical to input.
Return ONLY JSON: {"hasIssues":boolean,"issues":[{"wrong":"original phrase","right":"corrected phrase","why":"short reason"}],"corrected":{"subject":"","header":"","body":"","cta":""}}. Include only the fields that were provided in corrected.`;
  const usr=`Proofread these fields:\n${fields.subject!=null?`SUBJECT: ${fields.subject}\n`:""}HEADER: ${fields.header||""}\nBODY: ${fields.body||""}\nCTA: ${fields.cta||""}`;
  return await callClaude(sys,usr,true);
}

const groupByDate=(items)=>{

};

/* ===== TAT + Calendar helpers =========================================== */
const TAT_HOURS={brief:24,content:48,design:48}; // target hours per stage
const fmtDate=(d)=>{if(!d)return"";const dt=new Date(d);return dt.toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"});};
const fmtTime=(ts)=>{if(!ts)return"";const d=new Date(ts);return d.toLocaleDateString("en-IN",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});};
const hoursAgo=(ts)=>ts?Math.round((Date.now()-new Date(ts).getTime())/36e5):null;
const tatStatus=(startedAt,dueAt,done)=>{
  if(done)return{label:"Done",color:"#16A34A",bg:"#DCFCE7"};
  if(!startedAt)return{label:"Not started",color:"#6B7280",bg:"#F3F4F6"};
  const now=Date.now();const due=new Date(dueAt||0).getTime();

  if(h!==null&&h>TAT_HOURS[Object.keys(TAT_HOURS).find(k=>TAT_HOURS[k]===TAT_HOURS.brief)||"brief"])return{label:"Running late",color:"#D97706",bg:"#FEF3C7"};
  return{label:"On track",color:"#0E9488",bg:"#E2F4F1"};
};

▌ BRAND OVERVIEW
HUFT (Heads Up For Tails) — India's leading purpose-led pet care brand. 100+ retail stores, D2C, grooming & spa, nutrition, lifestyle products, and the HUFT Foundation. Founded because the founder couldn't find a thoughtful gift for her Labrador, Sara. That emotional origin informs everything — the warmth, the honesty, the obsession with quality.

▌ NORTH STAR & MISSION
North Star: "Pets are family." Every product, service, and word flows from this. Family isn't defined by species, but by the love we share.
Core Promise: We never compromise on quality. Every product is designed for pets as family — because family deserves only the best.
Mission: Strengthen the bond between pets and their families by providing the best quality of products and services that make the lives of pets happier, healthier and more comfortable at accessible price points.

Endorsed brand structure — each sub-brand has a distinct personality while sharing HUFT's core "For Family" promise.

CRM Emotional Pillars: Importance 40% (make every pet parent feel seen and valued), Trust 30% (honest, reliable, made with love), Edutainment 20% (curious, kind, "did you know?"), Brand Values 10% (born in India, built with kindness).

Caring · Knowledgeable · Honest · Thoughtful · Joyful.

▌ TONE & VOICE
Warm · Human · Empathetic · Trustworthy · Positive · Approachable.

Emotional territory: love, trust, companionship, joy, responsibility, kindness.

▌ VOCABULARY
Words to use: thoughtful, gentle, trusted, honest, real, care, comfort, love, joy, family, better.

Header (image overlay): 2–3 very short punchy lines. Lead with emotion or truth, NOT product name.
Body: 1 warm opener → 3–5 scannable ✓ bullets → short sign-off → one CTA.
Emoji: max 1–2 (🐾 💛 👀 ✓ are preferred). Never decorative strings.
Push: title MAX 50 chars, body MAX 90 chars, one sentence, max 1 emoji.
Email: subject under 50 chars, curiosity or benefit-led. Preheader extends subject, never repeats.

▌ PERFORMANCE AD FRAMEWORKS
• Problem → Relief: Problem / Emotion / HUFT solution / Benefit / CTA
• Pet-first: Pet moment / HUFT solution / Benefit / CTA
• Emotional storytelling: Observation / Emotion / Brand belief / HUFT role / CTA
• Product spotlight: Headline / Hero benefit / Supporting proof / CTA

• Emotional: "Because pets are family" — Love + responsibility

▌ DOG PARENT SEGMENTS
NewDogParent: First-time dog parent, 25–35, urban, slightly anxious, research-heavy. Trigger: new puppy or rescue adoption. Wants: trusted guidance, not overwhelming info. Tone: reassuring, simple, "we've got you."
LoyalistDogParent: 2–5 years with HUFT, buys regularly, emotionally invested in brand. Trigger: new launch, birthday/anniversary, seasonal. Tone: celebratory, insider warmth, "you know us."
HomeCooker: Cooks for dog at home, health-conscious, slightly suspicious of packaged food. Trigger: nutrition concern, vet advice. Tone: validating, educational, "your love is the foundation — Sara's completes it." (Primary Sara's SWF audience.)
KibbleSwitcher: Currently on RC/Farmina/Pedigree, open to upgrade, value-conscious. Trigger: digestion issue, coat concern, price review. Tone: confident, comparative without putting down. (Primary Hearty audience.)
LapsedDogBuyer: Bought 60–180 days ago, no recent purchase. Trigger: win-back, replenishment reminder. Tone: warm re-engagement, "we missed you and [dog name]."
TreatBuyer: Buys treats regularly but not main food. Trigger: low treat stock, new flavour launch. Tone: joyful, taste-first, "reward them well."
HealthAnxiousDogParent: Dog has digestion/skin/allergy issues, actively seeking solutions. Trigger: product education, sensitive care range. Tone: empathetic problem-solver. (Primary Probiotic Chews, Sara's Hypoallergenic.)
SeniorDogParent: Dog is 7+ years. Trigger: joint care, senior nutrition, comfort products. Tone: gentle, responsible, "they've given you everything — now let's care for every stage."

▌ CAT PARENT SEGMENTS
NewCatParent: First cat, 22–32, often rescue/adoption, unsure about nutrition. Wants: clear, simple guidance. Tone: friendly, non-judgemental, "cats are easy when you know what they actually need."
LabelReader: Checks ingredients obsessively, avoids fillers, willing to pay more for clean. Trigger: ingredient education, clean label comparison. Tone: knowledgeable peer-to-peer. (Primary Meowsi audience.)
KibbleCatParent: Feeds dry food only (Farmina, RC, Whiskas dry). Trigger: hydration concern, coat or digestion issue. Tone: "You don't have to replace — just pair with Meowsi."
WetFoodCatParent: Already buys Sheba/Whiskas wet, treats it as a topper or reward. Trigger: upgrade to complete meal. Tone: "Sheba is a snack. Meowsi is a meal."
ValueCatParent: Budget-conscious, currently on Whiskas/Me-O. Trigger: price-quality story. Tone: smart, no-nonsense. (Primary NutriMeow audience.)
LapsedCatBuyer: Bought cat food 60–180 days ago, no recent activity. Trigger: win-back, replenishment. Tone: warm, "your cat misses the good stuff."
MultiCatHome: 2+ cats, feeding cost is real concern, needs reliable daily option. (Primary NutriMeow audience.)

const parseName=(name)=>{
  if(!name)return{date:"",product:"",hook:"",full:"Untitled asset"};
  const parts=name.split("_");
  const dateMatch=parts[0]&&/^[A-Z][a-z]{2}\d{2}$/.test(parts[0]);
  const date=dateMatch?parts[0]:"";
  const rest=dateMatch?parts.slice(1):parts;
  const product=rest[0]||"";
  const hook=rest.slice(1).join(" ");
  return{date,product,hook,full:name};
};
const displayName=(name)=>{
  if(!name)return"Untitled asset";
  const{date,product,hook}=parseName(name);
  if(!date&&!product)return name.replace(/_/g," ");
  return[date,product,hook].filter(Boolean).join(" · ");
};

function CopyBtn({text,label="Copy text",small=true,style}){
  const[done,setDone]=useState(false);
  const doCopy=async(e)=>{
    if(e)e.stopPropagation();
    const t=typeof text==="function"?text():text;
    try{
      if(navigator.clipboard&&navigator.clipboard.writeText){await navigator.clipboard.writeText(t||"");}

function exportBriefTxt(active){
  const b=active.data?.brief||{};
  const proofLines=(b.proofPoints||[]).map(p=>"• "+p);
  const base=[`HUFT CRM BRIEF — ${active.name||"Untitled"}`,``,`Product: ${active.product}  |  Channel: ${active.channel}`,`Segment: ${active.audience||active.segment}  |  Objective: ${active.objective}`,active.offer?`Offer: ${active.offer}`:"",`Pillar: ${b.pillar||"—"}`,``,`STRATEGIC INSIGHT`,b.strategicInsight,``,`THE IDEA`,b.idea,``,`PROOF POINTS`];
  const mid=proofLines;
  const tail=[``,b.copyDirection?`COPY DIRECTION\n${b.copyDirection}`:"",``,b.whatsappNote?`WHATSAPP\n${b.whatsappNote}`:"",
    ...(b.rtbs&&b.rtbs.length?[``,`RTBs IN FOCUS`,...b.rtbs.map(r=>"• "+r)]:[]),
    ...(b.references&&b.references.length?[``,`REFERENCE LINKS`,...b.references.map(r=>"• "+r)]:[]),
    ``,`Generated: ${new Date().toLocaleDateString("en-IN")}`];
  const lines=base.concat(mid).concat(tail).filter(l=>l!==undefined);
  const blob=new Blob([lines.join("\n")],{type:"text/plain"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`${(active.name||"brief").replace(/\s+/g,"_")}.txt`;a.click();
}
function exportDesignBriefTxt(active,copy,approvedPrompt){
  const d=active.data?.design||{};
  const noteLines=(d.notes||[]).map((n,i)=>`${i+1}. ${n}`);
  const libLabel=(d.libraryPickMeta&&d.libraryPickMeta.label)||"Selected library image";
  const imgLines=approvedPrompt?[``,`IMAGE PROMPT (${approvedPrompt.label})`,`Tool: ${approvedPrompt.tool} | Aspect ratio: ${approvedPrompt.aspectRatio}`,``,approvedPrompt.prompt,``,`Negative prompt:`,approvedPrompt.negativePrompt]:[``,`IMAGE: ${libLabel} (from brand image library)`];
  const lines=[`HUFT DESIGN BRIEF — ${active.name||"Untitled"}`,``,`COPY (${copy.direction})`,`Header:`,copy.header,``,`Body:`,copy.body,``,`CTA: ${copy.cta}`,``,`ART DIRECTION`].concat(noteLines).concat(imgLines).concat([``,`Generated: ${new Date().toLocaleDateString("en-IN")}`]);
  const blob=new Blob([lines.join("\n")],{type:"text/plain"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`${(active.name||"design").replace(/\s+/g,"_")}_design-brief.txt`;a.click();
}

// Self-heal legacy data: a Push notification with approved copy needs no design step,
// so it should be "done". Fixes assets created before push-skips-design logic existed.
function normalizeCampaigns(cs){
  return (cs||[]).map(c=>{
    if(c.channel==="Push notification"&&c.stage!=="done"&&c.stage!=="brief"
       &&c.data?.selectedCopyIdx!=null){
      return{...c,stage:"done",design_approver:null,
        went_live_at:c.went_live_at||c.updated_at||new Date().toISOString()};
    }
    return c;
  });
}

/* ===== Monthly Prompt Popup ============================================= */
function MonthlyPrompt({me,campaigns,onClose}){
  const isLastWeek=isLastWeekOfMonth();
  const isFirstWeek=isFirstWeekOfMonth();
  if(!isLastWeek&&!isFirstWeek)return null;

  // Last week — prompt content/design to close out campaigns
  if(isLastWeek&&(me.role==="content"||me.role==="design"||me.role==="admin")){
    const inProgress=campaigns.filter(c=>c.stage!=="done").length;
    if(!inProgress)return null;
    return<div style={{position:"fixed",inset:0,background:"rgba(15,18,30,.5)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:18,padding:28,maxWidth:420,width:"90%",boxShadow:"0 20px 60px rgba(0,0,0,.25)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
          <div style={{width:36,height:36,borderRadius:10,background:C.coralSoft,display:"flex",alignItems:"center",justifyContent:"center"}}><BellIcon size={18}color={C.coral}/></div>
          <div><div style={{fontWeight:800,fontSize:16}}>End of month — wrap it up!</div><div style={{fontSize:12.5,color:C.sub}}>Last week of the month</div></div>
        </div>
        <div style={{fontSize:14,color:C.ink,lineHeight:1.6,marginBottom:16}}>
          You have <b style={{color:C.coral}}>{inProgress} asset{inProgress!==1?"s":""}</b> still in progress. Try to get everything to <b>Ready</b> before the month closes so the business team can upload performance reports.
        </div>
        <div style={{display:"flex",gap:8}}>
          <Btn onClick={onClose}>Got it</Btn>
          <Btn variant="ghost"onClick={onClose}>Remind me tomorrow</Btn>
        </div>
      </div>
    </div>;
  }

  // First week — prompt business team to upload reports
  if(isFirstWeek&&(me.role==="business"||me.role==="admin")){
    const doneWithoutReport=campaigns.filter(c=>c.stage==="done"&&!c.has_report).length;
    if(!doneWithoutReport)return null;
    return<div style={{position:"fixed",inset:0,background:"rgba(15,18,30,.5)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:18,padding:28,maxWidth:420,width:"90%",boxShadow:"0 20px 60px rgba(0,0,0,.25)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
          <div style={{width:36,height:36,borderRadius:10,background:C.tealSoft,display:"flex",alignItems:"center",justifyContent:"center"}}><UploadIcon size={18}color={C.teal}/></div>
          <div><div style={{fontWeight:800,fontSize:16}}>Upload last month's reports</div><div style={{fontSize:12.5,color:C.sub}}>First week of new month</div></div>
        </div>
        <div style={{fontSize:14,color:C.ink,lineHeight:1.6,marginBottom:16}}>
          <b style={{color:C.teal}}>{doneWithoutReport} completed asset{doneWithoutReport!==1?"s":""}</b> from last month still need performance data. Upload reports so the team can see what worked.
        </div>
        <div style={{display:"flex",gap:8}}>
          <Btn variant="teal"onClick={onClose}><UploadIcon size={14}/>Upload reports</Btn>
          <Btn variant="ghost"onClick={onClose}>Later</Btn>
        </div>
      </div>
    </div>;
  }
  return null;
}

/* ===== Performance Report Uploader ====================================== */
function ReportUploader({campaign,me,onUploaded}){
  const[open,setOpen]=useState(false);
  const[metrics,setMetrics]=useState({opens:"",clicks:"",conversions:"",revenue:""});
  const[notes,setNotes]=useState("");
  const[file,setFile]=useState(null);
  const[busy,setBusy]=useState(false);
  const[err,setErr]=useState("");
  const[done,setDone]=useState(false);

  const mf=(k,v)=>setMetrics(m=>({...m,[k]:v}));

  const handleFile=(e)=>{
    const f=e.target.files[0];
    if(!f)return;
    if(f.size>5*1024*1024){setErr("File must be under 5MB");return;}
    const reader=new FileReader();
    reader.onload=(ev)=>setFile({name:f.name,type:f.type,data:ev.target.result.split(",")[1]});
    reader.readAsDataURL(f);
  };

  const submit=async()=>{
    setBusy(true);setErr("");
    try{
      const month=campaign.campaign_month||monthLabel(new Date().toISOString());
      await api.post("/api/reports",{
        campaign_id:campaign.id,
        report_month:month,
        file_name:file?.name||null,
        file_data:file?.data||null,
        file_type:file?.type||null,
        notes,
        metrics:{
          opens:metrics.opens?Number(metrics.opens):null,
          clicks:metrics.clicks?Number(metrics.clicks):null,
          conversions:metrics.conversions?Number(metrics.conversions):null,
          revenue:metrics.revenue?Number(metrics.revenue):null,
        },
      });
      setDone(true);if(onUploaded)onUploaded();
    }catch(e){setErr(e.message);}
    setBusy(false);
  };

  if(done)return<div style={{display:"flex",alignItems:"center",gap:7,color:C.teal,fontSize:13,fontWeight:600,padding:"8px 0"}}><CheckCircle2 size={15}/>Report uploaded — thanks!</div>;

  return<div style={{marginTop:10}}>
    {!open
      ?<button onClick={()=>setOpen(true)}style={{display:"flex",alignItems:"center",gap:6,background:C.tealSoft,border:`1px solid ${C.teal}22`,borderRadius:8,padding:"7px 12px",cursor:"pointer",color:C.teal,fontSize:13,fontWeight:600}}>
        <UploadIcon size={13}/>Upload performance report
      </button>
      :<div style={{background:C.tealSoft,borderRadius:12,padding:14,border:`1px solid ${C.teal}33`}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:12,color:C.teal,display:"flex",alignItems:"center",gap:7}}><UploadIcon size={15}/>Performance Report — {campaign.campaign_month||"this campaign"}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          {[["opens","Opens / Impressions"],["clicks","Clicks"],["conversions","Conversions"],["revenue","Revenue (₹)"]].map(([k,l])=>(
            <div key={k}>
              <div style={{fontSize:11.5,fontWeight:600,color:C.sub,marginBottom:3}}>{l}</div>
              <input value={metrics[k]}onChange={e=>mf(k,e.target.value)}type="number"placeholder="0"
                style={{width:"100%",border:`1px solid ${C.line}`,borderRadius:8,padding:"7px 10px",fontSize:13,boxSizing:"border-box"}}/>
            </div>
          ))}
        </div>
        <Field label="Notes / learnings"textarea value={notes}onChange={setNotes}placeholder="What worked? What didn't? Key takeaway for next time…"rows={2}/>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:11.5,fontWeight:600,color:C.sub,marginBottom:5}}>Attach report file (PDF, image, CSV — max 5MB)</div>
          <input type="file"accept=".pdf,.png,.jpg,.jpeg,.csv,.xlsx"onChange={handleFile}
            style={{fontSize:12.5,color:C.sub}}/>
          {file&&<div style={{fontSize:12,color:C.teal,marginTop:4}}>✓ {file.name} ready to upload</div>}
        </div>
        {err&&<div style={{color:C.coral,fontSize:13,marginBottom:8}}>{err}</div>}
        <div style={{display:"flex",gap:8}}>
          <Btn variant="teal"onClick={submit}disabled={busy}><UploadIcon size={13}/>{busy?"Uploading…":"Upload report"}</Btn>
          <Btn variant="ghost"onClick={()=>setOpen(false)}>Cancel</Btn>
        </div>
      </div>}
  </div>;
}


/* ===== Calendar View ==================================================== */
function CalendarView({campaigns,onOpen,filterStage}){
  const now=new Date();
  const[month,setMonth]=useState(now.getMonth());
  const[year,setYear]=useState(now.getFullYear());

  const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();

  // Group campaigns by created_at date
  const byDate={};
  campaigns.forEach(c=>{
    if(filterStage&&c.stage!==filterStage)return;
    const d=new Date(c.created_at||c.updatedAt||Date.now());
    if(d.getMonth()===month&&d.getFullYear()===year){
      const key=d.getDate();
      if(!byDate[key])byDate[key]=[];
      byDate[key].push(c);
    }
  });

  const stageCol={brief:C.coral,content:C.purple,design:C.teal,done:C.green};

  const prev=()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);};
  const next=()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);};

  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push(null);
  for(let i=1;i<=daysInMonth;i++)cells.push(i);
  while(cells.length%7!==0)cells.push(null);

  const isToday=(d)=>{
    const t=new Date();
    return d===t.getDate()&&month===t.getMonth()&&year===t.getFullYear();
  };

  return<div>
    {/* Month nav */}
    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
      <button onClick={prev}style={{border:`1px solid ${C.line}`,borderRadius:8,padding:"6px 12px",cursor:"pointer",background:"#fff",fontWeight:600}}>←</button>
      <span style={{fontWeight:700,fontSize:16,flex:1,textAlign:"center"}}>{MONTHS[month]} {year}</span>
      <button onClick={next}style={{border:`1px solid ${C.line}`,borderRadius:8,padding:"6px 12px",cursor:"pointer",background:"#fff",fontWeight:600}}>→</button>
    </div>
    {/* Day headers */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:2}}>
      {DAYS.map(d=><div key={d}style={{textAlign:"center",fontSize:11,fontWeight:700,color:C.sub,padding:"4px 0"}}>{d}</div>)}
    </div>
    {/* Calendar grid */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
      {cells.map((d,i)=>{
        const items=d?byDate[d]||[]:[];
        const today=d&&isToday(d);
        return<div key={i}style={{
          minHeight:72,border:`1px solid ${C.line}`,borderRadius:8,padding:4,
          background:today?"#FFF7F5":d?"#fff":"#f9f9f9",
          borderColor:today?C.coral:C.line,
        }}>
          {d&&<div style={{fontSize:11,fontWeight:today?800:500,color:today?C.coral:C.sub,marginBottom:3}}>{d}</div>}
          {items.slice(0,3).map((c,ci)=><div key={ci}
            onClick={()=>onOpen(c.id)}
            style={{
              fontSize:9.5,fontWeight:600,padding:"2px 4px",borderRadius:4,marginBottom:1,
              background:(stageCol[c.stage]||C.sub)+"18",color:stageCol[c.stage]||C.sub,
              cursor:"pointer",lineHeight:1.3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"
            }}
            title={c.product||c.name}
          >{c.product||parseName(c.name).product||"Asset"}</div>)}
          {items.length>3&&<div style={{fontSize:9,color:C.sub}}>+{items.length-3} more</div>}
        </div>;
      })}
    </div>
    <div style={{marginTop:10,fontSize:12,color:C.sub,display:"flex",gap:12,flexWrap:"wrap"}}>
      {Object.entries({brief:"Brief",content:"Copy",design:"Design",done:"Ready"}).map(([k,v])=>(
        <span key={k}style={{display:"flex",alignItems:"center",gap:4}}>
          <span style={{width:8,height:8,borderRadius:2,background:stageCol[k],display:"inline-block"}}/>
          {v}
        </span>
      ))}
      <span style={{color:C.sub}}>· Showing assets by date created</span>
    </div>
  </div>;
}

    })()}
    {me.role==="business"&&(()=>{
      const ready=campaigns.filter(c=>c.stage==="done"&&!isArchived(c));
      return<Card style={{padding:0,overflow:"hidden",marginBottom:18,border:`1.5px solid ${C.green}`}}>
        <div onClick={()=>setTab&&setTab("done")}style={{display:"flex",alignItems:"center",gap:12,padding:"15px 18px",cursor:"pointer",background:C.greenSoft}}>
          <div style={{width:36,height:36,borderRadius:10,background:C.green,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><CheckCircle2 size={19}/></div>
          <div style={{flex:1}}><div style={{fontWeight:800,fontSize:15.5,color:C.ink}}>Assets ready · {ready.length}</div><div style={{fontSize:12.5,color:C.sub}}>{ready.length?"Finalized assets ready to schedule and to log performance.":"Nothing finalized yet."}</div></div>
          <ChevronRight size={20}color={C.green}/>
        </div>
        {ready.slice(0,6).map(c=><div key={c.id}onClick={()=>onOpen(c.id)}style={{display:"flex",alignItems:"center",gap:8,padding:"11px 18px",borderTop:`1px solid ${C.line}`,cursor:"pointer",background:"#fff"}}>
          <span style={{fontWeight:700,fontSize:13.5,color:C.ink}}>{c.product||parseName(c.name).product||c.name}</span>
          <span style={{fontSize:12,color:C.sub}}>· {normCrmType(c.crm_type)} · {c.channel||"WhatsApp"}</span>
          <ChevronRight size={16}color={C.sub}style={{marginLeft:"auto"}}/>
        </div>)}
      </Card>;
    })()}
    {view==="calendar"
      ?<CalendarView campaigns={campaigns}onOpen={onOpen}/>
      :campaigns.length===0?<Card><Empty icon={<LayoutDashboard size={26}color={C.sub}/>}title="No assets yet"sub="Start one and the engine walks it through Brief → Copy → Design."/></Card>
    :<div>
      {pending.length>0&&<div style={{marginBottom:20}}>
        <div style={{fontSize:11,fontWeight:700,color:C.coral,textTransform:"uppercase",letterSpacing:.5,marginBottom:10,display:"flex",alignItems:"center",gap:6}}><ClockIcon size={12}/>Needs attention · {pending.length}</div>
        {groupByDate(pending).map(([date,items])=><div key={date}style={{marginBottom:10}}>
          <DateGroupHeader date={date}count={items.length}color={C.coral}/>
          <Card style={{padding:0,overflow:"hidden"}}>{items.map((c,i)=><CRow key={c.id}c={c}i={i}/>)}</Card>
        </div>)}
      </div>}
      {done.length>0&&<div>
        <div style={{fontSize:11,fontWeight:700,color:C.green,textTransform:"uppercase",letterSpacing:.5,marginBottom:10,display:"flex",alignItems:"center",gap:6}}><CheckCircle2 size={12}/>Completed · {done.length}</div>
        {groupByDate(done).map(([date,items])=><div key={date}style={{marginBottom:10}}>
          <DateGroupHeader date={date}count={items.length}color={C.green}/>
          <Card style={{padding:0,overflow:"hidden",opacity:.88}}>{items.map((c,i)=><CRow key={c.id}c={c}i={i}/>)}</Card>
        </div>)}
      </div>}
    </div>}
  </div>;
}

/* ===== CHAT-STYLE BRIEF INTAKE ========================================== */

function Bubble({from,children}){
  const isBot=from==="bot";
  return<div className="msg-anim"style={{display:"flex",justifyContent:isBot?"flex-start":"flex-end",marginBottom:10,alignItems:"flex-end",gap:8}}>
    {isBot&&<div style={{width:30,height:30,borderRadius:999,background:C.coral,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Bot size={15}/></div>}
    <div style={{maxWidth:"76%",background:isBot?"#fff":C.navy,color:isBot?C.ink:"#fff",borderRadius:isBot?"2px 16px 16px 16px":"16px 2px 16px 16px",padding:"11px 15px",fontSize:14,lineHeight:1.6,boxShadow:isBot?"0 1px 3px rgba(0,0,0,.08)":"none",border:isBot?`1px solid ${C.line}`:"none"}}>
      {children}
    </div>
    {!isBot&&<div style={{width:30,height:30,borderRadius:999,background:C.teal,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:12,fontWeight:700}}>U</div>}
  </div>;
}

function TypingBubble(){
  return<div className="msg-anim"style={{display:"flex",alignItems:"flex-end",gap:8,marginBottom:10}}>
    <div style={{width:30,height:30,borderRadius:999,background:C.coral,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Bot size={15}/></div>
    <div style={{background:"#fff",border:`1px solid ${C.line}`,borderRadius:"2px 16px 16px 16px",padding:"14px 18px",boxShadow:"0 1px 3px rgba(0,0,0,.08)"}}>
      <div className="typing"style={{color:C.sub,display:"flex",alignItems:"center",gap:3}}><span/><span/><span/></div>
    </div>
  </div>;
}

function BriefChat({campaignId,patch,onBriefReady,me,recentFeedback,product}){
  const[messages,setMessages]=useState([]);
  const[stepIdx,setStepIdx]=useState(-1); // -1 = intro not done yet
  const[answers,setAnswers]=useState({});
  const[typing,setTyping]=useState(false);
  const[freeInput,setFreeInput]=useState("");
  const[done,setDone]=useState(false);
  const[generating,setGenerating]=useState(false);
  const[err,setErr]=useState("");
  const[hoveredChip,setHoveredChip]=useState(null);
  const[multiPick,setMultiPick]=useState([]); // staged selections for multi-select / link steps
  const scrollRef=useRef(null);
  const inputRef=useRef(null);

  useEffect(()=>{
    if(scrollRef.current)scrollRef.current.scrollTop=scrollRef.current.scrollHeight;
  },[messages,typing]);

  // Queue helper — prevents state batching issues with sequential bot messages
  const addBotMsg=(content)=>{
    setMessages(m=>[...m,{id:uid(),from:"bot",content}]);
  };
  const addUserMsg=(text)=>{
    setMessages(m=>[...m,{id:uid(),from:"user",content:<span>{text}</span>}]);
  };

  const showTypingThen=(content,delay)=>new Promise(res=>{
    setTyping(true);
    setTimeout(()=>{
      setTyping(false);
      addBotMsg(content);
      setTimeout(res,80);
    },delay||380);
  });

  // Boot: show intro then Q1
  useEffect(()=>{
    showTypingThen(
      <div>
        <div style={{fontWeight:700,marginBottom:4}}>Hey! Let's build your brief 🐾</div>
        <div style={{fontSize:13,color:"#6B7280",lineHeight:1.5}}>I'll walk you through <b>{BRIEF_STEPS.length} quick questions</b>. Tap a quick-reply or type your own — both work. Under 2 minutes to a sharp brief.</div>
      </div>, 700
    ).then(()=>showNextStep(0));
  },[]);

  const showNextStep=(idx)=>{
    if(idx>=BRIEF_STEPS.length){
      // Show summary
      setDone(true);
      return;
    }
    const s=BRIEF_STEPS[idx];
    setStepIdx(idx);
    setMultiPick([]); // reset staged multi-select / links for the new step
    const prog=`${idx+1}/${BRIEF_STEPS.length}`;
    showTypingThen(
      <div>
        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:7}}>
          <span style={{background:C.coralSoft,color:C.coral,fontSize:10,fontWeight:800,padding:"2px 8px",borderRadius:999,letterSpacing:.3}}>{prog}</span>
          <span style={{fontWeight:700,fontSize:14.5}}>{s.question}</span>
        </div>
        {s.hint&&<div style={{fontSize:12.5,color:"#6B7280",lineHeight:1.45,borderLeft:`3px solid ${C.coralSoft}`,paddingLeft:8}}>{s.hint}</div>}
        {s.suggest&&<div style={{marginTop:7,fontSize:12.5,display:"flex",alignItems:"center",gap:5}}><span style={{color:C.teal,fontSize:11}}>💡</span><span style={{color:C.teal,fontWeight:600}}>Suggested:</span><span style={{color:C.ink}}>{s.suggest}</span></div>}
      </div>, 350
    ).then(()=>{ if(inputRef.current)inputRef.current.focus(); });
  };

  const submitAnswer=(val)=>{
    if(!val||!val.trim())return;
    const s=BRIEF_STEPS[stepIdx];
    addUserMsg(val.trim());
    setFreeInput("");
    const newAns={...answers,[s.key]:val.trim()};
    setAnswers(newAns);
    const next=stepIdx+1;
    if(next>=BRIEF_STEPS.length){
      // Show summary bot message then done
      showTypingThen(
        <div>
          <div style={{fontWeight:700,marginBottom:8}}>Got everything I need ✓</div>
          <div style={{display:"grid",gridTemplateColumns:"auto 1fr",gap:"5px 14px",fontSize:13,lineHeight:1.5}}>
            {BRIEF_STEPS.filter(s=>{const v=newAns[s.key];return Array.isArray(v)?v.length:v;}).map(s=><React.Fragment key={s.key}>
              <span style={{color:"#9CA3AF",fontWeight:600,whiteSpace:"nowrap"}}>{s.question.replace("?","")}</span>
              <span style={{fontWeight:600,color:C.ink}}>{(()=>{const v=newAns[s.key];return Array.isArray(v)?v.join(" · "):v;})()||<span style={{color:"#9CA3AF",fontStyle:"italic"}}>skipped</span>}</span>
            </React.Fragment>)}
          </div>
          <div style={{marginTop:10,fontSize:12.5,color:"#6B7280"}}>Tap <b>Generate brief</b> or tap any field above to edit it.</div>
        </div>, 400
      ).then(()=>setDone(true));
    } else {
      showNextStep(next);
    }
  };

  // Shared advance: store answer for current step's key, then move on (or summary)
  const advanceWith=(key,val,label)=>{
    addUserMsg(label);
    const newAns={...answers,[key]:val};
    setAnswers(newAns);
    const next=stepIdx+1;
    if(next>=BRIEF_STEPS.length){
      showTypingThen(
        <div>
          <div style={{fontWeight:700,marginBottom:8}}>Got everything I need ✓</div>
          <div style={{display:"grid",gridTemplateColumns:"auto 1fr",gap:"5px 14px",fontSize:13,lineHeight:1.5}}>
            {BRIEF_STEPS.filter(st=>{const v=newAns[st.key];return Array.isArray(v)?v.length:v;}).map(st=><React.Fragment key={st.key}>
              <span style={{color:"#9CA3AF",fontWeight:600,whiteSpace:"nowrap"}}>{st.question.replace("?","")}</span>
              <span style={{fontWeight:600,color:C.ink}}>{(()=>{const v=newAns[st.key];return Array.isArray(v)?v.join(" · "):v;})()}</span>
            </React.Fragment>)}
          </div>
          <div style={{marginTop:10,fontSize:12.5,color:"#6B7280"}}>Tap <b>Generate brief</b> or tap any field above to edit it.</div>
        </div>, 400
      ).then(()=>setDone(true));
    } else {
      showNextStep(next);
    }
  };

  // Multi-select: toggle a chip in the staged list
  const toggleMulti=(val)=>{
    setMultiPick(prev=>prev.includes(val)?prev.filter(x=>x!==val):[...prev,val]);
  };
  // Multi-select / links: add a custom typed entry
  const addCustomMulti=(val)=>{
    const v=(val||"").trim();
    if(!v)return;
    setMultiPick(prev=>prev.includes(v)?prev:[...prev,v]);
    setFreeInput("");
  };
  // Confirm a multi-select / links step with the staged picks
  const confirmMulti=()=>{
    const s=BRIEF_STEPS[stepIdx];
    const picks=[...multiPick];
    setMultiPick([]);
    const label=picks.length?picks.join(" · "):"(none)";
    advanceWith(s.key,picks,label);
  };

  const skip=()=>{
    const s=BRIEF_STEPS[stepIdx];
    if(!s||!s.optional)return;
    addUserMsg("(skip)");
    const newAns={...answers,[s.key]:(s.multiSelect||s.linkInput)?[]:""};
    setAnswers(newAns);
    const next=stepIdx+1;
    if(next>=BRIEF_STEPS.length){
      setDone(true);
    } else {
      showNextStep(next);
    }
  };

  const editAnswer=(key)=>{
    const idx=BRIEF_STEPS.findIndex(s=>s.key===key);
    const s=BRIEF_STEPS[idx];
    setDone(false);
    if(s&&(s.multiSelect||s.linkInput)){const v=answers[key];setMultiPick(Array.isArray(v)?[...v]:[]);}
    showTypingThen(
      <div><span style={{color:"#9CA3AF"}}>Sure — let's update:</span><br/><b>{BRIEF_STEPS[idx].question}</b></div>,200
    ).then(()=>setStepIdx(idx));
  };

  const startOver=()=>{
    setDone(false);setAnswers({});setFreeInput("");setErr("");setGenerating(false);
    setMessages([]);
    setTimeout(()=>{
      showTypingThen(<div><div style={{fontWeight:700,marginBottom:4}}>Starting fresh 🔄</div><div style={{fontSize:13,color:"#6B7280"}}>{BRIEF_STEPS.length} questions, same drill. Go.</div></div>,300).then(()=>showNextStep(0));
    },100);
  };

  const generateBrief=async()=>{
    setGenerating(true);setErr("");
    addBotMsg(<div style={{display:"flex",alignItems:"center",gap:9,color:C.coral,fontWeight:600}}><Loader2 size={15}style={{animation:"spin 1s linear infinite"}}/>Writing your brief…</div>);
    try{
      const fb=recentFeedback("brief");
      const sys=`You write tight WhatsApp CRM creative briefs for HUFT.\n${BRAND_CONTEXT}\n${fb?"Recent team feedback on Brief generations (incorporate):\n"+fb:""}\nReturn ONLY JSON:\n{"campaignName":"MonYY_Product_Hook_AudienceCode e.g. Jun26_Meowsi_Winback_LapsedCat","strategicInsight":"1-2 sharp lines: the consumer truth/trigger","idea":"single-minded message in one line","proofPoints":["3 short proof points"],"pillar":"Trust|Importance|Edutainment|Brand Values","copyDirection":"1-2 lines specific copy direction for WhatsApp CRM","whatsappNote":"one line channel/format direction"}`;
      const rtbList=(answers.rtbs||[]).filter(Boolean);
      const refList=(answers.references||[]).filter(Boolean);
      const usr=`CRM type: ${answers.crmType||"D2C"}\nChannel: ${answers.channel||"WhatsApp"}\nProduct/Brand: ${answers.product||""}\nPillar: ${answers.pillar||"Importance"}\nAudience/Trigger: ${answers.audience||""}\nObjective: ${answers.objective||""}\nOffer: ${answers.offer||"none"}\nHook/Angle: ${answers.hook||"derive"}\nRTBs to focus on (use these as proof points, weave into copy): ${rtbList.length?rtbList.join("; "):"derive from product"}\nReference links (context for copy & design — honour their tone/direction): ${refList.length?refList.join(" , "):"none"}\nGo-live date: ${answers.go_live_date||"not set"}`;
      const j=await callClaude(sys,usr,true);
      // If user picked RTBs, prefer them as the proof points
      if(rtbList.length)j.proofPoints=rtbList;
      // Calculate TAT deadlines from now
      const now=Date.now();
      const briefDue=new Date(now+TAT_HOURS.brief*36e5).toISOString();
      const contentDue=new Date(now+(TAT_HOURS.brief+TAT_HOURS.content)*36e5).toISOString();
      const designDue=new Date(now+(TAT_HOURS.brief+TAT_HOURS.content+TAT_HOURS.design)*36e5).toISOString();
      const glDate=answers.go_live_date||null;
      const isRetail=answers.crmType==="Retail";
      const channel=isRetail?"WhatsApp":(answers.channel||"WhatsApp");
      patch(campaignId,{
        name:j.campaignName,channel,product:answers.product||"", // naming convention stored as-is, displayName() makes it readable
        audience_label:answers.audience||"",segment:answers.audience||"",objective:answers.objective||"",
        offer:answers.offer||"",crm_type:answers.crmType||"D2C",
        go_live_date:glDate,
        campaign_week:glDate?weekOfMonth(glDate):null,
        campaign_month:glDate?monthLabel(glDate):null,
        tat_brief_due:briefDue,tat_content_due:contentDue,tat_design_due:designDue,
        brief_started_at:new Date(now).toISOString(),
        rtbs:rtbList,references:refList,
        data:{brief:{...j,rtbs:rtbList,references:refList,source:"chat"}},
        stage:"content",
      });
      onBriefReady();
    }catch(e){setErr("Couldn't generate — check the connection and try again.");setGenerating(false);}
  };

  const curStep=stepIdx>=0?BRIEF_STEPS[stepIdx]:null;
  const isWaiting=typing||generating;

  return<div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 180px)",minHeight:500,maxHeight:700}}>

    {/* Progress bar */}
    {stepIdx>=0&&<div style={{height:3,background:C.line,borderRadius:3,marginBottom:0,flexShrink:0}}>
      <div style={{height:"100%",background:`linear-gradient(90deg,${C.coral},${C.orange||"#FF8C42"})`,borderRadius:3,width:`${Math.min(100,((stepIdx)/(BRIEF_STEPS.length))*100)}%`,transition:"width .4s ease"}}/>
    </div>}

    {/* Chat messages */}
    <div ref={scrollRef}style={{flex:1,overflowY:"auto",padding:"16px 4px 8px",display:"flex",flexDirection:"column"}}>
      {messages.map(m=><Bubble key={m.id}from={m.from}>{m.content}</Bubble>)}
      {typing&&<TypingBubble/>}
    </div>

    {/* ── BOTTOM INPUT ZONE ──────────────────────────────── */}
    {!done&&!generating&&curStep&&!typing&&(
      <div style={{borderTop:`1px solid ${C.line}`,paddingTop:12,flexShrink:0}}>

        {/* Date picker — for calendar steps */}
        {curStep.dateInput&&(
          <div style={{marginBottom:10}}>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,background:"#fff",border:`1.5px solid ${C.line}`,borderRadius:12,padding:"8px 14px"}}>
                <CalendarIcon size={15}color={C.coral}/>
                <input type="date" value={freeInput}onChange={e=>setFreeInput(e.target.value)}
                  min={new Date().toISOString().slice(0,10)}
                  style={{border:"none",outline:"none",fontSize:14,color:C.ink,background:"transparent"}}/>
              </div>
              <Btn small onClick={()=>{if(freeInput)submitAnswer(freeInput);}} disabled={!freeInput}>
                <Check size={13}/>Confirm date
              </Btn>
              {curStep.optional&&<button onClick={skip}style={{padding:"5px 13px",borderRadius:20,fontSize:12.5,fontWeight:600,cursor:"pointer",border:`1.5px dashed ${C.line}`,background:"transparent",color:C.sub}}>Skip →</button>}
            </div>
            {freeInput&&<div style={{marginTop:6,fontSize:12.5,color:C.teal,display:"flex",alignItems:"center",gap:5}}><CalendarIcon size={11}/>Live date: <b>{fmtDate(freeInput)}</b> · {weekOfMonth(freeInput)} · {monthLabel(freeInput)}</div>}
          </div>
        )}

        {/* Multi-select (RTBs) / link input — staged picks + custom add */}
        {(curStep.multiSelect||curStep.linkInput)&&(
          <div style={{marginBottom:10}}>
            {/* Selectable option chips (RTBs resolved from product) */}
            {curStep.multiSelect&&(()=>{
              const lib=curStep.optionsFromProduct?rtbsForProduct(answers.product||product):(curStep.options||[]);
              const all=[...new Set([...lib,...multiPick])];
              return <div style={{display:"flex",flexWrap:"wrap",gap:6,maxHeight:140,overflowY:"auto",marginBottom:8}}>
                {all.map(o=>{const on=multiPick.includes(o);return(
                  <button key={o}onClick={()=>toggleMulti(o)}
                    style={{padding:"6px 12px",borderRadius:20,fontSize:12.5,fontWeight:600,cursor:"pointer",
                      border:`1.5px solid ${on?C.purple:C.line}`,background:on?"#F3E8FF":"#fff",
                      color:on?C.purple:C.ink,display:"flex",alignItems:"center",gap:5,flexShrink:0,transition:"all .1s"}}>
                    {on?<CheckCircle2 size={13}/>:<Plus size={13}/>}{o}
                  </button>
                );})}
              </div>;
            })()}

            {/* Staged links list */}
            {curStep.linkInput&&multiPick.length>0&&(
              <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:8}}>
                {multiPick.map(l=>(
                  <div key={l}style={{display:"flex",alignItems:"center",gap:8,background:"#F8FAFC",border:`1px solid ${C.line}`,borderRadius:9,padding:"6px 10px"}}>
                    <LinkIcon size={13}color={C.teal}/>
                    <span style={{flex:1,fontSize:12.5,color:C.ink,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l}</span>
                    <button onClick={()=>setMultiPick(p=>p.filter(x=>x!==l))}style={{border:"none",background:"none",cursor:"pointer",color:C.sub,display:"flex"}}><X size={14}/></button>
                  </div>
                ))}
              </div>
            )}

            {/* Custom add row */}
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
              <input ref={inputRef}
                value={freeInput}
                onChange={e=>setFreeInput(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter"&&freeInput.trim())addCustomMulti(freeInput);}}
                placeholder={curStep.placeholder||"Add and press enter…"}
                style={{flex:1,border:`1.5px solid ${C.line}`,borderRadius:24,padding:"9px 16px",fontSize:14,boxSizing:"border-box",outline:"none",background:"#fff"}}
                onFocus={e=>e.target.style.borderColor=C.purple}
                onBlur={e=>e.target.style.borderColor=C.line}/>
              <button onClick={()=>{if(freeInput.trim())addCustomMulti(freeInput);}}disabled={!freeInput.trim()}
                style={{width:40,height:40,borderRadius:999,border:"none",cursor:freeInput.trim()?"pointer":"default",background:freeInput.trim()?C.purple:"#E5E7EB",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <Plus size={16}color="#fff"/>
              </button>
            </div>

            {/* Confirm / skip */}
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <Btn small onClick={confirmMulti}>
                <Check size={13}/>{multiPick.length?`Confirm ${multiPick.length} selected`:"Continue"}
              </Btn>
              {curStep.optional&&<button onClick={skip}style={{padding:"5px 13px",borderRadius:20,fontSize:12.5,fontWeight:600,cursor:"pointer",border:`1.5px dashed ${C.line}`,background:"transparent",color:C.sub}}>Skip →</button>}
            </div>
          </div>
        )}

        {/* Quick-reply chips — shown if options exist */}
        {!curStep.dateInput&&!curStep.multiSelect&&!curStep.linkInput&&curStep.options&&(
          <div style={{marginBottom:10}}>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,maxHeight:90,overflowY:"auto",paddingBottom:2}}>
              {(()=>{
                let opts=curStep.options;
                if(curStep.filterByProduct)opts=curStep.filterByProduct(answers.product||product)||curStep.options;
                if(curStep.filterByAudience)opts=curStep.filterByAudience(answers.audience||answers.segment)||opts;
                return opts;
              })().map(o=>(
                <button key={o}
                  onClick={()=>submitAnswer(o)}
                  onMouseEnter={()=>setHoveredChip(o)}
                  onMouseLeave={()=>setHoveredChip(null)}
                  style={{
                    padding:"5px 13px",borderRadius:20,fontSize:12.5,fontWeight:600,cursor:"pointer",
                    border:`1.5px solid ${hoveredChip===o?C.coral:C.line}`,
                    background:hoveredChip===o?C.coralSoft:"#fff",
                    color:hoveredChip===o?C.coral:C.ink,
                    transition:"all .1s",flexShrink:0,
                  }}>
                  {o}
                </button>
              ))}
              {curStep.optional&&(
                <button onClick={skip}style={{padding:"5px 13px",borderRadius:20,fontSize:12.5,fontWeight:600,cursor:"pointer",border:`1.5px dashed ${C.line}`,background:"transparent",color:C.sub,flexShrink:0}}>
                  Skip →
                </button>
              )}
            </div>
            {curStep.options.length>6&&<div style={{fontSize:11,color:C.sub,marginTop:3}}>↕ scroll to see all options</div>}
          </div>
        )}

        {/* Text input — shown for non-date steps */}
        {!curStep.dateInput&&!curStep.multiSelect&&!curStep.linkInput&&(
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <input ref={inputRef}
              value={freeInput}
              onChange={e=>setFreeInput(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&freeInput.trim()){submitAnswer(freeInput);}}}
              placeholder={curStep.options?"Or type a custom answer…":(curStep.placeholder||"Type your answer…")}
              style={{flex:1,border:`1.5px solid ${C.line}`,borderRadius:24,padding:"10px 16px",fontSize:14,boxSizing:"border-box",outline:"none",background:"#fff",transition:"border-color .15s"}}
              onFocus={e=>e.target.style.borderColor=C.coral}
              onBlur={e=>e.target.style.borderColor=C.line}
            />
            <button
              onClick={()=>{if(freeInput.trim())submitAnswer(freeInput);}}
              disabled={!freeInput.trim()}
              style={{
                width:40,height:40,borderRadius:999,border:"none",cursor:freeInput.trim()?"pointer":"default",
                background:freeInput.trim()?C.coral:"#E5E7EB",
                display:"flex",alignItems:"center",justifyContent:"center",
                flexShrink:0,transition:"background .15s",
              }}>
              <Send size={16}color="#fff"/>
            </button>
          </div>
        )}

        {curStep.suggest&&!curStep.options&&!curStep.dateInput&&(
          <button
            onClick={()=>submitAnswer(curStep.suggest)}
            style={{marginTop:7,background:"none",border:"none",cursor:"pointer",color:C.teal,fontSize:12.5,display:"flex",alignItems:"center",gap:5,padding:0}}>
            <Lightbulb size={12}/>Use suggested: <b>{curStep.suggest}</b>
          </button>
        )}
      </div>
    )}

    {/* Done / summary footer */}
    {done&&!generating&&(
      <div style={{borderTop:`1px solid ${C.line}`,paddingTop:12,flexShrink:0}}>
        {err&&<div style={{color:C.coral,fontSize:13,marginBottom:8,display:"flex",alignItems:"center",gap:6}}><AlertCircle size={14}/>{err}</div>}
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",marginBottom:8}}>
          <Btn onClick={generateBrief}><Sparkles size={15}/>Generate brief</Btn>
          <Btn variant="ghost"onClick={startOver}><RotateCcw size={13}/>Start over</Btn>
        </div>
        {/* Edit pills */}
        <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
          {BRIEF_STEPS.filter(s=>answers[s.key]!==undefined).map(s=>(
            <button key={s.key}onClick={()=>editAnswer(s.key)}
              style={{background:C.paper,border:`1px solid ${C.line}`,borderRadius:6,padding:"3px 9px",fontSize:11.5,color:C.sub,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
              <PenLine size={10}/>{s.key}: <b style={{color:C.ink,maxWidth:90,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"inline-block"}}>{answers[s.key]||"—"}</b>
            </button>
          ))}
        </div>
      </div>
    )}

    {generating&&<div style={{borderTop:`1px solid ${C.line}`,paddingTop:12}}><Spin label="Writing your brief…"/></div>}
  </div>;
}

// AlertCircle icon (needed in BriefChat)
const AlertCircle=p=><Svg{...p}><circle cx="12"cy="12"r="10"/><path d="M12 8v4M12 16h.01"/></Svg>;

/* ===== Brief Tab ======================================================== */
function BriefTab({active,patch,setTab,me,recentFeedback,saveFeedback,campaigns,onOpen,onDelete,onNew,onBulkImport,toast}){
  const[view,setView]=useState("list");
  const canCreate=me.role==="admin"||me.role==="business";
  const[importing,setImporting]=useState(false); // false | "open" | "working" | "done"
  const[importRows,setImportRows]=useState([]);
  const[importProg,setImportProg]=useState({done:0,total:0});
  const[importResult,setImportResult]=useState(null);
  const[importErr,setImportErr]=useState("");
  const allBriefs=(campaigns||[]).filter(c=>c.stage==="brief"&&!isArchived(c));
  const briefedElsewhere=(campaigns||[]).filter(c=>c.stage!=="brief"&&!isArchived(c)&&c.data?.brief).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  const briefArchived=(campaigns||[]).filter(c=>isArchived(c)&&c.data?.brief).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  const done=(campaigns||[]).filter(c=>c.stage!=="brief"&&c.data?.brief);
  const[openId,setOpenId]=useState(null);
  const[mode,setMode]=useState({}); // {[id]: 'view'|'chat'|'self'|'edit'}
  const[genMap,setGenMap]=useState({}); // track generating per id

  // Parse uploaded .xlsx/.csv into normalised brief rows
  const parseImportFile=(file)=>{
    setImportErr("");
    const reader=new FileReader();
    reader.onload=(e)=>{
      try{
        if(typeof XLSX==="undefined"){setImportErr("Spreadsheet library still loading — try again in a moment.");return;}
        const wb=XLSX.read(e.target.result,{type:"binary"});
        const sheet=wb.Sheets[wb.SheetNames.includes("Briefs")?"Briefs":wb.SheetNames[0]];
        const raw=XLSX.utils.sheet_to_json(sheet,{header:1,blankrows:false});
        // Find the header row (the one containing "Product")
        const hdrIdx=raw.findIndex(r=>r.some(c=>String(c).trim().toLowerCase()==="product"));
        if(hdrIdx<0){setImportErr("Couldn't find a header row with a 'Product' column. Use the provided template.");return;}
        const headers=raw[hdrIdx].map(c=>String(c||"").trim().toLowerCase());
        const col=(name)=>headers.findIndex(h=>h===name);
        const map={crmType:col("crm type"),channel:col("channel"),product:col("product"),pillar:col("pillar"),audience:col("audience"),objective:col("objective"),offer:col("offer"),hook:col("hook / angle"),rtbs:col("rtbs"),references:col("reference links"),goLive:col("go live date")};
        const splitList=(v)=>String(v||"").split(/[;\n]/).map(x=>x.trim()).filter(Boolean);
        const fmtDate=(v)=>{
          if(!v)return"";
          if(v instanceof Date)return v.toISOString().slice(0,10);
          if(typeof v==="number"){const d=XLSX.SSF?XLSX.SSF.parse_date_code(v):null;if(d)return`${d.y}-${String(d.m).padStart(2,"0")}-${String(d.d).padStart(2,"0")}`;}
          return String(v).trim();
        };
        const rows=[];
        for(let i=hdrIdx+1;i<raw.length;i++){
          const r=raw[i];if(!r||!r.length)continue;
          const get=(k)=>map[k]>=0?r[map[k]]:undefined;
          const product=String(get("product")||"").trim();
          // skip example row and blanks
          if(!product)continue;
          if(String(get("goLive")||"").includes("example"))continue;
          rows.push({
            crmType:String(get("crmType")||"D2C").trim(),
            channel:String(get("channel")||"WhatsApp").trim(),
            product,
            pillar:String(get("pillar")||"").trim(),
            audience:String(get("audience")||"").trim(),
            objective:String(get("objective")||"").trim(),
            offer:String(get("offer")||"").trim(),
            hook:String(get("hook")||"").trim(),
            rtbs:splitList(get("rtbs")),
            references:splitList(get("references")),
            goLive:fmtDate(get("goLive")),
          });
        }
        if(!rows.length){setImportErr("No brief rows found. Make sure rows have a Product and you've removed the example row.");return;}
        const bad=rows.filter(r=>!r.product||!r.audience||!r.objective);
        setImportRows(rows);
        setImportResult(null);
        if(bad.length)setImportErr(`${bad.length} row(s) are missing Audience or Objective — those may produce weaker briefs.`);
      }catch(err){setImportErr("Couldn't read the file: "+(err.message||"unknown error"));}
    };
    reader.readAsBinaryString(file);
  };

  const runImport=async()=>{
    setImporting("working");setImportProg({done:0,total:importRows.length});
    const res=await onBulkImport(importRows,(done,total)=>setImportProg({done,total}));
    setImportResult(res);setImporting("done");
    if(res.created&&toast)toast(`${res.created} brief${res.created>1?"s":""} imported ✓`,"success");
  };

  const downloadTemplate=()=>{
    // Build the template client-side with SheetJS so it's always available
    if(typeof XLSX==="undefined"){if(toast)toast("Spreadsheet library still loading — try again","error");return;}
    const headers=["CRM Type","Channel","Product","Pillar","Audience","Objective","Offer","Hook / Angle","RTBs","Reference Links","Go Live Date"];
    const example=["D2C","WhatsApp","Sara's Wholesome Food","Importance","First-time buyers","Conversion (first purchase)","none","the dinner-bowl routine","Slow-cooked; 0% preservatives","https://headsupfortails.com/saras","2026-07-01"];
    const ws=XLSX.utils.aoa_to_sheet([headers,example]);
    ws["!cols"]=headers.map(()=>({wch:22}));
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Briefs");
    XLSX.writeFile(wb,"HUFT_Brief_Upload_Template.xlsx");
  };

  React.useEffect(()=>{
    if(active?.id)setOpenId(active.id);
  },[active?.id]);

  const getMode=(c)=>mode[c.id]||(c.data?.brief?"view":null);
  const setM=(id,m)=>setMode(x=>({...x,[id]:m}));

  const AssetRow=({c})=>{
    const isOpen=openId===c.id;
    const brief=c.data?.brief;
    const m=getMode(c);
    const onBriefReady=()=>{
      setM(c.id,"view");
      patch(c.id,{stage:"content"});
    };
    const _tone=!brief?ROW_TONE.attention:(c.stage==="done"?ROW_TONE.done:ROW_TONE.approved);
    return<div style={{borderBottom:`1px solid ${C.line}`,borderLeft:`4px solid ${_tone.bar}`}}>
      {/* Row header — always visible */}
      <div onClick={()=>setOpenId(isOpen?null:c.id)}
        style={{display:"flex",alignItems:"center",gap:12,padding:"14px 18px",cursor:"pointer",background:isOpen?"#FFFBF7":(brief?_tone.bg:"#fff")}}>
        <ChannelIcon channel={c.channel}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}>
            <span style={{fontWeight:800,fontSize:14,color:C.ink}}>{c.product||parseName(c.name).product||"—"}</span>
            <span style={{fontSize:11,fontWeight:700,color:C.coral}}>{normCrmType(c.crm_type)}</span>
            <span style={{fontSize:11,fontWeight:700,color:C.teal}}>· {c.channel||"WhatsApp"}</span>
          </div>
          <div style={{fontSize:12,color:C.sub,display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
            {parseName(c.name).date&&<span style={{fontWeight:600,color:C.ink}}>{parseName(c.name).date}</span>}
            {parseName(c.name).hook&&<span>{parseName(c.name).hook.replace(/_/g," ")}</span>}
            {c.audience_label&&<span>· {c.audience_label}</span>}
            {c.created_at&&<span style={{marginLeft:"auto",fontSize:11,color:C.sub,background:"#F3F4F6",padding:"2px 7px",borderRadius:5,flexShrink:0}}>{fmtDate(c.created_at)}</span>}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
          {brief&&<span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11,fontWeight:700,color:"#0F766E",background:"#CCFBF1",padding:"3px 9px",borderRadius:999}}><CheckCircle2 size={11}/>Brief done</span>}
          {brief&&c.stage!=="brief"&&<StageBadge stage={c.stage}/>}
          {!brief&&<span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11,fontWeight:700,color:"#B91C1C",background:"#FEF2F2",padding:"3px 9px",borderRadius:999}}>No brief yet</span>}
          <div onClick={e=>e.stopPropagation()}><RowActions c={c}patch={patch}me={me}onEdit={brief?()=>setM(c.id,"edit"):undefined}onDelete={onDelete}/></div>
          {isOpen?<ChevronDown size={16}color={C.sub}/>:<ChevronRight size={16}color={C.sub}/>}
        </div>
      </div>

      {/* Expanded content */}
      {isOpen&&<div style={{padding:"0 18px 18px",background:"#FFFBF7"}}>
        {/* Mode picker */}
        {!brief&&!m&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          <div onClick={()=>setM(c.id,"chat")}style={{border:`2px solid ${C.coral}`,borderRadius:12,padding:14,cursor:"pointer",background:C.coralSoft}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:3}}><Bot size={14}color={C.coral}/> Chat with engine</div>
            <div style={{fontSize:12.5,color:"#7D3D24"}}>8 guided questions → AI writes the brief</div>
          </div>
          <div onClick={()=>setM(c.id,"self")}style={{border:`1px solid ${C.line}`,borderRadius:12,padding:14,cursor:"pointer",background:"#fff"}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:3}}><PenLine size={14}/> Write it myself</div>
            <div style={{fontSize:12.5,color:C.sub}}>Fill in the brief directly</div>
          </div>
        </div>}

        {m==="chat"&&!brief&&<div style={{background:"#fff",borderRadius:12,border:`1px solid ${C.line}`,overflow:"hidden",marginBottom:14}}>
          <div style={{background:C.navy,color:"#fff",padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontWeight:700,fontSize:13}}><Bot size={14}color={C.coral}/> Brief Builder</span>
            <button onClick={()=>setM(c.id,null)}style={{background:"transparent",border:"none",cursor:"pointer",color:"rgba(255,255,255,.6)",fontSize:12}}>← Back</button>
          </div>
          <div style={{padding:"0 16px 16px"}}>
            <BriefChat campaignId={c.id}patch={patch}onBriefReady={onBriefReady}me={me}recentFeedback={recentFeedback}product={c.product}/>
          </div>
        </div>}

        {m==="self"&&!brief&&<div style={{background:"#fff",borderRadius:12,padding:14,border:`1px solid ${C.line}`,marginBottom:14}}>
          <SelfBriefForm active={c}patch={patch}onDone={()=>setM(c.id,"view")}onBack={()=>setM(c.id,null)}/>
        </div>}

        {m==="edit"&&brief&&<div style={{background:"#fff",borderRadius:12,padding:14,border:`1px solid ${C.line}`,marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:12,display:"flex",alignItems:"center",gap:7}}><PenLine size={14}color={C.coral}/>Edit brief</div>
          <EditBriefForm brief={brief}active={c}patch={patch}onDone={()=>setM(c.id,"view")}/>
        </div>}

        {m==="view"&&brief&&<div style={{marginBottom:14}}>
          {/* Idea */}
          <div style={{background:"#fff",borderRadius:12,padding:"12px 14px",border:`1px solid ${C.line}`,borderLeft:`3px solid ${C.coral}`,marginBottom:8}}>
            <div style={{fontSize:10.5,fontWeight:700,color:C.coral,textTransform:"uppercase",letterSpacing:.5,marginBottom:3}}>The idea</div>
            <div style={{fontSize:14,fontWeight:700,lineHeight:1.5}}>{brief.idea}</div>
          </div>
          {/* Collapsible sections */}
          <div style={{background:"#fff",borderRadius:12,border:`1px solid ${C.line}`,overflow:"hidden",marginBottom:8}}>
            <BriefSection label="Strategic insight" content={brief.strategicInsight}/>
            <BriefSection label="Copy direction" content={brief.copyDirection}/>
            <BriefSection label="Channel note" content={brief.whatsappNote}/>
            {brief.proofPoints&&brief.proofPoints.length>0&&
              <BriefSection label="Proof points" content={brief.proofPoints.join(" · ")}/>}
            {brief.rtbs&&brief.rtbs.length>0&&
              <BriefSection label="RTBs in focus" content={brief.rtbs.join(" · ")}/>}
            {brief.references&&brief.references.length>0&&<RefLinks links={brief.references}/>}
          </div>
          {/* Actions */}
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            <Btn onClick={()=>{patch(c.id,{stage:"content"});setTab("content");onOpen(c.id,"content");}}>Move to Copy <ArrowRight size={14}/></Btn>
            <Btn variant="ghost"onClick={()=>setM(c.id,"edit")}><PenLine size={13}/>Edit brief</Btn>

          </div>
        </div>}
      </div>}
    </div>;
  };

  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div><Eyebrow>Brief</Eyebrow><h1 style={{margin:"4px 0 0",fontSize:24,fontWeight:800}}>Briefs</h1></div>
      <div style={{display:"flex",gap:10,alignItems:"center"}}>
        {canCreate&&<Btn variant="ghost"onClick={()=>{setImporting("open");setImportRows([]);setImportResult(null);setImportErr("");}}><UploadIcon size={15}/>Import from Excel</Btn>}
        {canCreate&&<Btn onClick={onNew}><Plus size={16}/>New asset</Btn>}
        <div style={{display:"flex",border:`1px solid ${C.line}`,borderRadius:8,overflow:"hidden"}}>
          <button onClick={()=>setView("list")}style={{padding:"6px 14px",border:"none",cursor:"pointer",fontSize:13,fontWeight:600,background:view==="list"?C.navy:"#fff",color:view==="list"?"#fff":C.sub,display:"flex",alignItems:"center",gap:5}}><LayoutDashboard size={13}/>List</button>
          <button onClick={()=>setView("calendar")}style={{padding:"6px 14px",border:"none",cursor:"pointer",fontSize:13,fontWeight:600,background:view==="calendar"?C.navy:"#fff",color:view==="calendar"?"#fff":C.sub,display:"flex",alignItems:"center",gap:5}}><CalendarIcon size={13}/>Calendar</button>
        </div>
      </div>
    </div>
    {view==="calendar"
      ?<CalendarView campaigns={allBriefs}onOpen={onOpen}filterStage="brief"/>
      :(allBriefs.length===0&&briefedElsewhere.length===0&&briefArchived.length===0)
      ?<Card><Empty icon={<FileText size={26}color={C.sub}/>}title="No briefs yet"sub="Start a new asset and the engine walks it through Brief → Copy → Design."action={canCreate?<Btn onClick={onNew}><Plus size={16}/>New asset</Btn>:null}/></Card>
      :<div>
        {allBriefs.length>0&&<div style={{marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:700,color:C.coral,textTransform:"uppercase",letterSpacing:.5,marginBottom:8,display:"flex",alignItems:"center",gap:5}}><Sparkles size={12}/>New assets · awaiting brief · {allBriefs.length}</div>
          {groupByDate(allBriefs).map(([date,items])=><div key={date}style={{marginBottom:10}}>
            <DateGroupHeader date={date}count={items.length}color={C.coral}/>
            <Card style={{padding:0,overflow:"hidden"}}>{items.map(c=><AssetRow key={c.id}c={c}/>)}</Card>
          </div>)}
        </div>}
        {briefedElsewhere.length>0&&<div style={{marginTop:16}}>
          <div style={{fontSize:11,fontWeight:700,color:C.purple,textTransform:"uppercase",letterSpacing:.5,marginBottom:8,display:"flex",alignItems:"center",gap:5}}><CheckCircle2 size={12}/>Briefs done · moved to Copy &amp; beyond · {briefedElsewhere.length}</div>
          <div>{groupByDate(briefedElsewhere).map(([date,items])=><div key={date}style={{marginBottom:8}}><DateGroupHeader date={date}count={items.length}color={C.purple}/><Card style={{padding:0,overflow:"hidden"}}>{items.map(c=><AssetRow key={c.id}c={c}/>)}</Card></div>)}</div>
        </div>}
        {briefArchived.length>0&&<div style={{marginTop:16}}>
          <div style={{fontSize:11,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:.5,marginBottom:8,display:"flex",alignItems:"center",gap:5}}><ArchiveIcon size={12}/>Archived · {briefArchived.length}</div>
          <div style={{opacity:.5}}>{groupByDate(briefArchived).map(([date,items])=><div key={date}style={{marginBottom:8}}><DateGroupHeader date={date}count={items.length}color={C.sub}/><Card style={{padding:0,overflow:"hidden"}}>{items.map(c=><AssetRow key={c.id}c={c}/>)}</Card></div>)}</div>
        </div>}
      </div>}

    {/* ── Import from Excel modal ─────────────────────────── */}
    {importing&&<div onClick={()=>importing!=="working"&&setImporting(false)}style={{position:"fixed",inset:0,background:"rgba(15,23,42,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}}>
      <div onClick={e=>e.stopPropagation()}style={{background:"#fff",borderRadius:16,maxWidth:560,width:"100%",maxHeight:"86vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,.3)"}}>
        <div style={{padding:"18px 22px",borderBottom:`1px solid ${C.line}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:9}}><UploadIcon size={18}color={C.coral}/><span style={{fontWeight:800,fontSize:16}}>Import briefs from Excel</span></div>
          {importing!=="working"&&<button onClick={()=>setImporting(false)}style={{border:"none",background:"none",cursor:"pointer",color:C.sub,display:"flex"}}><X size={20}/></button>}
        </div>
        <div style={{padding:22}}>
          {importing==="done"&&importResult
            ?<div>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                <div style={{width:42,height:42,borderRadius:999,background:"#DCFCE7",display:"flex",alignItems:"center",justifyContent:"center"}}><CheckCircle2 size={22}color="#16A34A"/></div>
                <div><div style={{fontWeight:800,fontSize:16}}>{importResult.created} brief{importResult.created!==1?"s":""} created</div>{importResult.failed>0&&<div style={{fontSize:13,color:C.coral}}>{importResult.failed} failed</div>}</div>
              </div>
              {importResult.errors&&importResult.errors.length>0&&<div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:9,padding:"10px 12px",marginBottom:14,maxHeight:160,overflowY:"auto"}}>
                {importResult.errors.map((er,i)=><div key={i}style={{fontSize:12,color:"#B91C1C",lineHeight:1.5}}>{er}</div>)}
              </div>}
              <div style={{fontSize:13,color:C.sub,marginBottom:14}}>Imported briefs are ready in the Copy tab for copy generation.</div>
              <div style={{display:"flex",gap:8}}><Btn onClick={()=>{setImporting(false);setTab("content");}}>Go to Copy</Btn><Btn variant="ghost"onClick={()=>setImporting(false)}>Close</Btn></div>
            </div>
          :importing==="working"
            ?<div style={{textAlign:"center",padding:"20px 0"}}>
              <Loader2 size={28}color={C.coral}style={{animation:"spin 1s linear infinite",marginBottom:12}}/>
              <div style={{fontWeight:700,fontSize:15,marginBottom:6}}>Generating briefs…</div>
              <div style={{fontSize:13,color:C.sub,marginBottom:12}}>{importProg.done} of {importProg.total} done — each runs through the AI engine.</div>
              <div style={{height:6,background:C.line,borderRadius:6,overflow:"hidden"}}><div style={{height:"100%",background:C.coral,borderRadius:6,width:`${importProg.total?(importProg.done/importProg.total*100):0}%`,transition:"width .3s"}}/></div>
            </div>
          :<div>
            <div style={{fontSize:13.5,color:C.sub,lineHeight:1.5,marginBottom:14}}>Upload the HUFT template with one brief per row. Don't have it yet? <button onClick={downloadTemplate}style={{border:"none",background:"none",color:C.coral,fontWeight:700,cursor:"pointer",padding:0,textDecoration:"underline"}}>Download the template</button>.</div>
            <label style={{display:"block",border:`2px dashed ${C.line}`,borderRadius:12,padding:"26px 16px",textAlign:"center",cursor:"pointer",background:"#FAFAFA",marginBottom:14}}>
              <UploadIcon size={24}color={C.sub}style={{marginBottom:8}}/>
              <div style={{fontWeight:700,fontSize:14,marginBottom:3}}>Choose .xlsx or .csv file</div>
              <div style={{fontSize:12,color:C.sub}}>{importRows.length?`${importRows.length} brief row(s) detected`:"Click to browse"}</div>
