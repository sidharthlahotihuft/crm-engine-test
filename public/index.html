// ── Comment thread (copy or design context) ───────────────────────────────────
function CommentThread({campaignId,context,me,compact}){
  const[items,setItems]=useState(null);
  const[draft,setDraft]=useState("");
  const[replyTo,setReplyTo]=useState(null);
  const[busy,setBusy]=useState(false);
  const load=async()=>{try{setItems(await api.get(`/api/campaigns/${campaignId}/comments?context=${context}`));}catch(e){setItems([]);}};
  useEffect(()=>{load();},[campaignId,context]);
  const add=async()=>{
    if(!draft.trim())return;setBusy(true);
    try{await api.post(`/api/campaigns/${campaignId}/comments`,{body:draft.trim(),context,parent_id:replyTo});setDraft("");setReplyTo(null);await load();}
    catch(e){}setBusy(false);
  };
  const toggleResolve=async(c)=>{try{await api.put(`/api/comments/${c.id}`,{resolved:!c.resolved});await load();}catch(e){}};
  const del=async(c)=>{try{await api.del(`/api/comments/${c.id}`);await load();}catch(e){}};
  if(items===null)return<div style={{fontSize:12,color:C.sub,padding:"8px 0"}}>Loading comments…</div>;
  const roots=items.filter(c=>!c.parent_id);
  const repliesOf=(id)=>items.filter(c=>c.parent_id===id);
  const roleColor={admin:C.coral,business:C.teal,content:C.purple,design:C.green,brand:"#9333EA"};
  const Bubble=({c})=><div style={{marginBottom:8}}>
    <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:2}}>
      <span style={{fontWeight:700,fontSize:12.5}}>{c.author_name||"User"}</span>
      <span style={{background:(roleColor[c.author_role]||C.sub)+"22",color:roleColor[c.author_role]||C.sub,fontSize:9.5,fontWeight:700,padding:"1px 6px",borderRadius:999,textTransform:"capitalize"}}>{c.author_role}</span>
      <span style={{fontSize:10.5,color:C.sub}}>{fmtTime?fmtTime(c.created_at):new Date(c.created_at).toLocaleString()}</span>
      {c.resolved&&<span style={{fontSize:10,color:C.green,fontWeight:700,display:"flex",alignItems:"center",gap:3}}><CheckCircle2 size={11}/>resolved</span>}
    </div>
    <div style={{fontSize:13,color:C.ink,lineHeight:1.5,whiteSpace:"pre-line"}}>{c.body}</div>
    <div style={{display:"flex",gap:10,marginTop:3}}>
      <button onClick={()=>setReplyTo(replyTo===c.id?null:c.id)}style={{border:"none",background:"none",color:C.sub,fontSize:11,cursor:"pointer",padding:0,fontWeight:600}}>{replyTo===c.id?"Cancel":"Reply"}</button>
      {(me.role==="brand"||me.role==="admin")&&<button onClick={()=>toggleResolve(c)}style={{border:"none",background:"none",color:C.sub,fontSize:11,cursor:"pointer",padding:0,fontWeight:600}}>{c.resolved?"Reopen":"Resolve"}</button>}
      {(c.author_name===me.name||me.role==="admin")&&<button onClick={()=>del(c)}style={{border:"none",background:"none",color:"#DC2626",fontSize:11,cursor:"pointer",padding:0,fontWeight:600}}>Delete</button>}
    </div>
  </div>;
  return<div style={{borderTop:`1px solid ${C.line}`,paddingTop:10,marginTop:10}}>
    <div style={{fontSize:11,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:.5,marginBottom:8,display:"flex",alignItems:"center",gap:5}}><MessageSquare size={12}/>{context==="design"?"Art direction comments":"Copy comments"} · {items.length}</div>
    {roots.length===0&&<div style={{fontSize:12.5,color:C.sub,marginBottom:8}}>No comments yet.</div>}
    {roots.map(c=><div key={c.id}>
      <Bubble c={c}/>
      {repliesOf(c.id).length>0&&<div style={{marginLeft:16,borderLeft:`2px solid ${C.line}`,paddingLeft:12}}>{repliesOf(c.id).map(r=><Bubble key={r.id}c={r}/>)}</div>}
      {replyTo===c.id&&<div style={{marginLeft:16,marginBottom:10,display:"flex",gap:7}}>
        <input value={draft}onChange={e=>setDraft(e.target.value)}onKeyDown={e=>{if(e.key==="Enter")add();}}placeholder="Write a reply…"style={{flex:1,border:`1.5px solid ${C.line}`,borderRadius:18,padding:"7px 13px",fontSize:13,outline:"none"}}/>
        <Btn small onClick={add}disabled={busy||!draft.trim()}>Reply</Btn>
      </div>}
    </div>)}
    {replyTo===null&&<div style={{display:"flex",gap:7,marginTop:6}}>
      <input value={draft}onChange={e=>setDraft(e.target.value)}onKeyDown={e=>{if(e.key==="Enter")add();}}placeholder={context==="design"?"Add an art direction…":"Add a comment…"}style={{flex:1,border:`1.5px solid ${C.line}`,borderRadius:18,padding:"8px 14px",fontSize:13,outline:"none"}}/>
      <Btn small onClick={add}disabled={busy||!draft.trim()}><MessageSquare size={13}/>Comment</Btn>
    </div>}
  </div>;
}

// ── Brand review queue (Ilena / admin) ────────────────────────────────────────
function BrandReviewTab({campaigns,patch,me,toast,onOpen,setTab}){
  const queue=(campaigns||[]).filter(c=>c.stage==="brand_review"&&!isArchived(c)).sort((a,b)=>new Date(a.copy_approved_at||a.updated_at)-new Date(b.copy_approved_at||b.updated_at));
  const reviewed=(campaigns||[]).filter(c=>c.brand_approver&&!isArchived(c)).sort((a,b)=>new Date(b.brand_approved_at||0)-new Date(a.brand_approved_at||0)).slice(0,20);
  const[openId,setOpenId]=useState(null);
  const[rejectFor,setRejectFor]=useState(null);
  const[reason,setReason]=useState("");
  const[busy,setBusy]=useState(false);

  const approve=async(c)=>{
    setBusy(true);
    try{
      const r=await api.post(`/api/campaigns/${c.id}/brand-approve`,{});
      // Server moves it to 'design'. For push, no design needed → mark done.
      if(c.channel==="Push notification"){
        await api.put(`/api/campaigns/${c.id}`,{stage:"done",design_approver:me.name,went_live_at:new Date().toISOString()});
      }
      patch(c.id,{}); // trigger a refresh via parent reload pattern
      if(toast)toast("Copy approved ✓ — released"+(c.channel==="Push notification"?" to Done":" to Design"),"success");
      window.location.reload();
    }catch(e){if(toast)toast(e.message||"Approve failed","error");}
    setBusy(false);
  };
  const reject=async(c)=>{
    setBusy(true);
    try{
      await api.post(`/api/campaigns/${c.id}/brand-reject`,{reason:reason.trim()});
      setRejectFor(null);setReason("");
      if(toast)toast("Sent back to Copy team","success");
      window.location.reload();
    }catch(e){if(toast)toast(e.message||"Reject failed","error");}
    setBusy(false);
  };

  const Row=({c,reviewedRow})=>{
    const o=c.data?.copyOptions?.[c.data?.selectedCopyIdx];
    const isOpen=openId===c.id;
    const isEmail=c.channel==="Email"||c.channel==="WhatsApp + Email";
    return<div style={{borderBottom:`1px solid ${C.line}`}}>
      <div onClick={()=>setOpenId(isOpen?null:c.id)}style={{display:"flex",alignItems:"center",gap:12,padding:"13px 16px",cursor:"pointer"}}>
        <ChannelIcon channel={c.channel}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
            <span style={{fontWeight:800,fontSize:14}}>{c.product||"—"}</span>
            <span style={{fontSize:11,fontWeight:700,color:C.coral}}>{normCrmType(c.crm_type)}</span>
            <span style={{fontSize:11,fontWeight:700,color:C.teal}}>· {c.channel}</span>
            {c.copy_approver&&<span style={{fontSize:11,color:C.sub}}>· copy by {c.copy_approver}</span>}
            {reviewedRow&&c.brand_approver&&<span style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:11,fontWeight:700,color:"#9333EA",background:"#F3E8FF",padding:"2px 8px",borderRadius:999}}><CheckCircle2 size={11}/>Brand ✓ {c.brand_approver}</span>}
          </div>
          {o&&<div style={{fontSize:12.5,color:C.sub,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.header}</div>}
        </div>
        {isOpen?<ChevronDown size={15}color={C.sub}/>:<ChevronRight size={15}color={C.sub}/>}
      </div>
      {isOpen&&<div style={{padding:"0 16px 16px"}}>
        {o?<div style={{border:`1px solid ${C.line}`,borderRadius:10,overflow:"hidden",marginBottom:12}}>
          {isEmail&&o.subject&&<div style={{background:"#EEF2FF",padding:"9px 13px",borderBottom:`1px solid ${C.line}`}}><div style={{fontSize:9.5,fontWeight:700,color:"#4F46E5",textTransform:"uppercase",letterSpacing:.5,marginBottom:3}}>Subject line</div><div style={{fontWeight:700,fontSize:13.5,color:"#1E1B4B"}}>{o.subject}</div></div>}
          <div style={{background:"#1a2940",padding:"9px 13px"}}><div style={{fontSize:9.5,fontWeight:700,color:"rgba(255,255,255,.4)",textTransform:"uppercase",letterSpacing:.5,marginBottom:3}}>Image copy</div><div style={{fontWeight:800,whiteSpace:"pre-line",color:"#fff",fontSize:13.5}}>{o.header}</div></div>
          <div style={{background:"#F8FAFC",padding:"9px 13px"}}><div style={{fontSize:9.5,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:.5,marginBottom:4}}>Body copy</div><div style={{whiteSpace:"pre-line",color:"#1f2937",fontSize:12.5,lineHeight:1.5}}>{o.body}</div>{o.cta&&<div style={{marginTop:8,display:"inline-block",background:C.navy,color:"#fff",fontSize:11,fontWeight:700,padding:"4px 11px",borderRadius:7}}>{o.cta}</div>}</div>
        </div>:<div style={{fontSize:13,color:C.sub,marginBottom:12}}>No selected copy found.</div>}

        {!reviewedRow&&(me.role==="brand"||me.role==="admin")&&<div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:6}}>
          {busy?<Spin label="Working…"/>:<>
            <Btn onClick={()=>approve(c)}><CheckCircle2 size={15}/>Approve &amp; release</Btn>
            <Btn variant="ghost"onClick={()=>setRejectFor(rejectFor===c.id?null:c.id)}><X size={15}/>Send back</Btn>
          </>}
        </div>}
        {rejectFor===c.id&&<div style={{display:"flex",gap:7,marginBottom:10}}>
          <input value={reason}onChange={e=>setReason(e.target.value)}placeholder="Reason / changes needed…"style={{flex:1,border:`1.5px solid ${C.line}`,borderRadius:18,padding:"8px 14px",fontSize:13,outline:"none"}}/>
          <Btn small onClick={()=>reject(c)}disabled={busy}>Send back</Btn>
        </div>}

        <CommentThread campaignId={c.id}context="copy"me={me}/>
      </div>}
    </div>;
  };

  return<div>
    <div style={{marginBottom:16}}><Eyebrow>Brand review</Eyebrow><h1 style={{margin:"4px 0 0",fontSize:24,fontWeight:800}}>Awaiting brand approval</h1>
      <div style={{fontSize:13.5,color:C.sub,marginTop:4}}>Copy must be approved here before it moves to design.</div></div>
    {queue.length===0
      ?<Card><Empty icon={<Eye size={26}color={C.sub}/>}title="Nothing to review"sub="Approved copy will appear here for brand sign-off."/></Card>
      :<Card style={{padding:0,overflow:"hidden"}}>{queue.map(c=><Row key={c.id}c={c}/>)}</Card>}
    {reviewed.length>0&&<div style={{marginTop:18}}>
      <div style={{fontSize:11,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:.5,marginBottom:8,display:"flex",alignItems:"center",gap:5}}><CheckCircle2 size={12}/>Recently approved · {reviewed.length}</div>
      <Card style={{padding:0,overflow:"hidden"}}>{reviewed.map(c=><Row key={c.id}c={c}reviewedRow/>)}</Card>
    </div>}
  </div>;
}

// ── Image Library (AI-tagged) ─────────────────────────────────────────────────
function ImageLibraryTab({me,toast}){
  const[items,setItems]=useState(null);
  const[q,setQ]=useState("");
  const[uploading,setUploading]=useState([]); // [{name, status}]
  const[preview,setPreview]=useState(null);
  const fileRef=useRef(null);

  const load=async(query)=>{
    try{setItems(await api.get("/api/image-library"+(query?`?q=${encodeURIComponent(query)}`:"")));}
    catch(e){setItems([]);}
  };
  useEffect(()=>{load("");},[]);

  const onSearch=(val)=>{setQ(val);load(val);};

  const handleFiles=async(files)=>{
    const arr=[...files];
    for(const f of arr){
      const key=f.name+Date.now();
      setUploading(u=>[...u,{key,name:f.name,status:"reading"}]);
      try{
        const dataUrl=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f);});
        setUploading(u=>u.map(x=>x.key===key?{...x,status:"analysing"}:x));
        await api.post("/api/image-library",{file_name:f.name,file_data:dataUrl,file_type:f.type});
        setUploading(u=>u.filter(x=>x.key!==key));
        if(toast)toast(`${f.name} added & tagged ✓`,"success");
      }catch(e){
        setUploading(u=>u.map(x=>x.key===key?{...x,status:"error"}:x));
        if(toast)toast(`${f.name}: ${e.message||"upload failed"}`,"error");
      }
    }
    load(q);
  };

  const del=async(id)=>{
    if(!window.confirm("Delete this image from the library?"))return;
    try{await api.del("/api/image-library/"+id);load(q);if(toast)toast("Deleted","success");}catch(e){}
  };

  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16,flexWrap:"wrap",gap:12}}>
      <div><Eyebrow>Image library</Eyebrow><h1 style={{margin:"4px 0 0",fontSize:24,fontWeight:800}}>Brand image library</h1>
        <div style={{fontSize:13.5,color:C.sub,marginTop:4}}>Upload images — the engine identifies the product, tags them, and surfaces them in the design prompt section.</div></div>
      <div>
        <Btn onClick={()=>fileRef.current&&fileRef.current.click()}><UploadIcon size={16}/>Upload images</Btn>
        <input ref={fileRef}type="file"accept="image/*"multiple style={{display:"none"}}onChange={e=>{if(e.target.files&&e.target.files.length)handleFiles(e.target.files);e.target.value="";}}/>
      </div>
    </div>

    {/* Upload progress */}
    {uploading.length>0&&<Card style={{marginBottom:14}}>
      {uploading.map(u=><div key={u.key}style={{display:"flex",alignItems:"center",gap:10,padding:"4px 0",fontSize:13}}>
        {u.status==="error"?<AlertCircle size={15}color={C.coral}/>:<Loader2 size={15}color={C.coral}style={{animation:"spin 1s linear infinite"}}/>}
        <span style={{fontWeight:600}}>{u.name}</span>
        <span style={{color:C.sub}}>{u.status==="reading"?"reading…":u.status==="analysing"?"identifying product & tagging…":u.status==="error"?"failed":""}</span>
      </div>)}
    </Card>}

    {/* Search */}
    <div style={{position:"relative",marginBottom:16}}>
      <SearchIcon size={15}color={C.sub}style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)"}}/>
      <input value={q}onChange={e=>onSearch(e.target.value)}placeholder="Search by product, tag, mood, category…"style={{width:"100%",border:`1.5px solid ${C.line}`,borderRadius:24,padding:"10px 16px 10px 38px",fontSize:14,boxSizing:"border-box",outline:"none"}}/>
    </div>

    {/* Grid */}
    {items===null
      ?<div style={{textAlign:"center",padding:40,color:C.sub}}><Loader2 size={24}style={{animation:"spin 1s linear infinite"}}/></div>
      :items.length===0
      ?<Card><Empty icon={<ImageIcon size={26}color={C.sub}/>}title={q?"No matches":"No images yet"}sub={q?"Try a different search term.":"Upload images and the engine will tag them automatically."}action={!q?<Btn onClick={()=>fileRef.current&&fileRef.current.click()}><UploadIcon size={15}/>Upload images</Btn>:null}/></Card>
      :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:14}}>
        {items.map(img=><div key={img.id}style={{border:`1px solid ${C.line}`,borderRadius:12,overflow:"hidden",background:"#fff"}}>
          <div onClick={()=>setPreview(img)}style={{aspectRatio:"4/3",background:"#F3F4F6",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
            <ImageThumb id={img.id}alt={img.description}/>
          </div>
          <div style={{padding:"9px 11px"}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
              {img.product&&<span style={{fontSize:11,fontWeight:700,color:C.coral}}>{img.product}</span>}
              {img.category&&<span style={{fontSize:10,fontWeight:600,color:C.teal,background:"#E6FFFA",padding:"1px 6px",borderRadius:999}}>{img.category}</span>}
            </div>
            {img.description&&<div style={{fontSize:11.5,color:C.sub,lineHeight:1.4,marginBottom:6,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{img.description}</div>}
            <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:6}}>
              {(img.tags||[]).slice(0,4).map((t,i)=><span key={i}style={{fontSize:9.5,color:C.sub,background:"#F3F4F6",padding:"1px 6px",borderRadius:999}}>{t}</span>)}
            </div>
            {(me.role==="admin"||me.role==="brand")&&<button onClick={()=>del(img.id)}style={{border:"none",background:"none",color:"#DC2626",fontSize:10.5,cursor:"pointer",padding:0,fontWeight:600}}>Delete</button>}
          </div>
        </div>)}
      </div>}

    {/* Preview modal */}
    {preview&&<div onClick={()=>setPreview(null)}style={{position:"fixed",inset:0,background:"rgba(15,23,42,.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}}>
      <div onClick={e=>e.stopPropagation()}style={{background:"#fff",borderRadius:14,maxWidth:680,width:"100%",maxHeight:"88vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 18px",borderBottom:`1px solid ${C.line}`}}>
          <span style={{fontWeight:800}}>{preview.product||preview.file_name||"Image"}</span>
          <button onClick={()=>setPreview(null)}style={{border:"none",background:"none",cursor:"pointer",color:C.sub}}><X size={20}/></button>
        </div>
        <div style={{padding:18}}>
          <ImageFull id={preview.id}/>
          <div style={{marginTop:12,fontSize:13,lineHeight:1.6}}>
            {preview.description&&<div style={{marginBottom:8}}>{preview.description}</div>}
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{(preview.tags||[]).map((t,i)=><span key={i}style={{fontSize:11,color:C.sub,background:"#F3F4F6",padding:"2px 9px",borderRadius:999}}>{t}</span>)}</div>
          </div>
        </div>
      </div>
    </div>}
  </div>;
}

// Lazy thumbnail loader — fetches the image data on demand
function ImageThumb({id,alt}){
  const[src,setSrc]=useState(null);
  useEffect(()=>{let on=true;api.get("/api/image-library/"+id).then(r=>{if(on)setSrc(r.file_data);}).catch(()=>{});return()=>{on=false;};},[id]);
  if(!src)return<ImageIcon size={28}color={C.line}/>;
  return<img src={src}alt={alt||""}style={{width:"100%",height:"100%",objectFit:"cover"}}/>;
}
function ImageFull({id}){
  const[src,setSrc]=useState(null);
  useEffect(()=>{let on=true;api.get("/api/image-library/"+id).then(r=>{if(on)setSrc(r.file_data);}).catch(()=>{});return()=>{on=false;};},[id]);
  if(!src)return<div style={{aspectRatio:"4/3",background:"#F3F4F6",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center"}}><Loader2 size={22}style={{animation:"spin 1s linear infinite"}}/></div>;
  return<img src={src}alt=""style={{width:"100%",borderRadius:10}}/>;
}

function ContentTab({active,patch,copyRules,addRule,setTab,me,recentFeedback,saveFeedback,campaigns,onOpen,toast,onDelete}){
  // Copy page shows: assets still in copy stage, PLUS any non-archived asset whose copy
  // was already approved (those have moved on to Design/Done but should remain visible here).
  const allCopy=(campaigns||[]).filter(c=>!isArchived(c)&&(c.stage==="content"||(c.data?.copyOptions&&c.data?.selectedCopyIdx!=null)));
  const[openId,setOpenId]=useState(null);
  const[busyMap,setBusyMap]=useState({});
  const[errMap,setErrMap]=useState({});
  React.useEffect(()=>{if(active?.id)setOpenId(active.id);},[active?.id]);

  const CopyRow=({c})=>{
    const isOpen=openId===c.id;
    const activeBrief=c.data?.brief;
    const opts=c.data?.copyOptions;
    const sel=c.data?.selectedCopyIdx;
    const ruleStr=activeRuleText(copyRules);
    const busy=busyMap[c.id]||false;
    const setBusy=(v)=>setBusyMap(x=>({...x,[c.id]:v}));
    const err=errMap[c.id]||"";
    const setErr=(v)=>setErrMap(x=>({...x,[c.id]:v}));
    const[refineFor,setRefineFor]=useState(null);
    const[refineText,setRefineText]=useState("");
    const[showAll,setShowAll]=useState(false);
    const[manualMode,setManualMode]=useState(null); // null | "add" | "edit"
    const[brandRejecting,setBrandRejecting]=useState(false);
    const[brandReason,setBrandReason]=useState("");
    const canBrandReview=(me.role==="brand"||me.role==="admin");

    // Ilena/admin approves the copy → server releases it to design (or done for push)
    const brandApprove=async()=>{
      setBusy(true);setErr("");
      try{
        await api.post(`/api/campaigns/${c.id}/brand-approve`,{});
        if(c.channel==="Push notification"){
          await api.put(`/api/campaigns/${c.id}`,{stage:"done",design_approver:me.name,went_live_at:new Date().toISOString()});
        }
        if(toast)toast("Brand approved ✓ — released to "+(c.channel==="Push notification"?"Done":"Design"),"success");
        window.location.reload();
      }catch(e){setErr(e.message||"Approve failed");setBusy(false);}
    };
    const brandReject=async()=>{
      setBusy(true);setErr("");
      try{
        await api.post(`/api/campaigns/${c.id}/brand-reject`,{reason:brandReason.trim()});
        if(toast)toast("Sent back to the copy team","success");
        window.location.reload();
      }catch(e){setErr(e.message||"Reject failed");setBusy(false);}
    };

    // Show even without brief - just disable generation
    const rtbsArr=(activeBrief?.rtbs||c.rtbs||[]).filter(Boolean);
    const refsArr=(activeBrief?.references||c.references||[]).filter(Boolean);
    const briefBlock="Brief\nProduct: "+c.product+"\nAudience: "+(c.audience_label||c.segment)+"\nObjective: "+c.objective+"\nOffer: "+(c.offer||"none")+"\nCRM: "+(c.crm_type||"D2C")+"\nInsight: "+activeBrief?.strategicInsight+"\nIdea: "+activeBrief?.idea+"\nPillar: "+(activeBrief?.pillar||"—")+"\nCopy direction: "+(activeBrief?.copyDirection||"—")+(rtbsArr.length?"\nRTBs to weave into the body (use these as the proof points): "+rtbsArr.join("; "):"")+(refsArr.length?"\nReference links (honour their tone & direction): "+refsArr.join(" , "):"");

    const gen=async()=>{
      if(!activeBrief){setErr("No brief found — go back to Brief tab first.");return;}
      setErr("");setBusy(true);
      try{
        const fb=recentFeedback("content");
        const isPush=c.channel==="Push notification";
        const isEmail=c.channel==="Email"||c.channel==="WhatsApp + Email";
        const channelRules=isPush
          ?`PUSH NOTIFICATION RULES (NON-NEGOTIABLE):
- Title: MAX 50 chars. Short, punchy.
- Body: MAX 90 chars. One sentence. No bullets.
- Max 1 emoji. 2-second read.
- CTA: 2-3 words.`
          :isEmail
          ?`EMAIL RULES:
- Subject line: under 50 chars, curiosity or benefit-led.
- Header / image copy: 2-3 short punchy lines for the hero image overlay.
- Body: warm opener + 3-4 ✓ proof bullets + sign-off. Slightly longer than WhatsApp is fine.
- CTA: clear action phrase.`
          :`WHATSAPP RULES:
- Header: 2-3 short punchy lines.
- Body: opener + 3-4 ✓ bullets + sign-off.
- CTA: clear action phrase.`;
        const nOpts=copyOptionCount(c.channel);
        const shape=isPush
          ?"each: {direction,header,body,cta}. header=push title MAX 50 chars, body=MAX 90 chars one sentence, cta=2-3 words"
          :isEmail
          ?"each: {direction,subject,header,body,cta}. subject=email subject line under 50 chars, header=image copy/overlay 2-3 short lines, body=email opener+✓ bullets+sign-off, cta=action phrase"
          :"each: {direction,header,body,cta}. header=image overlay 2-3 short punchy lines, body=WhatsApp opener+bullets+sign-off, cta=action phrase";
        const sys="You write "+(c.channel||"WhatsApp")+" CRM copy for HUFT.\n"+BRAND_CONTEXT+"\n"+channelRules+"\nRULEBOOK:\n"+ruleStr+(fb?"\nTeam feedback:\n"+fb:"")+`\nReturn ONLY JSON array of ${nOpts} options, `+shape;
        const j=await callClaude(sys,briefBlock,true);
        patch(c.id,{data:{...(c.data||{}),copyOptions:j,selectedCopyIdx:null},copy_approver:null,stage:"content"});
        setShowAll(false);
      }catch(e){console.error("Gen error:",e);setErr("Generation failed: "+(e.message||"unknown error — check Vercel logs"));}setBusy(false);
    };

    const refine=async(idx)=>{setBusy(true);setErr("");
      try{
        const fb=recentFeedback("content");
        const isPush=c.channel==="Push notification";
        const sys="You refine ONE "+(c.channel||"WhatsApp")+" CRM copy for HUFT.\n"+BRAND_CONTEXT+"\nRULEBOOK:\n"+ruleStr+(fb?"\nFeedback:\n"+fb:"")+(isPush?"\nPUSH: title MAX 50, body MAX 90 chars.":"")+"\nReturn ONLY JSON: {direction,header,body,cta}.";
        const usr=briefBlock+"\n\nCurrent:\n"+JSON.stringify(opts[idx])+"\n\nSteer (one-time): "+refineText;
        const j=await callClaude(sys,usr,true);
        const wasSelected=sel===idx;
        const newData={...(c.data||{}),copyOptions:opts.map((o,i)=>i===idx?j:o)};
        if(wasSelected)newData.selectedCopyIdx=null;
        patch(c.id,{data:newData,...(wasSelected?{copy_approver:null,stage:"content"}:{})});
        setRefineFor(null);setRefineText("");
      }catch(e){setErr("Refine failed.");}setBusy(false);
    };

    const select=(idx)=>{
      if(idx===null){
        patch(c.id,{data:{...(c.data||{}),selectedCopyIdx:null},stage:"content",copy_approver:null});
        if(toast)toast("Copy unselected — pick another option","success");
      } else {
        // Every copy now goes to Ilena (brand) for review before design/done.
        patch(c.id,{data:{...(c.data||{}),selectedCopyIdx:idx},stage:"brand_review",copy_approver:me.name});
        if(toast)toast("Copy selected ✓ — sent to brand review (Ilena)","success");
      }
    };

    // Manually written / edited copy — approves it and feeds it back as a learning signal
    const saveManual=(opt)=>{
      const base=opts||[];
      let newOpts,newSel;
      if(sel!=null){newOpts=base.map((o,i)=>i===sel?{...opt,manual:true}:o);newSel=sel;}
      else{newOpts=[...base,{...opt,manual:true}];newSel=newOpts.length-1;}
      const isPush=c.channel==="Push notification";
      const patchFields={data:{...(c.data||{}),copyOptions:newOpts,selectedCopyIdx:newSel},copy_approver:me.name};
      if(sel==null){patchFields.stage="brand_review";}
      patch(c.id,patchFields);
      // Learning signal: store the team-written copy as feedback so future generations emulate it
      const learnText=`TEAM-WRITTEN COPY THAT WORKS (emulate this voice & structure) — ${c.product||""} · ${c.channel||"WhatsApp"} · ${c.objective||""}:\nHeader: ${opt.header}\nBody: ${opt.body}\nCTA: ${opt.cta}`;
      api.post("/api/feedback",{stage:"content",text:learnText,campaign_id:c.id}).catch(()=>{});
      if(saveFeedback)saveFeedback({stage:"content",text:learnText});
      setManualMode(null);
      if(toast)toast("Saved & approved ✓ — the engine will learn from this","success");
    };

    // Inline direct-text edit of a generated option (no AI, user types changes)
    const editDirectly=(idx,updated)=>{
      const base=opts||[];
      const newOpts=base.map((o,i)=>i===idx?{...o,...updated,manual:true}:o);
      patch(c.id,{data:{...(c.data||{}),copyOptions:newOpts}});
      if(toast)toast("Copy updated ✓","success");
    };

    // Once copy is approved, use shared openId accordion — collapsed by default.
    if(sel!=null){
      const o=opts?.[sel];
      const tone=c.stage==="brand_review"?{bar:"#9333EA",bg:"#FAF5FF"}:ROW_TONE[c.stage==="done"?"done":"approved"];
      const isPush=c.channel==="Push notification";
      return<div style={{borderBottom:`1px solid ${C.line}`,borderLeft:`4px solid ${tone.bar}`,background:tone.bg}}>
        {/* Collapsed header — always visible, click to expand */}
        <div onClick={()=>setOpenId(isOpen?null:c.id)}style={{display:"flex",alignItems:"center",gap:12,padding:"12px 18px",cursor:"pointer",userSelect:"none"}}>
          <div style={{flex:1,minWidth:0,display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
            <span style={{color:C.sub,display:"flex",alignItems:"center",flexShrink:0}}>{isOpen?<ChevronDown size={14}/>:<ChevronRight size={14}/>}</span>
            <span style={{fontWeight:800,fontSize:14,color:C.ink}}>{c.product||"—"}</span>
            <span style={{fontSize:11,fontWeight:700,color:C.coral}}>{normCrmType(c.crm_type)}</span>
            <span style={{fontSize:11,fontWeight:700,color:C.teal}}>· {c.channel||"WhatsApp"}</span>
            {c.stage==="brand_review"
              ?<span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11,fontWeight:700,color:"#9333EA",background:"#F3E8FF",padding:"3px 9px",borderRadius:999}}><Eye size={11}/>In brand review</span>
              :<span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11,fontWeight:700,color:"#5B21B6",background:"#EDE9FE",padding:"3px 9px",borderRadius:999}}><CheckCircle2 size={11}/>Copy approved</span>}
            {c.stage!=="content"&&c.stage!=="brand_review"&&<StageBadge stage={c.stage}/>}
            {isOpen&&o?.direction&&<span style={{fontSize:11,color:C.sub,fontStyle:"italic"}}>{o.direction}</span>}
            {c.created_at&&<span style={{marginLeft:"auto",fontSize:11,color:C.sub,background:"#F3F4F6",padding:"2px 7px",borderRadius:5}}>{fmtDate(c.created_at)}</span>}
          </div>
          <div style={{flexShrink:0}} onClick={e=>e.stopPropagation()}><RowActions c={c}patch={patch}me={me}onDelete={onDelete}/></div>
        </div>
        {/* Expanded body */}
        {isOpen&&<div style={{padding:"0 18px 14px"}}>
          {o&&<div style={{background:"#fff",border:`1px solid ${C.line}`,borderRadius:10,padding:"10px 13px",marginBottom:10}}>
            {o.direction&&<div style={{fontSize:10,fontWeight:700,color:C.purple,textTransform:"uppercase",letterSpacing:.5,marginBottom:5}}>{o.direction}</div>}
            <div style={{fontWeight:700,fontSize:13.5,color:C.ink,whiteSpace:"pre-line",marginBottom:4}}>{o.header}</div>
            <div style={{fontSize:12.5,color:"#374151",lineHeight:1.5,whiteSpace:"pre-line"}}>{o.body}</div>
            {o.cta&&<div style={{marginTop:7,display:"inline-block",background:C.navy,color:"#fff",fontSize:11.5,fontWeight:700,padding:"4px 11px",borderRadius:7}}>{o.cta}</div>}
            {isPush&&<div style={{marginTop:8,display:"flex",gap:10,fontSize:10,color:C.sub}}><span style={{color:(o.header||"").length>50?"#DC2626":C.sub}}>Title {(o.header||"").length}/50</span><span style={{color:(o.body||"").length>90?"#DC2626":C.sub}}>Body {(o.body||"").length}/90</span></div>}
          </div>}
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            <CopyBtn text={()=>copyTextFromOption(o)}/>
            <button onClick={()=>setManualMode(manualMode==="edit"?null:"edit")}style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:11.5,fontWeight:600,padding:"4px 10px",borderRadius:8,border:`1px solid ${C.line}`,background:"#fff",color:C.ink,cursor:"pointer"}}><PenLine size={12}/>Edit copy</button>
            <button onClick={()=>setManualMode(manualMode==="add"?null:"add")}style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:11.5,fontWeight:600,padding:"4px 10px",borderRadius:8,border:`1px solid ${C.line}`,background:"#fff",color:C.ink,cursor:"pointer"}}><Plus size={12}/>Add manually</button>
            <button onClick={()=>select(null)}style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:11.5,fontWeight:600,padding:"4px 10px",borderRadius:8,border:`1px solid ${C.line}`,background:"#fff",color:C.sub,cursor:"pointer"}}><X size={12}/>Unselect</button>
            {c.copy_approver&&<span style={{fontSize:11,color:C.sub}}>Approved by {c.copy_approver}</span>}
          </div>

          {/* Brand review controls — shown while awaiting Ilena's sign-off */}
          {c.stage==="brand_review"&&<div style={{marginTop:12,border:`1.5px solid #E9D5FF`,background:"#FAF5FF",borderRadius:10,padding:"12px 14px"}}>

      </div>;
    }

    return<div style={{borderBottom:`1px solid ${C.line}`,borderLeft:`4px solid ${opts?ROW_TONE.amber.bar:ROW_TONE.attention.bar}`}}>
      {/* Row header */}
      <div onClick={()=>setOpenId(isOpen?null:c.id)}

        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}>
            <span style={{fontWeight:800,fontSize:14,color:C.ink}}>{c.product||"—"}</span>
            <span style={{fontSize:11,fontWeight:700,color:C.coral}}>{normCrmType(c.crm_type)}</span>
            <span style={{fontSize:11,fontWeight:700,color:C.teal}}>· {c.channel||"WhatsApp"}</span>
          </div>
          <div style={{fontSize:12,color:C.sub,display:"flex",gap:6,alignItems:"center"}}><span>{parseName(c.name).date&&<b style={{color:C.ink,marginRight:4}}>{parseName(c.name).date}</b>}{parseName(c.name).hook.replace(/_/g," ")}</span>{c.created_at&&<span style={{marginLeft:"auto",fontSize:11,color:C.sub,background:"#F3F4F6",padding:"2px 7px",borderRadius:5,flexShrink:0}}>{fmtDate(c.created_at)}</span>}</div>

        <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
          {sel!=null&&<span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11,fontWeight:700,color:"#5B21B6",background:"#EDE9FE",padding:"3px 9px",borderRadius:999}}><CheckCircle2 size={11}/>Copy approved</span>}
          {sel!=null&&c.stage!=="content"&&<StageBadge stage={c.stage}/>}
          {opts&&sel==null&&<span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11,fontWeight:700,color:"#92400E",background:"#FEF3C7",padding:"3px 9px",borderRadius:999}}>{opts.length} options — pick one</span>}
          {!opts&&<span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11,fontWeight:700,color:"#B91C1C",background:"#FEF2F2",padding:"3px 9px",borderRadius:999}}>Needs copy</span>}
          <div onClick={e=>e.stopPropagation()}><RowActions c={c}patch={patch}me={me}onDelete={onDelete}/></div>
          {isOpen?<ChevronDown size={16}color={C.sub}/>:<ChevronRight size={16}color={C.sub}/>}
        </div>
      </div>

      {/* Expanded content */}
      {isOpen&&<div style={{padding:"0 18px 18px",background:"#FAF5FF"}}>
        {/* Brief summary */}
        <BriefSummaryCard active={c}activeBrief={activeBrief}copyRules={copyRules}busy={busy}refineFor={refineFor}gen={gen}opts={opts}patch={patch}/>
        {c.copy_approver&&<div style={{marginBottom:10,display:"flex",alignItems:"center",gap:8}}><ApproverChip name={`Copy approved · ${c.copy_approver}`}at={c.copy_approved_at}color={C.purple}/>{sel!=null&&<span style={{fontSize:12,color:C.sub}}>· {opts[sel]?.direction}</span>}</div>}
        {err&&<div style={{color:C.coral,fontSize:13,marginBottom:8}}>{err}</div>}
        <div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}>
          <Btn small variant="ghost"onClick={()=>setManualMode(manualMode==="add"?null:"add")}><PenLine size={12}/>Add manually</Btn>
        </div>
        {manualMode==="add"&&<ManualCopyForm initial={null}channel={c.channel}onSave={saveManual}onCancel={()=>setManualMode(null)}/>}
        {!opts&&!busy&&!manualMode&&<div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:10,padding:"12px 16px",marginBottom:10,display:"flex",alignItems:"center",gap:10}}><MessageSquare size={18}color="#B91C1C"/><div><div style={{fontSize:13,fontWeight:700,color:"#B91C1C"}}>No copy generated yet</div><div style={{fontSize:12,color:"#7F1D1D",marginTop:2}}>Hit "Generate options" in the brief panel above, or add copy manually.</div></div></div>}
        {opts&&<div>
          {sel!=null&&<div style={{marginBottom:10}}>
            <div style={{fontSize:11,fontWeight:700,color:"#5B21B6",textTransform:"uppercase",letterSpacing:.5,marginBottom:6,display:"flex",alignItems:"center",gap:4}}><CheckCircle2 size={11}/>Approved copy</div>
            <ContentCard o={opts[sel]}idx={sel}sel={true}refineFor={refineFor}refineText={refineText}setRefineFor={setRefineFor}setRefineText={setRefineText}busy={busy}onSelect={select}onRefine={refine}onEditSave={editDirectly}channel={c.channel}/>
          </div>}
          {sel!=null&&<button onClick={()=>setShowAll(v=>!v)}style={{display:"flex",alignItems:"center",gap:5,background:"none",border:"none",cursor:"pointer",color:C.sub,fontSize:12.5,fontWeight:600,marginBottom:8}}>{showAll?<><ChevronDown size={13}/>Hide other options</>:<><Eye size={13}/>See other {opts.length-1} options</>}</button>}
          {(sel==null||showAll)&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            {opts.map((o,i)=>{if(sel!=null&&i===sel)return null;return<ContentCard key={i}o={o}idx={i}sel={false}refineFor={refineFor}refineText={refineText}setRefineFor={setRefineFor}setRefineText={setRefineText}busy={busy}onSelect={select}onRefine={refine}onEditSave={editDirectly}channel={c.channel}/>;})}</div>}
        </div>}
        {sel!=null&&<div style={{marginTop:12,background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:10,padding:"14px 16px"}}>
          <div style={{fontSize:12,fontWeight:700,color:"#15803D",textTransform:"uppercase",letterSpacing:.5,marginBottom:10,display:"flex",alignItems:"center",gap:6}}><CheckCircle2 size={13}/>Copy approved — next steps</div>
          {c.channel==="Push notification"
            ?<><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <Btn variant="green"onClick={()=>{setTab("done");onOpen(c.id,"done");}}><CheckCircle2 size={14}/>View in Done</Btn>
              </div>
              <div style={{marginTop:10,fontSize:12,color:"#166534"}}>Push notifications need no design asset — this is marked done and ready to schedule.</div></>
            :<><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <Btn variant="teal"onClick={()=>{patch(c.id,{stage:"design"});setTab("design");onOpen(c.id,"design");}}><Palette size={14}/>Go to Design</Btn>
              </div>
              <div style={{marginTop:10,fontSize:12,color:"#166534"}}>Asset is now in Design queue. The design team can pick it up.</div></>}
        </div>}
        <FeedbackBar stage="content"by={me.name}onSave={saveFeedback}/>
      </div>}
    </div>;
  };

  const[view,setView]=useState("list");
  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div><Eyebrow>Copy</Eyebrow><h1 style={{margin:"4px 0 0",fontSize:24,fontWeight:800}}>Copy</h1></div>
      <div style={{display:"flex",border:`1px solid ${C.line}`,borderRadius:8,overflow:"hidden"}}>
        <button onClick={()=>setView("list")}style={{padding:"6px 14px",border:"none",cursor:"pointer",fontSize:13,fontWeight:600,background:view==="list"?C.navy:"#fff",color:view==="list"?"#fff":C.sub,display:"flex",alignItems:"center",gap:5}}><LayoutDashboard size={13}/>List</button>
        <button onClick={()=>setView("calendar")}style={{padding:"6px 14px",border:"none",cursor:"pointer",fontSize:13,fontWeight:600,background:view==="calendar"?C.navy:"#fff",color:view==="calendar"?"#fff":C.sub,display:"flex",alignItems:"center",gap:5}}><CalendarIcon size={13}/>Calendar</button>

    {view==="calendar"
      ?<CalendarView campaigns={allCopy}onOpen={onOpen}filterStage="content"/>
      :allCopy.length===0
      ?<Card><Empty icon={<MessageSquare size={26}color={C.sub}/>}title="No copy pending"sub="Assets move here after brief is done."/></Card>
      :<div>
        {(()=>{
          const needsCopy=allCopy.filter(c=>c.stage==="content"&&c.data?.selectedCopyIdx==null);
          const inReview=allCopy.filter(c=>c.stage==="brand_review");
          // "approved" = brand-approved and moved on (design/done), but still listed here
          const approved=allCopy.filter(c=>c.stage!=="content"&&c.stage!=="brand_review"&&c.data?.selectedCopyIdx!=null&&c.data?.copyOptions);
          const archivedCopy=(campaigns||[]).filter(c=>isArchived(c)&&c.data?.copyOptions);
          return<>
            {needsCopy.length>0&&<div style={{marginBottom:16}}>
              <div style={{fontSize:11,fontWeight:700,color:"#92400E",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>⬤ Needs attention · {needsCopy.length}</div>
              {groupByDate(needsCopy).map(([date,items])=><div key={date}style={{marginBottom:10}}><DateGroupHeader date={date}count={items.length}color={C.purple}/><Card style={{padding:0,overflow:"hidden"}}>{items.map(c=><CopyRow key={c.id}c={c}/>)}</Card></div>)}
            </div>}
            {inReview.length>0&&<div style={{marginBottom:16}}>
              <div style={{fontSize:11,fontWeight:700,color:"#9333EA",textTransform:"uppercase",letterSpacing:.5,marginBottom:8,display:"flex",alignItems:"center",gap:5}}><Eye size={12}/>Pending brand approval · {inReview.length}{(me.role==="brand"||me.role==="admin")?"":" (awaiting Ilena)"}</div>
              {groupByDate(inReview).map(([date,items])=><div key={date}style={{marginBottom:10}}><DateGroupHeader date={date}count={items.length}color={"#9333EA"}/><Card style={{padding:0,overflow:"hidden"}}>{items.map(c=><CopyRow key={c.id}c={c}/>)}</Card></div>)}
            </div>}
            {approved.length>0&&<div>
              <div style={{fontSize:11,fontWeight:700,color:"#5B21B6",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>✓ Brand approved · {approved.length}</div>
              <div>{groupByDate(approved).map(([date,items])=><div key={date}style={{marginBottom:10}}><DateGroupHeader date={date}count={items.length}color={C.purple}/><Card style={{padding:0,overflow:"hidden"}}>{items.map(c=><CopyRow key={c.id}c={c}/>)}</Card></div>)}</div>
            </div>}
            {archivedCopy.length>0&&<div style={{marginTop:16}}>
              <div style={{fontSize:11,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Archived · {archivedCopy.length}</div>
              <div style={{opacity:.5}}>{groupByDate(archivedCopy).map(([date,items])=><div key={date}style={{marginBottom:8}}><DateGroupHeader date={date}count={items.length}color={C.sub}/><Card style={{padding:0,overflow:"hidden"}}>{items.map(c=><CopyRow key={c.id}c={c}/>)}</Card></div>)}</div>
            </div>}
          </>;
        })()}
      </div>}
  </div>;
}


function ManualCopyForm({initial,channel,onSave,onCancel}){
  const isPush=channel==="Push notification";
  const isEmail=channel==="Email"||channel==="WhatsApp + Email";
  const[h,setH]=useState(initial?.header||"");
  const[b,setB]=useState(initial?.body||"");
  const[cta,setCta]=useState(initial?.cta||"");
  const[subj,setSubj]=useState(initial?.subject||"");
  const[dir,setDir]=useState(initial?.direction||"Team-written");
  const[checking,setChecking]=useState(false);
  const[gc,setGc]=useState(null); // grammar-check result {hasIssues,issues,corrected}
  const[gcErr,setGcErr]=useState("");

  const buildOpt=(over={})=>({direction:dir.trim()||"Team-written",header:(over.header??h).trim(),body:(over.body??b).trim(),cta:(over.cta??cta).trim(),...(isEmail?{subject:(over.subject??subj).trim()}:{})});

  // Step 1: run British-English grammar check before saving
  const runCheck=async()=>{
    setChecking(true);setGcErr("");
    try{
      const res=await grammarCheckCopy({...(isEmail?{subject:subj}:{}),header:h,body:b,cta});
      if(res&&res.hasIssues&&Array.isArray(res.issues)&&res.issues.length){
        setGc(res);
      } else {
        onSave(buildOpt()); // clean — save as-is
      }
    }catch(e){
      // If the check fails, don't block the user — surface a note and let them save directly
      setGcErr("Grammar check unavailable — you can still save.");
    }
    setChecking(false);
  };

  const acceptCorrection=()=>{
    const cor=gc.corrected||{};
    if(cor.header!=null)setH(cor.header);
    if(cor.body!=null)setB(cor.body);
    if(cor.cta!=null)setCta(cor.cta);
    if(isEmail&&cor.subject!=null)setSubj(cor.subject);
    onSave(buildOpt(cor));
  };

  return<div style={{border:`1.5px solid ${C.purple}`,borderRadius:12,padding:14,background:"#FBFAFF",marginTop:10,marginBottom:10}}>
    <div style={{fontWeight:700,fontSize:13,marginBottom:4,display:"flex",alignItems:"center",gap:6}}><PenLine size={13}color={C.purple}/>{initial?"Edit copy":"Write copy manually"}</div>
    <div style={{fontSize:11.5,color:C.sub,marginBottom:10}}>On save we run a British English grammar check, then the engine learns from your copy for future suggestions.</div>
    <Field label="Direction / label"value={dir}onChange={setDir}placeholder="e.g. Team-written, Warm reminder"/>
    {isEmail&&<><Field label="Subject line (under 50 chars)"value={subj}onChange={setSubj}placeholder="e.g. Your dog's dinner just got an upgrade"/>
    <div style={{display:"flex",gap:10,fontSize:10.5,color:C.sub,marginTop:-6,marginBottom:10}}><span style={{color:subj.length>50?"#DC2626":C.sub}}>Subject {subj.length}/50</span></div></>}
    <Field label={isPush?"Title (keep under 50 chars)":isEmail?"Image copy / overlay text":"Header / overlay text"}value={h}onChange={setH}textarea rows={2}/>
    <Field label={isPush?"Body (keep under 90 chars)":isEmail?"Body copy":"Body / caption"}value={b}onChange={setB}textarea rows={isPush?2:5}/>
    {isPush&&<div style={{display:"flex",gap:10,fontSize:10.5,color:C.sub,marginTop:-6,marginBottom:10}}><span style={{color:h.length>50?"#DC2626":C.sub}}>Title {h.length}/50</span><span style={{color:b.length>90?"#DC2626":C.sub}}>Body {b.length}/90</span></div>}
    <Field label="CTA"value={cta}onChange={setCta}placeholder="e.g. Shop now"/>

    {/* Grammar-check results panel */}
    {gc&&gc.hasIssues&&<div style={{border:`1.5px solid #F59E0B`,background:"#FFFBEB",borderRadius:10,padding:"11px 13px",marginBottom:10}}>
      <div style={{fontSize:12,fontWeight:800,color:"#B45309",display:"flex",alignItems:"center",gap:6,marginBottom:7}}><AlertCircle size={13}/>British English check — {gc.issues.length} suggestion{gc.issues.length>1?"s":""}</div>
      <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:10}}>
        {gc.issues.map((it,i)=><div key={i}style={{fontSize:12,lineHeight:1.5}}>
          <span style={{textDecoration:"line-through",color:"#DC2626"}}>{it.wrong}</span>
          <span style={{color:C.sub}}> → </span>
          <span style={{color:"#15803D",fontWeight:700}}>{it.right}</span>
          {it.why&&<span style={{color:C.sub,fontSize:11}}> · {it.why}</span>}
        </div>)}
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <Btn small onClick={acceptCorrection}><Check size={13}/>Apply fixes &amp; approve</Btn>
        <Btn small variant="ghost"onClick={()=>onSave(buildOpt())}>Keep mine &amp; approve</Btn>
        <Btn small variant="ghost"onClick={()=>setGc(null)}>Back to editing</Btn>
      </div>
    </div>}

    {gcErr&&<div style={{color:C.coral,fontSize:12,marginBottom:8,display:"flex",alignItems:"center",gap:5}}><AlertCircle size={13}/>{gcErr}</div>}

    {!gc&&<div style={{display:"flex",gap:8}}>
      {checking
        ?<Spin label="Checking British English…"/>
        :<Btn onClick={runCheck}disabled={!h.trim()&&!b.trim()}><Check size={14}/>{gcErr?"Save &amp; approve":"Check & approve"}</Btn>}
      <Btn variant="ghost"onClick={onCancel}>Cancel</Btn>
    </div>}
  </div>;
}

function ContentCard({o,idx,sel,refineFor,refineText,setRefineFor,setRefineText,busy,onSelect,onRefine,onEditSave,channel}){

  const isEmail=channel==="Email"||channel==="WhatsApp + Email";

    {bg:"#FFF3E0",text:"#E65100"},{bg:"#E8F5E9",text:"#2E7D32"},
    {bg:"#E3F2FD",text:"#1565C0"},{bg:"#F3E5F5",text:"#6A1B9A"},
    {bg:"#FCE4EC",text:"#880E4F"},
  ];
  const dc=dirColors[idx%dirColors.length];
  const[editMode,setEditMode]=useState(null); // null | "menu" | "steer" | "text"

  return<div style={{
    border:`2px solid ${sel?C.purple:C.line}`,borderRadius:14,overflow:"hidden",
    background:sel?"#FAF5FF":"#fff",transition:"border-color .15s",
  }}>
    {/* Direction tag — colour coded per option */}
    <div style={{background:sel?C.purple:dc.bg,padding:"8px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>

    </div>

    {/* Copy preview */}
    <div style={{padding:12}}>
      {isPush
        /* Push notification preview */
        ?<div style={{background:C.navy,borderRadius:10,padding:12}}>
          <div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,.5)",textTransform:"uppercase",letterSpacing:.5,marginBottom:4}}>Push notification</div>
          <div style={{fontWeight:800,fontSize:14,color:"#fff",marginBottom:4,lineHeight:1.3}}>{o.header}</div>
          <div style={{fontSize:12.5,color:"rgba(255,255,255,.8)",lineHeight:1.4}}>{o.body}</div>
          <div style={{marginTop:8,fontSize:11,fontWeight:700,color:C.coral}}>{o.cta} →</div>
          {/* Character count */}
          <div style={{marginTop:8,display:"flex",gap:10,fontSize:10,color:"rgba(255,255,255,.4)"}}>

            <span style={{color:(o.body||"").length>90?"#F87171":"rgba(255,255,255,.4)"}}>Body: {(o.body||"").length}/90</span>

        </div>
      :isEmail
        /* Email preview — Subject / Image copy / Body */
        ?<div style={{borderRadius:10,overflow:"hidden",border:`1px solid ${C.line}`}}>
          <div style={{background:"#EEF2FF",padding:"10px 14px",borderBottom:`1px solid ${C.line}`}}>
            <div style={{fontSize:9.5,fontWeight:700,color:"#4F46E5",textTransform:"uppercase",letterSpacing:.5,marginBottom:4}}>Subject line</div>
            <div style={{fontWeight:700,color:"#1E1B4B",fontSize:14,lineHeight:1.35}}>{o.subject||<span style={{color:C.sub,fontStyle:"italic"}}>—</span>}</div>
            {o.subject&&<div style={{marginTop:4,fontSize:10,color:(o.subject||"").length>50?"#DC2626":C.sub}}>{(o.subject||"").length}/50 chars</div>}
          </div>
          <div style={{background:"#1a2940",padding:"10px 14px"}}>
            <div style={{fontSize:9.5,fontWeight:700,color:"rgba(255,255,255,.4)",textTransform:"uppercase",letterSpacing:.5,marginBottom:4}}>Image copy (overlay text)</div>
            <div style={{fontWeight:800,whiteSpace:"pre-line",color:"#fff",fontSize:14,lineHeight:1.35}}>{o.header}</div>
          </div>
          <div style={{background:"#F8FAFC",padding:"10px 14px"}}>
            <div style={{fontSize:9.5,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:.5,marginBottom:5}}>Body copy</div>
            <div style={{whiteSpace:"pre-line",color:"#1f2937",fontSize:13,lineHeight:1.55}}>{o.body}</div>
            <div style={{marginTop:10,display:"inline-block",background:C.navy,color:"#fff",fontSize:11.5,fontWeight:700,padding:"5px 12px",borderRadius:7}}>{o.cta}</div>
          </div>
        </div>
        /* WhatsApp preview */
        :<div style={{borderRadius:10,overflow:"hidden",border:"1px solid #d1fae5"}}>

function FinalDesignUpload({c,d,patch,me}){
  const[busy,setBusy]=useState(false);
  const[link,setLink]=useState(d.finalLink||"");
  const fileRef=useRef(null);
  const setDesign=(f)=>patch(c.id,{data:{...(c.data||{}),design:{...d,...f}}});
  const finalFile=d.finalFile;
  const ready=!!(finalFile||(d.finalLink&&d.finalLink.trim()));
  const onFile=(e)=>{
    const f=e.target.files&&e.target.files[0];if(!f)return;
    if(f.size>4*1024*1024){alert("That file is over 4 MB. Please upload a smaller export, or paste a Canva/Drive link instead.");e.target.value="";return;}
    setBusy(true);
    const r=new FileReader();
    r.onload=()=>{setDesign({finalFile:{name:f.name,type:f.type,dataUrl:r.result}});setBusy(false);};
    r.onerror=()=>{alert("Couldn't read that file.");setBusy(false);};
    r.readAsDataURL(f);
  };
  const isImg=finalFile&&(finalFile.type||"").startsWith("image/");
  return<div style={{marginTop:10,paddingTop:12,borderTop:`1px solid ${C.line}`,background:"#F0FDF4",borderRadius:10,padding:"14px 16px"}}>
    <div style={{fontSize:12,fontWeight:700,color:"#15803D",marginBottom:6,display:"flex",alignItems:"center",gap:6}}><UploadIcon size={13}/>Upload the final design file</div>
    <div style={{fontSize:12,color:"#166534",marginBottom:10}}>Attach the finished Canva/design export (image or PDF, up to 4 MB) or paste a link. You can only mark this done once a file or link is added.</div>

    {/* Current upload preview */}
    {finalFile&&<div style={{display:"flex",alignItems:"center",gap:10,background:"#fff",border:`1px solid ${C.line}`,borderRadius:10,padding:"8px 12px",marginBottom:10}}>
      {isImg
        ?<img src={finalFile.dataUrl}alt={finalFile.name}style={{width:46,height:46,objectFit:"cover",borderRadius:8,flexShrink:0}}/>
        :<div style={{width:46,height:46,borderRadius:8,background:C.tealSoft,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><FileText size={20}color={C.teal}/></div>}
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:12.5,fontWeight:700,color:C.ink,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{finalFile.name}</div>
        <div style={{fontSize:11,color:C.green,fontWeight:600}}>Uploaded ✓</div>
      </div>
      <a href={finalFile.dataUrl}download={finalFile.name}style={{fontSize:11.5,fontWeight:600,color:C.ink,textDecoration:"none",border:`1px solid ${C.line}`,borderRadius:7,padding:"4px 9px",display:"inline-flex",alignItems:"center",gap:4}}><Download size={12}/>Download</a>
      <button onClick={()=>setDesign({finalFile:null})}style={{fontSize:11.5,fontWeight:600,color:"#B91C1C",background:"none",border:"none",cursor:"pointer"}}>Remove</button>
    </div>}

    <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",marginBottom:10}}>
      <input ref={fileRef}type="file"accept="image/*,application/pdf"onChange={onFile}style={{display:"none"}}/>
      <Btn small variant="ghost"onClick={()=>fileRef.current&&fileRef.current.click()}>{busy?<Loader2 size={13}style={{animation:"spin 1s linear infinite"}}/>:<UploadIcon size={13}/>}{finalFile?"Replace file":"Upload file"}</Btn>
      <input value={link}onChange={e=>setLink(e.target.value)}onBlur={()=>setDesign({finalLink:link.trim()})}placeholder="…or paste Canva / Drive link"style={{flex:1,minWidth:200,border:`1px solid ${C.line}`,borderRadius:8,padding:"7px 11px",fontSize:13,boxSizing:"border-box"}}/>
    </div>
    {d.finalLink&&<div style={{fontSize:11.5,marginBottom:10}}><a href={d.finalLink}target="_blank"rel="noreferrer"style={{color:C.teal,fontWeight:600,display:"inline-flex",alignItems:"center",gap:4}}><ExternalLink size={12}/>{d.finalLink.slice(0,60)}{d.finalLink.length>60?"…":""}</a></div>}

    <Btn variant="dark"disabled={!ready}onClick={()=>{if(!ready)return;if(window.confirm("Confirm: final design is uploaded and ready to go live?"))patch(c.id,{stage:"done",went_live_at:new Date().toISOString(),design_approver:me.name});}}>
      <CheckCircle2 size={15}/>{ready?"Design complete — Mark as done":"Upload a file or link to finish"}
    </Btn>
  </div>;
}

function DesignTab({active,patch,promptRules,addRule,me,recentFeedback,saveFeedback,campaigns,onOpen,onDelete}){

  const setImageModeFor=(id,m)=>setImageModes(x=>({...x,[id]:m}));

    const isOpen=openId===c.id;

    const setBusy=(v)=>setDesignBusyMap(x=>({...x,[c.id]:v}));
    const err=designErrMap[c.id]||"";
    const setErr=(v)=>setDesignErrMap(x=>({...x,[c.id]:v}));
    const[ruleText,setRuleText]=useState("");
    const imageMode=getImageMode(c.id,d.imageSource||null);
    const setImageMode=(m)=>setImageModeFor(c.id,m);
    const ruleStr=activeRuleText(promptRules);
    const setD=(f)=>patch(c.id,{data:{...(c.data||{}),design:{...d,...f}}});
    const approvedPrompt=d.imagePrompts&&d.approvedPromptIdx!=null?d.imagePrompts[d.approvedPromptIdx]:null;
    const copyChangedAfterPrompts=d.imagePrompts&&d.promptsForCopyDir&&copy&&d.promptsForCopyDir!==copy.direction;

    if(!copy)return<div style={{borderBottom:`1px solid ${C.line}`,padding:"12px 18px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div><span style={{fontWeight:700,fontSize:13,color:C.ink}}>{c.product||"—"}</span><span style={{fontSize:12,color:C.sub,marginLeft:8}}>{normCrmType(c.crm_type)} · {c.channel||"WhatsApp"}</span></div>

    </div>;

    const genNotes=async()=>{setBusy("notes");setErr("");
      try{
        const fb=recentFeedback("design");
        const brief=c.data?.brief||{};
        const sys="You are an art director for HUFT CRM creative.\n"+BRAND_CONTEXT+(fb?"\nRecent design feedback:\n"+fb:"")+"\nReturn ONLY JSON: {notes:['2 short directive art-direction notes — composition, hero, mood, brand cues']}";
        const usr="Product: "+c.product+"\nInsight: "+brief.strategicInsight+"\nIdea: "+brief.idea+"\nCopy direction: "+copy.direction+"\nHeader: "+copy.header;

      }catch(e){console.error("genNotes error:",e);setErr("Couldn't generate notes: "+(e.message||"check API key"));}setBusy("");
    };

    const genPrompts=async()=>{setBusy("prompts");setErr("");
      try{
        const fb=recentFeedback("design");
        const brief=c.data?.brief||{};
        const sys="You write TWO distinct image-generation prompts for HUFT "+c.channel+" CRM.\n"+BRAND_CONTEXT+"\nPROMPT RULES:\n"+ruleStr+(fb?"\nFeedback:\n"+fb:"")+"\nRules: real Indian-breed pet, correct pack proportions, no added text on pack, realistic lighting.\nReturn ONLY JSON: {prompts:[{label,tool,aspectRatio,prompt,negativePrompt}]}";

    const _dtone=_imgReady?ROW_TONE.design:ROW_TONE.attention;

      {/* Row header */}
