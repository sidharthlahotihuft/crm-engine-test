    return()=>{on=false;};},[products,prodImgs]);

  const addProduct=()=>setProducts(ps=>[...ps,{pid:nextPid(),id:"",scale:0.5,x:0.5,y:0.62}]);
  const updProduct=(pid,f)=>setProducts(ps=>ps.map(p=>p.pid===pid?{...p,...f}:p));
  const rmProduct=(pid)=>setProducts(ps=>ps.filter(p=>p.pid!==pid));

  const wrapFit=(ctx,el,maxW,basePx,maxLines)=>{
    let px=Math.round(basePx*(el.size||1));const fam="'"+el.font+"'";
    while(px>12){
      ctx.font="700 "+px+"px "+fam;try{ctx.letterSpacing=(el.kern||0)+"px";}catch(e){}
      const words=(el.text||"").split(/\s+/).filter(Boolean);const lines=[];let line="";
      for(const w of words){const t=line?line+" "+w:w;if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=w;}else line=t;}
      if(line)lines.push(line);
      if(lines.length<=maxLines)return{lines,px};
      px-=4;
    }
    return{lines:(el.text||"").split(/\s+/).filter(Boolean).length?[el.text]:[],px};
  };
  const drawBgImage=(ctx,img)=>{const s=Math.max(sz.w/img.width,sz.h/img.height);const dw=img.width*s,dh=img.height*s;ctx.drawImage(img,(sz.w-dw)/2,(sz.h-dh)/2,dw,dh);};

  const draw=React.useCallback(async()=>{
    const cv=ref.current;if(!cv)return;
    cv.width=sz.w;cv.height=sz.h;
    const ctx=cv.getContext("2d");
    try{await Promise.all([
      document.fonts.load("700 "+Math.round(sz.w*0.085)+"px '"+hl.font+"'"),
      document.fonts.load("700 "+Math.round(sz.w*0.042)+"px '"+sh.font+"'"),
    ]);}catch(e){}
    try{await document.fonts.ready;}catch(e){}

    // 1) background
    if(bgMode==="generate"&&genImg) drawBgImage(ctx,genImg);
    else if(bgMode==="library"&&bgImg) drawBgImage(ctx,bgImg);
    else{ctx.fillStyle=bgColor;ctx.fillRect(0,0,sz.w,sz.h);}

    // 2) products / mockups (each its own size + position) + contact shadow
    for(const p of products){
      const img=prodImgs[p.id];if(!img)continue;
      const pw=sz.w*p.scale, ph=pw*(img.height/img.width);
      const px=sz.w*p.x-pw/2, py=sz.h*p.y-ph/2;
      if(shadow){
        const cx=px+pw/2, cy=py+ph*0.99, rx=pw*0.42, ry=ph*0.05;
        const g=ctx.createRadialGradient(cx,cy,0,cx,cy,rx);
        g.addColorStop(0,"rgba(0,0,0,0.36)");g.addColorStop(1,"rgba(0,0,0,0)");
        ctx.save();ctx.translate(cx,cy);ctx.scale(1,ry/rx);ctx.fillStyle=g;
        ctx.beginPath();ctx.arc(0,0,rx,0,Math.PI*2);ctx.fill();ctx.restore();
      }
      ctx.drawImage(img,px,py,pw,ph);
    }

    // 3) image copy — headline + sub-headline
    const pad=sz.w*0.07, maxW=sz.w-pad*2;
    const [vPos,hPos]=anchor.split("-");
    const hAlign=hPos==="left"?"left":hPos==="right"?"right":"center";
    const anchorX=hPos==="left"?pad:hPos==="right"?sz.w-pad:sz.w/2;
    ctx.textBaseline="top";
    const H=wrapFit(ctx,hl,maxW,sz.w*0.085,4);
    const S=wrapFit(ctx,sh,maxW,sz.w*0.042,5);
    const hLineH=H.px*1.12, sLineH=S.px*1.32, gap=H.px*0.55;
    const hBlock=H.lines.length*hLineH;
    const sBlock=S.lines.length? gap+S.lines.length*sLineH : 0;
    const ctaH=cta? H.px*1.7 : 0;
    const blockH=hBlock+sBlock+ctaH;
    let topY = vPos==="top"? sz.h*0.08 : vPos==="bottom"? sz.h*0.92-blockH : (sz.h-blockH)/2;

    ctx.fillStyle=textColor;ctx.textAlign=hAlign;
    ctx.font="700 "+H.px+"px '"+hl.font+"'";try{ctx.letterSpacing=(hl.kern||0)+"px";}catch(e){}
    ctx.shadowColor="rgba(0,0,0,0.25)";ctx.shadowBlur=6;ctx.shadowOffsetY=2;
    let y=topY+(hl.dy||0)*sz.h;const hx=anchorX+(hl.dx||0)*sz.w;
    for(const ln of H.lines){ctx.fillText(ln,hx,y);y+=hLineH;}
    if(S.lines.length){
      ctx.font="600 "+S.px+"px '"+sh.font+"'";try{ctx.letterSpacing=(sh.kern||0)+"px";}catch(e){}
      let sy=topY+hBlock+gap+(sh.dy||0)*sz.h;const sx=anchorX+(sh.dx||0)*sz.w;
      for(const ln of S.lines){ctx.fillText(ln,sx,sy);sy+=sLineH;}
    }
    ctx.shadowColor="transparent";ctx.shadowBlur=0;ctx.shadowOffsetY=0;try{ctx.letterSpacing="0px";}catch(e){}
    if(cta){
      const cpx=Math.round(sz.w*0.04);ctx.font="700 "+cpx+"px '"+sh.font+"'";
      const tw=ctx.measureText(cta).width, bw=tw+cpx*1.7, bh=cpx*2.1;
      let bx = hAlign==="left"? hx : hAlign==="right"? hx-bw : hx-bw/2;
      const by=topY+hBlock+sBlock+H.px*0.35;
      ctx.fillStyle=ctaBg;
      if(ctx.roundRect){ctx.beginPath();ctx.roundRect(bx,by,bw,bh,bh/2);ctx.fill();}else ctx.fillRect(bx,by,bw,bh);
      ctx.fillStyle="#FFFFFF";ctx.textAlign="left";ctx.textBaseline="middle";
      ctx.fillText(cta,bx+cpx*0.85,by+bh/2);ctx.textBaseline="top";
    }

    // 4) logo
    if(logoImg){
      const lw=sz.w*logoScale, lh=lw*(logoImg.height/logoImg.width), m=sz.w*0.05;
      const [lv,lh2]=logoCorner.split("-");
      const lx=lh2==="left"?m:sz.w-lw-m, ly=lv==="top"?m:sz.h-lh-m;
      ctx.drawImage(logoImg,lx,ly,lw,lh);
    }
  },[sz,bgMode,bgColor,bgImg,genImg,products,prodImgs,shadow,hl,sh,textColor,anchor,cta,ctaBg,logoImg,logoScale,logoCorner]);

  React.useEffect(()=>{draw();},[draw]);

  const runGenerate=async()=>{
    if(!genPrompt.trim()){setGenErr("No prompt available to generate from.");return;}
    setGenBusy(true);setGenErr("");
    try{
      const r=await api.post("/api/generate-image",{prompt:genPrompt,negativePrompt:genNeg,aspectRatio:sz.ar});
      const im=await loadImage(r.image);setGenImg(im);setBgMode("generate");
      if(toast)toast("Image generated ✓ — products & copy kept on top","success");
    }catch(e){setGenErr(e.message||"Generation failed");}
    setGenBusy(false);
  };
  const exportPng=()=>{const cv=ref.current;if(!cv)return;cv.toBlob(b=>{const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=(c.product||"creative").replace(/\s+/g,"_")+"_"+sz.w+"x"+sz.h+".png";a.click();URL.revokeObjectURL(u);},"image/png");};
  const saveToLib=async()=>{const cv=ref.current;if(!cv)return;setSaving(true);try{const dataUrl=cv.toDataURL("image/png");await api.post("/api/image-library",{file_name:(c.product||"creative")+"_composed.png",file_data:dataUrl,file_type:"image/png"});if(toast)toast("Saved to Image library ✓","success");}catch(e){if(toast)toast(e.status===403?"You don't have permission to save":"Save failed","error");}setSaving(false);};
  // Make the composed canvas the FINAL design file, so the design can be marked done in-app (no Canva export needed).
  const useAsFinal=()=>{const cv=ref.current;if(!cv||!patch)return;setFinalSaving(true);
    try{const dataUrl=cv.toDataURL("image/png");patch(c.id,{data:{...(c.data||{}),design:{...(d||{}),finalFile:{name:(c.product||"creative")+"_composed.png",type:"image/png",dataUrl},finalSource:"composer"}}});if(toast)toast("Set as final design ✓ — scroll down to Mark as done","success");}
    catch(e){if(toast)toast("Couldn't set final design","error");}
    setFinalSaving(false);};

  const fieldL={fontSize:11,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:.4,marginBottom:5,display:"block"};
  const ctrl={width:"100%",border:`1px solid ${C.line}`,borderRadius:8,padding:"7px 9px",fontSize:13,boxSizing:"border-box"};
  const slider=(label,val,min,max,set,fmt)=><div><label style={fieldL}>{label}{fmt?" · "+fmt(val):""}</label><input type="range"min={min}max={max}value={val}onChange={e=>set(+e.target.value)}style={{width:"100%"}}/></div>;
  const editPanel=(el,setEl)=><div style={{gridColumn:"1 / -1",display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,padding:"10px 12px",background:C.paper,border:`1px solid ${C.line}`,borderRadius:8}}>
    <div style={{gridColumn:"1 / -1"}}><label style={fieldL}>Font</label><select value={el.font}onChange={e=>setEl({...el,font:e.target.value})}style={ctrl}>{COMPOSER_FONTS.map(f=><option key={f}value={f}>{f}</option>)}</select></div>
    {slider("Font size",Math.round(el.size*100),50,200,v=>setEl({...el,size:v/100}),v=>v+"%")}
    {slider("Kerning",el.kern,-5,30,v=>setEl({...el,kern:v}),v=>v+"px")}
    {slider("Horizontal",Math.round(el.dx*100),-30,30,v=>setEl({...el,dx:v/100}),v=>v+"%")}
    {slider("Vertical",Math.round(el.dy*100),-30,30,v=>setEl({...el,dy:v/100}),v=>v+"%")}
  </div>;

  return<div style={{marginTop:14,border:`1px solid ${C.line}`,borderRadius:12,overflow:"hidden"}}>
    <div style={{padding:"11px 16px",background:C.paper,borderBottom:`1px solid ${C.line}`,display:"flex",alignItems:"center",gap:8}}>
      <ImageIcon size={15}color={C.coral}/><span style={{fontWeight:800,fontSize:13.5,color:C.ink}}>Creative Composer</span>
      <span style={{fontSize:11.5,color:C.sub}}>Real products + image copy · exact export</span>
    </div>
    <div style={{display:"flex",gap:16,padding:16,flexWrap:"wrap"}}>
      <div style={{flex:"0 0 auto"}}>
        <canvas ref={ref}style={{width:Math.min(300,sz.w/3),maxWidth:300,height:"auto",borderRadius:8,border:`1px solid ${C.line}`,boxShadow:"0 4px 14px rgba(0,0,0,.12)",display:"block",background:"#fff"}}/>
        <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>
          <Btn small onClick={exportPng}>Download PNG</Btn>
          <Btn small variant="ghost"disabled={saving}onClick={saveToLib}>{saving?"Saving…":"Save to library"}</Btn>
        </div>
        {patch&&<div style={{marginTop:8}}><Btn small variant="dark"disabled={finalSaving}onClick={useAsFinal}><CheckCircle2 size={13}/>{finalSaving?"Setting…":"Use as final design"}</Btn></div>}
      </div>
      <div style={{flex:1,minWidth:260,display:"grid",gridTemplateColumns:"1fr 1fr",gap:11,alignContent:"start"}}>
        <div><label style={fieldL}>Size</label><select value={sizeIdx}onChange={e=>setSizeIdx(+e.target.value)}style={ctrl}>{COMPOSER_SIZES.map((s,i)=><option key={i}value={i}>{s.label} ({s.w}×{s.h})</option>)}</select></div>
        <div><label style={fieldL}>Source · keep or switch</label><select value={bgMode}onChange={e=>setBgMode(e.target.value)}style={ctrl}>
          <option value="plain">Plain background + product</option>
          <option value="library">Image from library</option>
          <option value="generate">Generated image (AI)</option>
        </select></div>

        {bgMode==="plain"&&<div style={{gridColumn:"1 / -1"}}>
          <label style={fieldL}>Brand colour combinations</label>
          <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:8}}>
            {BRAND_PALETTES.map(p=><button key={p.name}title={p.name}onClick={()=>{setBgColor(p.bg);setTextColor(p.text);setCtaBg(p.cta);}}
              style={{display:"flex",alignItems:"center",gap:6,padding:"5px 8px",borderRadius:8,cursor:"pointer",border:`1px solid ${bgColor===p.bg?C.coral:C.line}`,background:"#fff"}}>
              <span style={{width:16,height:16,borderRadius:4,background:p.bg,border:`1px solid ${C.line}`}}/>
              <span style={{width:10,height:10,borderRadius:"50%",background:p.text}}/>
              <span style={{width:10,height:10,borderRadius:"50%",background:p.cta}}/>
              <span style={{fontSize:11,fontWeight:600,color:C.ink}}>{p.name}</span>
            </button>)}
          </div>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <label style={{...fieldL,margin:0}}>Custom</label>
            <input type="color"value={bgColor}onChange={e=>setBgColor(e.target.value)}style={{width:40,height:30,border:`1px solid ${C.line}`,borderRadius:6,padding:2}}/>
          </div>
        </div>}

        {bgMode==="library"&&<div style={{gridColumn:"1 / -1"}}><label style={fieldL}>Library image (scene)</label><select value={bgId}onChange={e=>setBgId(e.target.value)}style={ctrl}><option value="">— pick —</option>{items.map(i=><option key={i.id}value={i.id}>{i.product||i.file_name}</option>)}</select></div>}

        {bgMode==="generate"&&<div style={{gridColumn:"1 / -1",display:"grid",gap:8,padding:"10px 12px",background:C.paper,border:`1px solid ${C.line}`,borderRadius:8}}>
          {isBusiness
            ? <div style={{fontSize:12,color:C.sub}}>Generates a scene from the approved art-direction prompt. Products and copy stay on top, fully editable.</div>
            : <>
                <div><label style={fieldL}>Prompt (scene / background)</label><textarea value={genPrompt}onChange={e=>setGenPrompt(e.target.value)}rows={2}style={{...ctrl,resize:"vertical"}}placeholder="e.g. warm rustic kitchen counter, soft morning light"/></div>
                <div><label style={fieldL}>Avoid (optional)</label><input value={genNeg}onChange={e=>setGenNeg(e.target.value)}style={ctrl}placeholder="text, watermarks, other products"/></div>
              </>}
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <Btn small disabled={genBusy}onClick={runGenerate}>{genBusy?"Generating…":"Generate image"}</Btn>
            <span style={{fontSize:11,color:C.sub}}>{isBusiness?"One-click":"Products & copy stay on top"}</span>
          </div>
          {genErr&&<div style={{fontSize:11.5,color:"#DC2626"}}>{genErr}</div>}
        </div>}

        {/* products / mockups — multi, from library only */}
        <div style={{gridColumn:"1 / -1",borderTop:`1px solid ${C.line}`,paddingTop:11,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:11.5,fontWeight:800,color:C.ink}}>Products / mockups{products.length>1?" · "+products.length:""}</span>
          <div style={{display:"flex",gap:10}}>
            <button onClick={reloadLib}style={{border:"none",background:"none",color:C.sub,fontSize:11,fontWeight:700,cursor:"pointer",padding:0}}>Refresh</button>
            <button onClick={addProduct}style={{border:"none",background:"none",color:C.coral,fontSize:11,fontWeight:700,cursor:"pointer",padding:0}}>+ Add product</button>
          </div>
        </div>
        {c.product&&<div style={{gridColumn:"1 / -1",fontSize:11,color:C.sub,marginTop:-4}}>Brief product: <b style={{color:C.ink}}>{c.product}</b> — multi-product posts: add each one from the library.</div>}
        {!loadingItems&&items.length===0&&<div style={{gridColumn:"1 / -1",fontSize:11.5,color:"#B45309",background:"#FFFBEB",border:"1px solid #FDE68A",borderRadius:8,padding:"8px 10px"}}>The Image library is empty, so there are no products to pick. Upload packshots to the Image library, then hit Refresh.</div>}

        {products.map((p,idx)=><div key={p.pid}style={{gridColumn:"1 / -1",border:`1px solid ${C.line}`,borderRadius:8,padding:"10px 12px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div style={{gridColumn:"1 / -1",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:10.5,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:.4}}>Product {idx+1}</span>
            {products.length>1&&<button onClick={()=>rmProduct(p.pid)}style={{border:"none",background:"none",color:"#B91C1C",fontSize:11,fontWeight:700,cursor:"pointer",padding:0}}>Remove</button>}
          </div>
          <div style={{gridColumn:"1 / -1"}}><select value={p.id}onChange={e=>updProduct(p.pid,{id:e.target.value})}style={ctrl}><option value="">— pick from library —</option>{items.map(i=><option key={i.id}value={i.id}>{i.product||i.file_name}</option>)}</select></div>
          {slider("Size",Math.round(p.scale*100),15,100,v=>updProduct(p.pid,{scale:v/100}),v=>v+"%")}
          {slider("Horizontal",Math.round(p.x*100),0,100,v=>updProduct(p.pid,{x:v/100}),v=>v+"%")}
          {slider("Vertical",Math.round(p.y*100),5,95,v=>updProduct(p.pid,{y:v/100}),v=>v+"%")}
        </div>)}
        <label style={{gridColumn:"1 / -1",display:"flex",alignItems:"center",gap:8,fontSize:13,color:C.ink,cursor:"pointer"}}><input type="checkbox"checked={shadow}onChange={e=>setShadow(e.target.checked)}/>Contact shadow under products</label>

        {/* image copy */}
        <div style={{gridColumn:"1 / -1",borderTop:`1px solid ${C.line}`,paddingTop:11,fontSize:11.5,fontWeight:800,color:C.ink}}>Image copy</div>
        <div style={{gridColumn:"1 / -1"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
            <label style={fieldL}>Headline</label>
            <button onClick={()=>setEditing(editing==="hl"?"":"hl")}style={{border:"none",background:"none",color:C.coral,fontSize:11,fontWeight:700,cursor:"pointer",padding:0}}>{editing==="hl"?"Close edit":"Edit"}</button>
          </div>
          <input value={hl.text}onChange={e=>setHl({...hl,text:e.target.value})}style={ctrl}/>
        </div>
        {editing==="hl"&&editPanel(hl,setHl)}
        <div style={{gridColumn:"1 / -1"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
            <label style={fieldL}>Sub-headline</label>
            <button onClick={()=>setEditing(editing==="sh"?"":"sh")}style={{border:"none",background:"none",color:C.coral,fontSize:11,fontWeight:700,cursor:"pointer",padding:0}}>{editing==="sh"?"Close edit":"Edit"}</button>
          </div>
          <input value={sh.text}onChange={e=>setSh({...sh,text:e.target.value})}style={ctrl}/>
        </div>
        {editing==="sh"&&editPanel(sh,setSh)}
        <div style={{gridColumn:"1 / -1"}}><label style={fieldL}>Placement (headline · sub-headline follows)</label>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
            {PLACEMENTS.map(p=><button key={p.k}onClick={()=>setAnchor(p.k)}style={{padding:"6px 0",fontSize:11,fontWeight:700,borderRadius:7,cursor:"pointer",border:`1px solid ${anchor===p.k?C.coral:C.line}`,background:anchor===p.k?C.coral+"18":"#fff",color:anchor===p.k?C.coral:C.sub}}>{p.label}</button>)}
          </div>
        </div>
        <div><label style={fieldL}>Text colour</label><input type="color"value={textColor}onChange={e=>setTextColor(e.target.value)}style={{...ctrl,padding:2,height:34}}/></div>
        <div><label style={fieldL}>CTA (optional)</label><input value={cta}onChange={e=>setCta(e.target.value)}style={ctrl}/></div>
        <div><label style={fieldL}>CTA colour</label><input type="color"value={ctaBg}onChange={e=>setCtaBg(e.target.value)}style={{...ctrl,padding:2,height:34}}/></div>

        {/* logo */}
        <div style={{gridColumn:"1 / -1",borderTop:`1px solid ${C.line}`,paddingTop:11,fontSize:11.5,fontWeight:800,color:C.ink}}>Logo (sub-brand)</div>
        <div style={{gridColumn:"1 / -1"}}><label style={fieldL}>Logo image</label><select value={logoId}onChange={e=>setLogoId(e.target.value)}style={ctrl}><option value="">— none —</option>{items.map(i=><option key={i.id}value={i.id}>{i.product||i.file_name}</option>)}</select></div>
        {logoId&&slider("Logo size",Math.round(logoScale*100),8,45,v=>setLogoScale(v/100),v=>v+"%")}
        {logoId&&<div><label style={fieldL}>Logo corner</label><select value={logoCorner}onChange={e=>setLogoCorner(e.target.value)}style={ctrl}><option value="top-left">Top left</option><option value="top-right">Top right</option><option value="bottom-left">Bottom left</option><option value="bottom-right">Bottom right</option></select></div>}
      </div>
    </div>
  </div>;
}

function DesignTab({active,patch,promptRules,addRule,me,recentFeedback,saveFeedback,campaigns,onOpen,onDelete}){
  const allDesign=(campaigns||[]).filter(c=>c.stage==="design"&&c.channel!=="Push notification"&&!isArchived(c));
  const[openId,setOpenId]=useState(null);
  const[imageModes,setImageModes]=useState({});
  const[designBusyMap,setDesignBusyMap]=useState({});
  const[designErrMap,setDesignErrMap]=useState({});
  React.useEffect(()=>{if(active?.id)setOpenId(active.id);},[active?.id]);
  const getImageMode=(id,fallback)=>imageModes[id]!==undefined?imageModes[id]:fallback;
  const setImageModeFor=(id,m)=>setImageModes(x=>({...x,[id]:m}));

  const DesignRow=({c})=>{
    const isOpen=openId===c.id;
    const copyOpts=c.data?.copyOptions||[];
    const selIdx=c.data?.selectedCopyIdx;
    const copy=selIdx!=null?copyOpts[selIdx]:null;
    const d=c.data?.design||{};
    const busy=designBusyMap[c.id]||"";
    const setBusy=(v)=>setDesignBusyMap(x=>({...x,[c.id]:v}));
    const err=designErrMap[c.id]||"";
    const setErr=(v)=>setDesignErrMap(x=>({...x,[c.id]:v}));
    const[ruleText,setRuleText]=useState("");
    const imageMode=getImageMode(c.id,d.imageSource||null);
    const setImageMode=(m)=>setImageModeFor(c.id,m);
    const ruleStr=activeRuleText(promptRules);
    const setD=(f)=>patch(c.id,{data:{...(c.data||{}),design:{...d,...f}}});
    const approvedPrompt=d.imagePrompts&&d.approvedPromptIdx!=null?d.imagePrompts[d.approvedPromptIdx]:null;
    const copyChangedAfterPrompts=d.imagePrompts&&d.promptsForCopyDir&&copy&&d.promptsForCopyDir!==copy.direction;

    if(!copy)return<div style={{borderBottom:`1px solid ${C.line}`,padding:"12px 18px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div><span style={{fontWeight:700,fontSize:13,color:C.ink}}>{c.product||"—"}</span><span style={{fontSize:12,color:C.sub,marginLeft:8}}>{normCrmType(c.crm_type)} · {c.channel||"WhatsApp"}</span></div>
      <span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11,fontWeight:700,color:"#92400E",background:"#FEF3C7",padding:"3px 9px",borderRadius:999}}>Copy not approved yet</span>
    </div>;

    const genNotes=async()=>{setBusy("notes");setErr("");
      try{
        const fb=recentFeedback("design");
        const brief=c.data?.brief||{};
        const sys="You are an art director for HUFT CRM creative.\n"+BRAND_CONTEXT+(fb?"\nRecent design feedback:\n"+fb:"")+"\nReturn ONLY JSON: {notes:['2 short directive art-direction notes — composition, hero, mood, brand cues']}";
        const usr="Product: "+c.product+"\nInsight: "+brief.strategicInsight+"\nIdea: "+brief.idea+"\nCopy direction: "+copy.direction+"\nHeader: "+copy.header;
        const j=await callClaude(sys,usr,true);setD({notes:j.notes});
      }catch(e){console.error("genNotes error:",e);setErr("Couldn't generate notes: "+(e.message||"check API key"));}setBusy("");
    };

    const genPrompts=async()=>{setBusy("prompts");setErr("");
      try{
        const fb=recentFeedback("design");
        const brief=c.data?.brief||{};
        const sys="You write TWO distinct image-generation prompts for HUFT "+c.channel+" CRM.\n"+BRAND_CONTEXT+"\nPROMPT RULES:\n"+ruleStr+(fb?"\nFeedback:\n"+fb:"")+"\nRules: real Indian-breed pet, correct pack proportions, no added text on pack, realistic lighting.\nReturn ONLY JSON: {prompts:[{label,tool,aspectRatio,prompt,negativePrompt}]}";
        const usr="Product: "+c.product+"\nInsight: "+(brief.strategicInsight||"")+"\nIdea: "+(brief.idea||"")+"\nCopy direction: "+copy.direction+"\nHeader: "+copy.header+"\nArt notes: "+(d.notes||[]).join(" | ");
        const j=await callClaude(sys,usr,true);
        setD({imageSource:"prompt",imagePrompts:j.prompts,approvedPromptIdx:null,libraryPick:null,promptsForCopyDir:copy.direction});
        setImageMode("prompt");
      }catch(e){console.error("genPrompts error:",e);setErr("Couldn't generate prompts: "+(e.message||"check API key"));}setBusy("");
    };

    const approvePrompt=(idx)=>{setD({imageSource:"prompt",approvedPromptIdx:idx});patch(c.id,{design_approver:me.name});};
    const _imgReady=(d.approvedPromptIdx!=null||d.libraryPick);
    const _dtone=_imgReady?ROW_TONE.design:ROW_TONE.attention;
    return<div style={{borderBottom:`1px solid ${C.line}`,borderLeft:`4px solid ${_dtone.bar}`}}>
      {/* Row header */}
      <div onClick={()=>setOpenId(isOpen?null:c.id)}
        style={{display:"flex",alignItems:"center",gap:12,padding:"14px 18px",cursor:"pointer",background:isOpen?"#F8F9FA":(_imgReady?_dtone.bg:"#fff")}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}>
            <span style={{fontWeight:800,fontSize:14,color:C.ink}}>{c.product||"—"}</span>
            <span style={{fontSize:11,fontWeight:700,color:C.coral}}>{normCrmType(c.crm_type)}</span>
            <span style={{fontSize:11,fontWeight:700,color:C.teal}}>· {c.channel||"WhatsApp"}</span>
          </div>
          <div style={{fontSize:12,color:C.sub,display:"flex",gap:6,alignItems:"center"}}><span>{parseName(c.name).date&&<b style={{color:C.ink,marginRight:4}}>{parseName(c.name).date}</b>}{copy.direction}</span>{c.created_at&&<span style={{marginLeft:"auto",fontSize:11,color:C.sub,background:"#F3F4F6",padding:"2px 7px",borderRadius:5,flexShrink:0}}>{fmtDate(c.created_at)}</span>}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
          {approvedPrompt?<span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11,fontWeight:700,color:"#0F766E",background:"#CCFBF1",padding:"3px 9px",borderRadius:999}}><CheckCircle2 size={11}/>Prompt approved</span>
          :d.imagePrompts?<span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11,fontWeight:700,color:"#1D4ED8",background:"#DBEAFE",padding:"3px 9px",borderRadius:999}}>Prompts ready</span>
          :<span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11,fontWeight:700,color:"#B91C1C",background:"#FEF2F2",padding:"3px 9px",borderRadius:999}}>Needs design</span>}
          <div onClick={e=>e.stopPropagation()}><RowActions c={c}patch={patch}me={me}onDelete={onDelete}/></div>
          {isOpen?<ChevronDown size={16}color={C.sub}/>:<ChevronRight size={16}color={C.sub}/>}
        </div>
      </div>

      {/* Expanded */}
      {isOpen&&<div style={{padding:"0 18px 18px",background:"#F8F9FA"}}>
        {/* Selected copy context */}
        <div style={{background:"#F5F3FF",border:"1px solid #DDD6FE",borderLeft:"3px solid "+C.purple,borderRadius:10,padding:"10px 14px",marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
            <span style={{fontSize:10,fontWeight:700,color:"#5B21B6",textTransform:"uppercase",letterSpacing:.6,display:"flex",alignItems:"center",gap:4}}><CheckCircle2 size={11}/>Approved copy</span>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:10.5,color:"#7C3AED",background:"#EDE9FE",padding:"2px 7px",borderRadius:5,fontWeight:600}}>{copy.direction}</span>
              <CopyBtn text={()=>copyTextFromOption(copy)}/>
            </div>
          </div>
          <div style={{fontWeight:700,fontSize:13.5,lineHeight:1.4,color:"#1E1B4B",marginBottom:4,whiteSpace:"pre-line"}}>{copy.header}</div>
          <div style={{fontSize:12,color:"#4C1D95",lineHeight:1.5,whiteSpace:"pre-line"}}>{copy.body}</div>
          <div style={{marginTop:6,fontSize:11,fontWeight:700,color:"#5B21B6"}}>{copy.cta} →</div>
        </div>

        {copyChangedAfterPrompts&&<div style={{display:"flex",alignItems:"center",gap:8,background:"#FEF3C7",border:"1px solid #FDE68A",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12.5,color:"#92400E",fontWeight:600}}><span>⚠️ Copy was updated after prompts were generated — regenerate prompts to match.</span></div>}
        {/* Image source picker */}
        {!imageMode&&<div style={{marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:700,color:C.sub,marginBottom:8}}>Choose image source</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div onClick={()=>setImageMode("prompt")}style={{border:`2px solid ${C.line}`,borderRadius:12,padding:14,cursor:"pointer",textAlign:"center"}}>
              <Wand2 size={20}color={C.coral}style={{marginBottom:6}}/>
              <div style={{fontWeight:700,fontSize:13}}>Generate prompts</div>
              <div style={{fontSize:12,color:C.sub}}>AI writes image prompts for FLUX/Gemini</div>
            </div>
            <div onClick={()=>{setImageMode("library");setD({imageSource:"library"});}}style={{border:`2px solid ${C.line}`,borderRadius:12,padding:14,cursor:"pointer",textAlign:"center"}}>
              <ImageIcon size={20}color={C.teal}style={{marginBottom:6}}/>
              <div style={{fontWeight:700,fontSize:13}}>Pick from library</div>
              <div style={{fontSize:12,color:C.sub}}>Use existing Drive assets</div>
            </div>
          </div>
          <button onClick={()=>setImageMode(null)}style={{display:"none"}}/>
        </div>}

        {/* Back to picker */}
        {imageMode&&<button onClick={()=>setImageMode(null)}style={{display:"flex",alignItems:"center",gap:5,background:"none",border:"none",cursor:"pointer",color:C.sub,fontSize:12.5,marginBottom:12,padding:0}}><ChevronRight size={13}style={{transform:"rotate(180deg)"}}/>Change image source</button>}

        {/* Art direction notes */}
        {imageMode==="prompt"&&<ArtNotes d={d}setD={setD}busy={busy}genNotes={genNotes}/>}

        {/* Image prompts */}
        {imageMode==="prompt"&&<div style={{marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <div style={{fontSize:12,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:.5}}>Image prompts</div>
            {busy==="prompts"?<Spin label="Generating…"/>:<Btn small onClick={e=>{e.stopPropagation();genPrompts();}}>{d.imagePrompts?"Regenerate":"Generate 2 prompts"}</Btn>}
          </div>
          {err&&<div style={{color:C.coral,fontSize:13,marginBottom:8}}>{err}</div>}
          {d.imagePrompts&&d.imagePrompts.map((p,i)=><div key={i}style={{border:`2px solid ${d.approvedPromptIdx===i?C.teal:C.line}`,borderRadius:10,padding:12,marginBottom:10,background:d.approvedPromptIdx===i?C.tealSoft:"#fff"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
              <span style={{fontWeight:700,fontSize:13,color:C.ink}}>{p.label}</span>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <span style={{fontSize:11,color:C.sub}}>{p.aspectRatio}</span>
                {d.approvedPromptIdx===i
                  ?<span style={{fontSize:11,color:C.teal,fontWeight:700,display:"flex",alignItems:"center",gap:3}}><CheckCircle2 size={12}/>Approved</span>
                  :<Btn small onClick={()=>approvePrompt(i)}>Approve</Btn>}
              </div>
            </div>
            <div style={{fontSize:12.5,lineHeight:1.55,color:C.ink,marginBottom:6}}>{p.prompt}</div>
            {p.negativePrompt&&<div style={{fontSize:11,color:C.sub}}><b>Avoid:</b> {p.negativePrompt}</div>}
          </div>)}
        </div>}

        {/* Library picker */}
        {imageMode==="library"&&<SmartLibraryPicker d={d}setD={setD}copy={copy}brief={c.data?.brief}product={c.product}campaignId={c.id}/>}

        {/* Compose the final creative in-app (product + image copy) */}
        {isOpen&&copy&&<CreativeComposer c={c}copy={copy}me={me}patch={patch}d={d}approvedPrompt={approvedPrompt}toast={(typeof toast!=="undefined"?toast:null)}/>}

        {/* Design complete flow — finish via composed file, an upload, or a link */}
        {(approvedPrompt||d.libraryPick||d.finalFile)&&<FinalDesignUpload c={c}d={d}patch={patch}me={me}/>}
        <FeedbackBar stage="design"by={me.name}onSave={saveFeedback}/>
        {/* Art direction comments — design context, available to everyone */}
        <CommentThread campaignId={c.id}context="design"me={me}/>
        {c.stage==="done"&&(me.role==="business"||me.role==="admin")&&<ReportUploader campaign={c}me={me}onUploaded={()=>patch(c.id,{has_report:true})}/>}
      </div>}
    </div>;
  };

  const[view,setView]=useState("list");
  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div><Eyebrow>Design</Eyebrow><h1 style={{margin:"4px 0 0",fontSize:24,fontWeight:800}}>Design</h1></div>
      <div style={{display:"flex",border:`1px solid ${C.line}`,borderRadius:8,overflow:"hidden"}}>
        <button onClick={()=>setView("list")}style={{padding:"6px 14px",border:"none",cursor:"pointer",fontSize:13,fontWeight:600,background:view==="list"?C.navy:"#fff",color:view==="list"?"#fff":C.sub,display:"flex",alignItems:"center",gap:5}}><LayoutDashboard size={13}/>List</button>
        <button onClick={()=>setView("calendar")}style={{padding:"6px 14px",border:"none",cursor:"pointer",fontSize:13,fontWeight:600,background:view==="calendar"?C.navy:"#fff",color:view==="calendar"?"#fff":C.sub,display:"flex",alignItems:"center",gap:5}}><CalendarIcon size={13}/>Calendar</button>
      </div>
    </div>
    {view==="calendar"
      ?<CalendarView campaigns={allDesign}onOpen={onOpen}filterStage="design"/>
      :allDesign.length===0
      ?<Card><Empty icon={<Palette size={26}color={C.sub}/>}title="No design pending"sub="Assets move here after copy is selected."/></Card>
      :<div>
        {(()=>{
          const needsDesign=allDesign.filter(c=>!(c.data?.design?.approvedPromptIdx!=null||c.data?.design?.libraryPick));
          const done=allDesign.filter(c=>c.data?.design?.approvedPromptIdx!=null||c.data?.design?.libraryPick);
          const archivedDesign=(campaigns||[]).filter(c=>isArchived(c)&&c.data?.design);
          return<>
            {needsDesign.length>0&&<div style={{marginBottom:16}}>
              <div style={{fontSize:11,fontWeight:700,color:C.coral,textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>⬤ Needs attention · {needsDesign.length}</div>
              {groupByDate(needsDesign).map(([date,items])=><div key={date}style={{marginBottom:10}}><DateGroupHeader date={date}count={items.length}color={C.teal}/><Card style={{padding:0,overflow:"hidden"}}>{items.map(c=><DesignRow key={c.id}c={c}/>)}</Card></div>)}
            </div>}
            {done.length>0&&<div>
              <div style={{fontSize:11,fontWeight:700,color:C.teal,textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>✓ Image selected · {done.length}</div>
              <div style={{opacity:.75}}>{groupByDate(done).map(([date,items])=><div key={date}style={{marginBottom:10}}><DateGroupHeader date={date}count={items.length}color={C.teal}/><Card style={{padding:0,overflow:"hidden"}}>{items.map(c=><DesignRow key={c.id}c={c}/>)}</Card></div>)}</div>
            </div>}
            {archivedDesign.length>0&&<div style={{marginTop:16}}>
              <div style={{fontSize:11,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Archived · {archivedDesign.length}</div>
              <div style={{opacity:.5}}>{groupByDate(archivedDesign).map(([date,items])=><div key={date}style={{marginBottom:8}}><DateGroupHeader date={date}count={items.length}color={C.sub}/><Card style={{padding:0,overflow:"hidden"}}>{items.map(c=><DesignRow key={c.id}c={c}/>)}</Card></div>)}</div>
            </div>}
          </>;
        })()}
      </div>}
  </div>;
}


function DoneTab({campaigns,patch,onOpen,me,setTab,onDelete}){
  const allDone=(campaigns||[]).filter(c=>c.stage==="done"&&!isArchived(c)).sort((a,b)=>new Date(b.updated_at||b.created_at)-new Date(a.updated_at||a.created_at));
  const[view,setView]=useState("list");
  const[reactivating,setReactivating]=useState(null);
  const reactivate=(c)=>{
    const hasCopy=!!(c.data?.copyOptions);
    const hasDesign=!!(c.data?.design?.approvedPromptIdx!=null||c.data?.design?.libraryPick);
    if(hasCopy){
      setReactivating(c);
    } else {
      patch(c.id,{stage:"content"});
      setTab("content");
      onOpen(c.id,"content");
    }
  };
  const doReactivate=(c,stage)=>{
    patch(c.id,{stage});
    setTab(stage);
    onOpen(c.id,stage);
    setReactivating(null);
  };
  const[openId,setOpenId]=useState(null);
  const DoneRow=({c})=>{
    const isOpen=openId===c.id;
    const brief=c.data?.brief;
    const opts=c.data?.copyOptions;
    const sel=c.data?.selectedCopyIdx;
    const copy=sel!=null?opts?.[sel]:null;
    const p=parseName(c.name);
    const design=c.data?.design||{};
    const approvedPrompt=design.imagePrompts&&design.approvedPromptIdx!=null?design.imagePrompts[design.approvedPromptIdx]:null;
    const libPick=design.libraryPick?(design.libraryPickMeta||{label:"Library image",desc:""}):null;
    const finalFile=design.finalFile;
    const tone=ROW_TONE.done;
    const canManage=me.role==="admin"||me.role==="business";
    return<div style={{borderBottom:`1px solid ${C.line}`,borderLeft:`4px solid ${tone.bar}`,background:tone.bg}}>
      {/* Collapsed header — click to expand */}
      <div onClick={()=>setOpenId(isOpen?null:c.id)}style={{display:"flex",alignItems:"center",gap:12,padding:"14px 18px",cursor:"pointer"}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3,flexWrap:"wrap"}}>
            <span style={{fontWeight:800,fontSize:14,color:C.ink}}>{c.product||p.product||"—"}</span>
            <span style={{fontSize:11,fontWeight:700,color:C.coral}}>{normCrmType(c.crm_type)}</span>
            <span style={{fontSize:11,fontWeight:700,color:C.teal}}>· {c.channel||"WhatsApp"}</span>
            <span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11,fontWeight:700,color:C.green,background:C.green+"18",padding:"3px 9px",borderRadius:999}}><CheckCircle2 size={11}/>Done</span>
            {c.created_at&&<span style={{marginLeft:"auto",fontSize:11,color:C.sub,background:"#F3F4F6",padding:"2px 7px",borderRadius:5}}>{fmtDate(c.created_at)}</span>}
          </div>
          <div style={{fontSize:12,color:C.sub,display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
            {p.date&&<b style={{color:C.ink}}>{p.date}</b>}
            {(c.audience_label||c.segment)&&<span>· {c.audience_label||c.segment}</span>}
            <span style={{display:"flex",gap:5,marginLeft:4}}>
              {[["brief","Brief",C.coral],["content","Copy",C.purple],["design","Design",C.teal]].map(([s,l,col])=>{
                const has=s==="brief"?!!brief:s==="content"?!!opts:!!(approvedPrompt||libPick);
                return has?<span key={s}style={{fontSize:10.5,background:col+"15",color:col,padding:"1px 7px",borderRadius:5,fontWeight:700}}>✓ {l}</span>:null;
              })}
              {finalFile&&<span style={{fontSize:10.5,background:C.green+"15",color:C.green,padding:"1px 7px",borderRadius:5,fontWeight:700}}>✓ File</span>}
              {c.has_report&&<span style={{fontSize:10.5,background:C.green+"15",color:C.green,padding:"1px 7px",borderRadius:5,fontWeight:700}}>✓ Report</span>}
            </span>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
          {copy&&<div onClick={e=>e.stopPropagation()}><CopyBtn text={()=>copyTextFromOption(copy)}/></div>}
          {isOpen?<ChevronDown size={16}color={C.sub}/>:<ChevronRight size={16}color={C.sub}/>}
        </div>
      </div>
      {/* Expanded detail */}
      {isOpen&&<div style={{padding:"0 18px 16px"}}>
        {brief&&<div style={{fontSize:12.5,color:C.ink,marginBottom:8,lineHeight:1.5,fontWeight:600}}>{brief.idea}</div>}
        {copy&&<div style={{marginBottom:8,background:"#fff",borderRadius:8,padding:"10px 13px",borderLeft:"3px solid "+C.purple,border:`1px solid ${C.line}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
            <div style={{fontSize:10,fontWeight:700,color:C.purple,textTransform:"uppercase",letterSpacing:.5}}>Approved copy</div>
            <CopyBtn text={()=>copyTextFromOption(copy)}/>
          </div>
          <div style={{fontWeight:700,fontSize:13,color:"#1E1B4B",marginBottom:3,whiteSpace:"pre-line"}}>{copy.header}</div>
          <div style={{fontSize:12,color:"#4C1D95",lineHeight:1.5,whiteSpace:"pre-line"}}>{copy.body}</div>
          <div style={{marginTop:5,fontSize:11,fontWeight:700,color:C.purple}}>{copy.cta} →</div>
        </div>}
        {approvedPrompt&&<div style={{marginBottom:8,background:"#fff",borderRadius:8,padding:"10px 13px",borderLeft:"3px solid "+C.teal,border:`1px solid ${C.line}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
            <div style={{fontSize:10,fontWeight:700,color:C.teal,textTransform:"uppercase",letterSpacing:.5}}>Image prompt — {approvedPrompt.label}</div>
            <CopyBtn text={()=>approvedPrompt.prompt||""}label="Copy prompt"/>
          </div>
          <div style={{fontSize:11.5,color:"#134E4A",lineHeight:1.5,marginBottom:4}}>{approvedPrompt.prompt}</div>
          {approvedPrompt.aspectRatio&&<div style={{fontSize:10.5,color:C.sub}}>Aspect ratio: {approvedPrompt.aspectRatio} · Tool: {approvedPrompt.tool}</div>}
        </div>}
        {libPick&&<div style={{marginBottom:8,background:"#fff",borderRadius:8,padding:"10px 13px",borderLeft:"3px solid "+C.teal,border:`1px solid ${C.line}`}}>
          <div style={{fontSize:10,fontWeight:700,color:C.teal,textTransform:"uppercase",letterSpacing:.5,marginBottom:3}}>Library image selected</div>
          <div style={{fontSize:12.5,fontWeight:600,color:"#134E4A"}}>{libPick.label}</div>
          <div style={{fontSize:11,color:C.sub}}>{libPick.desc}</div>
        </div>}
        {(finalFile||design.finalLink)&&<div style={{marginBottom:8,background:"#fff",borderRadius:8,padding:"10px 13px",border:`1px solid ${C.line}`,display:"flex",alignItems:"center",gap:10}}>
          {finalFile&&(finalFile.type||"").startsWith("image/")
            ?<img src={finalFile.dataUrl}alt={finalFile.name}style={{width:46,height:46,objectFit:"cover",borderRadius:8,flexShrink:0}}/>
            :<div style={{width:46,height:46,borderRadius:8,background:C.tealSoft,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><FileText size={20}color={C.teal}/></div>}
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:10,fontWeight:700,color:C.green,textTransform:"uppercase",letterSpacing:.5,marginBottom:2}}>Final design</div>
            <div style={{fontSize:12.5,fontWeight:600,color:C.ink,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{finalFile?finalFile.name:design.finalLink}</div>
          </div>
          {finalFile&&<a href={finalFile.dataUrl}download={finalFile.name}style={{fontSize:11.5,fontWeight:600,color:C.ink,textDecoration:"none",border:`1px solid ${C.line}`,borderRadius:7,padding:"4px 9px",display:"inline-flex",alignItems:"center",gap:4}}><Download size={12}/>Download</a>}
          {design.finalLink&&<a href={design.finalLink}target="_blank"rel="noreferrer"style={{fontSize:11.5,fontWeight:600,color:C.teal,textDecoration:"none",display:"inline-flex",alignItems:"center",gap:4}}><ExternalLink size={12}/>Open</a>}
        </div>}
        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",marginTop:6}}>
          <button onClick={()=>reactivate(c)}style={{fontSize:12,padding:"5px 10px",borderRadius:7,border:`1px solid ${C.line}`,background:"#fff",cursor:"pointer",color:C.ink,fontWeight:600,display:"inline-flex",alignItems:"center",gap:4}}><RotateCcw size={12}/>Reactivate</button>
          {canManage&&<button onClick={()=>{if(window.confirm("Archive this asset? It moves to the Archive tab."))patch(c.id,{data:{archived:true}});}}style={{fontSize:12,padding:"5px 10px",borderRadius:7,border:`1px solid ${C.line}`,background:"#fff",cursor:"pointer",color:C.sub,fontWeight:600}}>Archive</button>}
          {canManage&&<button onClick={()=>onDelete&&onDelete(c.id)}style={{fontSize:12,padding:"5px 10px",borderRadius:7,border:"1px solid #FECACA",background:"#FFF5F5",cursor:"pointer",color:"#B91C1C",fontWeight:600}}>Delete</button>}
        </div>
      </div>}
    </div>;
  };
  return<div>
    {reactivating&&<div onClick={()=>setReactivating(null)}style={{position:"fixed",inset:0,background:"rgba(15,18,30,.5)",zIndex:50,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()}style={{background:"#fff",borderRadius:16,padding:28,width:360,boxShadow:"0 8px 32px rgba(0,0,0,.2)"}}>
        <div style={{fontWeight:800,fontSize:17,marginBottom:6}}>Reactivate {reactivating.product||"asset"}</div>
        <div style={{fontSize:13,color:C.sub,marginBottom:20}}>Where do you want to send it back to?</div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>

            <div style={{width:36,height:36,borderRadius:8,background:C.purple,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><MessageSquare size={16}color="#fff"/></div>
            <div><div style={{fontWeight:700,fontSize:14,color:C.purple}}>Copy tab</div><div style={{fontSize:12,color:C.sub}}>Pick a different copy option or regenerate</div></div>
          </button>
          <button onClick={()=>doReactivate(reactivating,"design")}style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",borderRadius:10,border:`2px solid ${C.teal}`,background:C.tealSoft,cursor:"pointer",textAlign:"left"}}>
            <div style={{width:36,height:36,borderRadius:8,background:C.teal,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Palette size={16}color="#fff"/></div>
            <div><div style={{fontWeight:700,fontSize:14,color:C.teal}}>Design tab</div><div style={{fontSize:12,color:C.sub}}>Change image source or update prompts</div></div>
          </button>
        </div>
        <button onClick={()=>setReactivating(null)}style={{marginTop:14,width:"100%",background:"none",border:"none",cursor:"pointer",color:C.sub,fontSize:13,fontWeight:600}}>Cancel</button>
      </div>
    </div>}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div><Eyebrow color={C.green}>Done</Eyebrow><h1 style={{margin:"4px 0 0",fontSize:24,fontWeight:800}}>Done & ready</h1></div>
    </div>
    {allDone.length===0
      ?<Card><Empty icon={<CheckCircle2 size={26}color={C.sub}/>}title="Nothing done yet"sub="Completed, ready-to-go-live assets appear here. Archived assets live in the Archive tab."/></Card>
      :<Card style={{padding:0,overflow:"hidden"}}>
        {allDone.map(c=><DoneRow key={c.id}c={c}/>)}
      </Card>}
  </div>;
}


function AnalyticsTab({campaigns,patch,onOpen,me}){
  const[finalOnly,setFinalOnly]=useState(true);
  const[editId,setEditId]=useState(null);
  const[form,setForm]=useState({});
  const thisMonth=new Date().toISOString().slice(0,7);
  const[repMonth,setRepMonth]=useState(thisMonth);
  const nf=n=>(n||n===0)?Number(n).toLocaleString("en-IN"):"—";
  const pct=(a,b)=>(b&&Number(b)>0)?((Number(a)/Number(b))*100):null;
  const pf=v=>v==null?"—":v.toFixed(1)+"%";
  const A=c=>(c.data&&c.data.analytics)||null;
  // assets eligible for analytics: finalized (done) by default, or anything with metrics already; toggle shows all reached-content assets
  const pool=(campaigns||[]).filter(c=>!isArchived(c)).filter(c=>{
    const reached=c.stage==="done"||c.stage==="design"||c.stage==="brand_review"||A(c);
    return finalOnly?(c.stage==="done"||A(c)):reached;
  }).sort((a,b)=>(A(b)?1:0)-(A(a)?1:0)||new Date(b.updated_at||0)-new Date(a.updated_at||0));
  // roll-up totals
  const withM=pool.filter(A);
  const tot=withM.reduce((t,c)=>{const a=A(c);["sent","delivered","read","clicks","orders","revenue"].forEach(k=>t[k]+=Number(a[k]||0));return t;},{sent:0,delivered:0,read:0,clicks:0,orders:0,revenue:0});
  const startEdit=c=>{const a=A(c)||{};setForm({sent:a.sent??"",delivered:a.delivered??"",read:a.read??"",clicks:a.clicks??"",orders:a.orders??"",revenue:a.revenue??"",notes:a.notes||""});setEditId(c.id);};
  const save=c=>{
    const clean={};["sent","delivered","read","clicks","orders","revenue"].forEach(k=>{const v=form[k];clean[k]=v===""||v==null?null:Number(v);});
    clean.notes=form.notes||"";clean.updated_by=me.name;clean.updated_at=new Date().toISOString();
    patch(c.id,{data:{...(c.data||{}),analytics:clean}});
    setEditId(null);
  };
  const exportReport=()=>{
    const inMonth=(campaigns||[]).filter(c=>!isArchived(c)&&c.go_live_date&&String(c.go_live_date).slice(0,7)===repMonth);
    const r2=(x,y)=>y>0?+((x/y)*100).toFixed(1):"";
    const rows=inMonth.map(c=>{const a=A(c)||{};
      const sent=Number(a.sent||0),del=Number(a.delivered||0),read=Number(a.read||0),clk=Number(a.clicks||0);
      return {"Go-live":String(c.go_live_date).slice(0,10),"Product":c.product||parseName(c.name).product||c.name,
        "Customer / Audience":c.audience_label||c.segment||"","CRM type":normCrmType(c.crm_type),"Channel":c.channel||"WhatsApp",
        "Stage":STAGE_LABEL[c.stage]||c.stage,"Sent":a.sent==null?"":sent,"Delivered":a.delivered==null?"":del,"Read":a.read==null?"":read,
        "Clicks":a.clicks==null?"":clk,"Orders":a.orders==null?"":Number(a.orders||0),"Revenue":a.revenue==null?"":Number(a.revenue||0),
        "Delivered %":r2(del,sent),"Read %":r2(read,del),"CTR %":r2(clk,del),"Notes":a.notes||""};});
    if(rows.length===0){window.alert("No assets have a go-live date in "+repMonth+". Set go-live dates on the briefs, or pick another month.");return;}
    const sum=k=>inMonth.reduce((t,c)=>t+Number((A(c)||{})[k]||0),0);
    const tSent=sum("sent"),tDel=sum("delivered"),tRead=sum("read"),tClk=sum("clicks");
    rows.push({});
    rows.push({"Product":"TOTAL","Sent":tSent,"Delivered":tDel,"Read":tRead,"Clicks":tClk,"Orders":sum("orders"),"Revenue":sum("revenue"),
      "Delivered %":tSent>0?+((tDel/tSent)*100).toFixed(1):"","Read %":tDel>0?+((tRead/tDel)*100).toFixed(1):"","CTR %":tDel>0?+((tClk/tDel)*100).toFixed(1):""});
    const header=["Go-live","Product","Customer / Audience","CRM type","Channel","Stage","Sent","Delivered","Read","Clicks","Orders","Revenue","Delivered %","Read %","CTR %","Notes"];
    const ws=XLSX.utils.json_to_sheet(rows,{header});
    ws["!cols"]=[{wch:11},{wch:26},{wch:24},{wch:9},{wch:14},{wch:14},{wch:9},{wch:10},{wch:8},{wch:8},{wch:8},{wch:10},{wch:11},{wch:8},{wch:8},{wch:30}];
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,repMonth);
    XLSX.writeFile(wb,"HUFT_CRM_Performance_"+repMonth+".xlsx");
  };
  const num=(label,key,ph)=><div style={{flex:1,minWidth:120}}><div style={{fontSize:11,fontWeight:700,color:C.sub,marginBottom:4}}>{label}</div><input type="number"value={form[key]}onChange={e=>setForm(f=>({...f,[key]:e.target.value}))}placeholder={ph||"0"}style={{width:"100%",border:`1px solid ${C.line}`,borderRadius:8,padding:"8px 10px",fontSize:14,boxSizing:"border-box"}}/></div>;
  const Stat=({label,val,sub})=><Card style={{padding:14}}><div style={{fontSize:11,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:.4}}>{label}</div><div style={{fontSize:24,fontWeight:800,color:C.ink,marginTop:3}}>{val}</div>{sub&&<div style={{fontSize:11,color:C.sub,marginTop:2}}>{sub}</div>}</Card>;
  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:16}}>
      <div><Eyebrow color={C.coral}>Analytics</Eyebrow><h1 style={{margin:"4px 0 0",fontSize:24,fontWeight:800}}>Performance</h1>
        <div style={{fontSize:13,color:C.sub,marginTop:4}}>Log how each asset performed. Metrics mirror the CRM sheet: Sent, Delivered, Read — plus clicks, orders and revenue.</div></div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <input type="month"value={repMonth}onChange={e=>setRepMonth(e.target.value)}title="Report month (by go-live date)"style={{border:`1px solid ${C.line}`,borderRadius:8,padding:"7px 10px",fontSize:13,color:C.ink}}/>
        <Btn onClick={exportReport}><BarChart3 size={15}/>Download month report</Btn>
        <button onClick={()=>setFinalOnly(v=>!v)}style={{fontSize:12.5,fontWeight:600,padding:"7px 13px",borderRadius:999,border:`1px solid ${C.line}`,background:"#fff",color:C.sub,cursor:"pointer"}}>{finalOnly?"Finalized only":"All in-flight"}</button>
      </div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:18}}>
      <Stat label="Total sent"val={nf(tot.sent)}sub={`${withM.length} asset${withM.length!==1?"s":""} with data`}/>
      <Stat label="Avg delivered"val={pf(pct(tot.delivered,tot.sent))}sub={`${nf(tot.delivered)} delivered`}/>
      <Stat label="Avg read"val={pf(pct(tot.read,tot.delivered))}sub={`${nf(tot.read)} read`}/>
      <Stat label="Revenue"val={"₹"+nf(tot.revenue)}sub={`${nf(tot.orders)} orders`}/>
    </div>
    {pool.length===0
      ?<Card><Empty icon={<BarChart3 size={26}color={C.sub}/>}title="No assets to report on yet"sub="Finalized assets appear here so you can log their performance. Toggle to all in-flight to log earlier."/></Card>
      :<Card style={{padding:0,overflow:"hidden"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 16px",fontSize:11,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:.4,background:C.paper,borderBottom:`1px solid ${C.line}`}}>
          <span style={{flex:2}}>Asset</span><span style={{flex:1,textAlign:"right"}}>Sent</span><span style={{flex:1,textAlign:"right"}}>Deliv.</span><span style={{flex:1,textAlign:"right"}}>Read</span><span style={{flex:1,textAlign:"right"}}>CTR</span><span style={{flex:1,textAlign:"right"}}>Orders</span><span style={{width:90,textAlign:"right"}}></span>
        </div>
        {pool.map(c=>{
          const a=A(c);const open=editId===c.id;
          const dRate=a?pct(a.delivered,a.sent):null,rRate=a?pct(a.read,a.delivered):null,ctr=a?pct(a.clicks,a.delivered):null;
          return<div key={c.id}style={{borderBottom:`1px solid ${C.line}`}}>
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"12px 16px"}}>
              <div style={{flex:2,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:13.5,color:C.ink,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.product||parseName(c.name).product||c.name}</div>
                <div style={{fontSize:11.5,color:C.sub}}>{normCrmType(c.crm_type)} · {c.channel||"WhatsApp"}{c.stage==="done"?"":" · "+(STAGE_LABEL[c.stage]||c.stage)}</div>
              </div>
              <span style={{flex:1,textAlign:"right",fontSize:13,color:a?C.ink:C.sub}}>{a?nf(a.sent):"—"}</span>
              <span style={{flex:1,textAlign:"right",fontSize:13,color:dRate!=null?C.ink:C.sub}}>{pf(dRate)}</span>
              <span style={{flex:1,textAlign:"right",fontSize:13,color:rRate!=null?C.ink:C.sub}}>{pf(rRate)}</span>
              <span style={{flex:1,textAlign:"right",fontSize:13,color:ctr!=null?C.ink:C.sub}}>{pf(ctr)}</span>
              <span style={{flex:1,textAlign:"right",fontSize:13,color:a?C.ink:C.sub}}>{a?nf(a.orders):"—"}</span>
              <div style={{width:90,textAlign:"right"}}><button onClick={()=>open?setEditId(null):startEdit(c)}style={{fontSize:12,fontWeight:700,padding:"5px 11px",borderRadius:8,border:"none",cursor:"pointer",background:a?C.coralSoft:C.coral,color:a?C.coral:"#fff"}}>{a?"Edit":"Add"}</button></div>
            </div>
            {open&&<div style={{padding:"4px 16px 16px",background:C.paper}}>
              <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                {num("Sent","sent")}{num("Delivered","delivered")}{num("Read","read")}{num("Clicks","clicks")}{num("Orders","orders")}{num("Revenue (₹)","revenue")}
              </div>
              <div style={{marginTop:10}}><div style={{fontSize:11,fontWeight:700,color:C.sub,marginBottom:4}}>Notes</div><input value={form.notes}onChange={e=>setForm(f=>({...f,notes:e.target.value}))}placeholder="What worked, what to try next…"style={{width:"100%",border:`1px solid ${C.line}`,borderRadius:8,padding:"8px 10px",fontSize:14,boxSizing:"border-box"}}/></div>
              <div style={{display:"flex",gap:8,marginTop:12}}>
                <Btn onClick={()=>save(c)}>Save metrics</Btn>
                <Btn variant="ghost"onClick={()=>setEditId(null)}>Cancel</Btn>
                {a&&a.updated_by&&<span style={{fontSize:11,color:C.sub,alignSelf:"center"}}>last updated by {a.updated_by}</span>}
              </div>
            </div>}
            {a&&!open&&a.notes&&<div style={{padding:"0 16px 11px",fontSize:12,color:C.sub,fontStyle:"italic"}}>“{a.notes}”</div>}
          </div>;
        })}
      </Card>}
  </div>;
}

function ArchiveTab({campaigns,patch,onOpen,me,onDelete}){
  const[q,setQ]=useState("");
  const[fStage,setFStage]=useState("all");
  const[fCrm,setFCrm]=useState("all");
  const archived=(campaigns||[]).filter(c=>isArchived(c)).sort((a,b)=>new Date(b.updated_at||b.created_at)-new Date(a.updated_at||a.created_at));
  const canManage=me.role==="admin"||me.role==="business";
  const restore=(c)=>{if(window.confirm("Restore this asset back into the active pipeline?"))patch(c.id,{data:{archived:false}});};
  const ql=q.trim().toLowerCase();
  const filtered=archived.filter(c=>{
    if(fStage!=="all"&&c.stage!==fStage)return false;
    if(fCrm!=="all"&&normCrmType(c.crm_type)!==fCrm)return false;
    if(!ql)return true;
    const p=parseName(c.name);
    const hay=[c.product,p.product,c.name,c.channel,c.audience_label,c.segment,c.objective,c.crm_type,c.copy_approver,c.design_approver,c.data&&c.data.brief&&c.data.brief.idea].filter(Boolean).join(" ").toLowerCase();
    return hay.includes(ql);
  });
  const pill=(on,label,onClick)=><button onClick={onClick}style={{fontSize:12,fontWeight:600,padding:"5px 11px",borderRadius:999,border:`1px solid ${on?C.coral:C.line}`,background:on?C.coralSoft:"#fff",color:on?C.coral:C.sub,cursor:"pointer"}}>{label}</button>;
  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div><Eyebrow color={C.sub}>Archive</Eyebrow><h1 style={{margin:"4px 0 0",fontSize:24,fontWeight:800}}>Archived</h1></div>
      <div style={{fontSize:13,color:C.sub,fontWeight:600}}>{filtered.length} of {archived.length}</div>
    </div>
    <Card style={{padding:12,marginBottom:14}}>
      <div style={{display:"flex",alignItems:"center",gap:8,border:`1px solid ${C.line}`,borderRadius:10,padding:"9px 12px",background:"#fff"}}>
        <SearchIcon size={17}color={C.sub}/>
        <input value={q}onChange={e=>setQ(e.target.value)}placeholder="Search archive by product, audience, channel, objective, idea…"style={{border:"none",outline:"none",flex:1,fontSize:14,background:"transparent",color:C.ink}}/>
        {q&&<button onClick={()=>setQ("")}style={{border:"none",background:"none",cursor:"pointer",color:C.sub,display:"flex"}}><X size={16}/></button>}
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:10,alignItems:"center"}}>
        <span style={{fontSize:11,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:.4,marginRight:2}}>Stage</span>
        {pill(fStage==="all","All",()=>setFStage("all"))}
        {["brief","content","brand_review","design","done"].map(s=><span key={s}>{pill(fStage===s,STAGE_LABEL[s]||s,()=>setFStage(s))}</span>)}
        <span style={{width:1,height:18,background:C.line,margin:"0 4px"}}/>
        <span style={{fontSize:11,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:.4,marginRight:2}}>Type</span>
        {pill(fCrm==="all","All",()=>setFCrm("all"))}
        {["D2C","Retail"].map(t=><span key={t}>{pill(fCrm===t,t,()=>setFCrm(t))}</span>)}
        {(fStage!=="all"||fCrm!=="all"||q)&&<button onClick={()=>{setFStage("all");setFCrm("all");setQ("");}}style={{marginLeft:"auto",fontSize:12,fontWeight:700,padding:"5px 11px",borderRadius:999,border:"none",background:C.coral,color:"#fff",cursor:"pointer",display:"flex",alignItems:"center",gap:5}}><X size={13}/>Clear filters</button>}
      </div>
    </Card>
    {filtered.length===0
      ?<Card><Empty icon={<ArchiveIcon size={26}color={C.sub}/>}title={archived.length?"No matches for the current filters":"Nothing archived"}sub={archived.length?`There are ${archived.length} archived asset${archived.length!==1?"s":""}, but none match your search/filters.`:"Assets you archive from any stage land here. They stay out of the active pipeline until restored."}action={archived.length?<Btn variant="ghost"onClick={()=>{setFStage("all");setFCrm("all");setQ("");}}><X size={14}/>Clear filters</Btn>:null}/></Card>
      :<Card style={{padding:0,overflow:"hidden"}}>
        {filtered.map(c=>{
          const brief=c.data?.brief;const p=parseName(c.name);
          return<div key={c.id}style={{borderBottom:`1px solid ${C.line}`,padding:"14px 18px",display:"flex",alignItems:"flex-start",gap:12,opacity:.85}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3,flexWrap:"wrap"}}>
                <span style={{fontWeight:800,fontSize:14,color:C.ink}}>{c.product||p.product||"—"}</span>
                <span style={{fontSize:11,fontWeight:700,color:C.coral}}>{normCrmType(c.crm_type)}</span>
                <span style={{fontSize:11,fontWeight:700,color:C.teal}}>· {c.channel||"WhatsApp"}</span>
                <StageBadge stage={c.stage}/>
                {c.created_at&&<span style={{fontSize:11,color:C.sub,background:"#F3F4F6",padding:"2px 7px",borderRadius:5}}>{fmtDate(c.created_at)}</span>}
              </div>
              {(c.audience_label||c.segment)&&<div style={{fontSize:12,color:C.sub}}>{c.audience_label||c.segment}{c.objective?" · "+c.objective:""}</div>}
              {brief&&<div style={{fontSize:12,color:C.sub,marginTop:3,lineHeight:1.4}}>{brief.idea}</div>}
            </div>
            <div style={{display:"flex",gap:6,flexShrink:0,alignItems:"center"}}>
              {canManage&&<button onClick={()=>restore(c)}style={{fontSize:12,padding:"5px 10px",borderRadius:7,border:`1px solid ${C.line}`,background:"#fff",cursor:"pointer",color:C.ink,fontWeight:600,display:"flex",alignItems:"center",gap:4}}><RotateCcw size={12}/>Restore</button>}
              {canManage&&onDelete&&<button onClick={()=>onDelete(c.id)}style={{fontSize:12,padding:"5px 10px",borderRadius:7,border:"1px solid #FECACA",background:"#FFF5F5",cursor:"pointer",color:"#B91C1C",fontWeight:600}}>Delete</button>}
            </div>
          </div>;
        })}
      </Card>}
  </div>;
}


function RulesDrawer({onClose,copyRules,promptRules,addRule,toggleRule,delRule,me,feedback}){
  const[suggestions,setSuggestions]=useState(null);
  const[sugBusy,setSugBusy]=useState(false);
  const[dismissed,setDismissed]=useState([]);

  const suggestFromFeedback=async()=>{
    setSugBusy(true);setSuggestions(null);
    try{
      const fbText=(feedback||[]).slice(0,10).map(f=>`[${f.stage}] ${f.text}`).join("\n")||"(no feedback yet)";
      const existingCopy=copyRules.map(r=>r.text).join("\n");
      const existingPrompt=promptRules.map(r=>r.text).join("\n");
      const sys=`You are a CRM creative strategist for HUFT (Indian pet care brand). Analyse the team's generation feedback and suggest new rulebook rules to improve future AI outputs. Return ONLY JSON: {copy:[string,string,string],prompt:[string,string,string]} — 3 copy rules and 3 design/prompt rules. Rules must be concise, actionable, and not duplicate existing rules.`;
      const usr=`Recent feedback:\n${fbText}\n\nExisting copy rules:\n${existingCopy}\n\nExisting prompt rules:\n${existingPrompt}`;
      const j=await callClaude(sys,usr,true);
      setSuggestions(j);
    }catch(e){console.error(e);}
    setSugBusy(false);
  };

  const accept=(type,text)=>{addRule(type,text);setDismissed(d=>[...d,text]);};
  const dismiss=(text)=>setDismissed(d=>[...d,text]);

  const Section=({title,color,rules,type,placeholder})=>{
    const[t,setT]=useState("");
    const add=()=>{if(!t.trim())return;addRule(type,t.trim());setT("");};
    const sugs=(suggestions?suggestions[type==="copy"?"copy":"prompt"]||[]:[]).filter(s=>!dismissed.includes(s)&&!rules.find(r=>r.text===s));
    return<div style={{marginBottom:22}}>
      <div style={{fontWeight:800,fontSize:14.5,color,marginBottom:8}}>{title} <span style={{color:C.sub,fontWeight:600}}>({rules.length})</span></div>
      {sugs.length>0&&<div style={{marginBottom:10,background:color+"0D",border:`1px solid ${color}33`,borderRadius:10,padding:"10px 12px"}}>
        <div style={{fontSize:11,fontWeight:700,color,textTransform:"uppercase",letterSpacing:.5,marginBottom:8,display:"flex",alignItems:"center",gap:5}}><Sparkles size={12}/>Suggested from feedback</div>
        {sugs.map((s,i)=><div key={i}style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:7,fontSize:13,color:C.ink}}>
          <div style={{flex:1,lineHeight:1.4}}>{s}</div>
          <div style={{display:"flex",gap:5,flexShrink:0}}>
            <button onClick={()=>accept(type,s)}style={{background:color,color:"#fff",border:"none",borderRadius:6,padding:"3px 9px",fontSize:11.5,fontWeight:700,cursor:"pointer"}}>+ Add</button>
            <button onClick={()=>dismiss(s)}style={{background:"transparent",color:C.sub,border:`1px solid ${C.line}`,borderRadius:6,padding:"3px 7px",fontSize:11.5,cursor:"pointer"}}>✕</button>
          </div>
        </div>)}
      </div>}
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        <input value={t}onChange={e=>setT(e.target.value)}onKeyDown={e=>e.key==="Enter"&&add()}placeholder={placeholder}style={{flex:1,border:`1px solid ${C.line}`,borderRadius:9,padding:"8px 10px",fontSize:13.5,boxSizing:"border-box"}}/>
        <Btn small onClick={add}disabled={!t.trim()}><Plus size={14}/></Btn>
      </div>
      {rules.length===0?<div style={{fontSize:13,color:C.sub}}>No rules yet.</div>
      :rules.map(r=><div key={r.id}style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderTop:`1px solid ${C.line}`}}>
        <button onClick={()=>toggleRule(r.id)}style={{border:"none",background:"transparent",cursor:"pointer",color:r.active?color:C.sub}}>{r.active?<CheckCircle2 size={18}/>:<Circle size={18}/>}</button>
        <div style={{flex:1,fontSize:13,lineHeight:1.45,opacity:r.active?1:.45,textDecoration:r.active?"none":"line-through"}}>{r.text}</div>
        {me.role==="admin"&&<button onClick={()=>delRule(r.id)}style={{border:"none",background:"transparent",cursor:"pointer",color:C.sub}}><Trash2 size={15}/></button>}
      </div>)}
    </div>;
  };

  const[seeding,setSeeding]=useState(false);
  const seedRules=async()=>{if(!window.confirm("This will replace ALL rules with the default HUFT rulebook. Continue?"))return;setSeeding(true);try{const r=await api.post("/api/rules/seed",{});window.location.reload();}catch(e){alert("Seed failed: "+e.message);}setSeeding(false);};
  const hasFeedback=(feedback||[]).length>0;
  return<Drawer onClose={onClose}title={<><BookMarked size={18}color={C.coral}/>Rulebook</>}intro="Active rules inject into every generation. Build this up over time.">
    <div style={{marginBottom:16,padding:"10px 14px",background:C.paper,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
      <div>
        <div style={{fontSize:13,fontWeight:700,color:C.ink}}>Auto-suggest from feedback</div>
        <div style={{fontSize:12,color:C.sub,marginTop:2}}>{hasFeedback?`${(feedback||[]).length} feedback items available`:"Leave feedback on generations to unlock suggestions"}</div>
      </div>
      {sugBusy?<Spin label="Analysing…"/>:<Btn small onClick={suggestFromFeedback}disabled={!hasFeedback}><Sparkles size={13}/>Suggest rules</Btn>}
    </div>
    {me.role==="admin"&&(copyRules.length+promptRules.length)<5&&<div style={{marginBottom:14,padding:"10px 14px",background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}><div><div style={{fontSize:13,fontWeight:700,color:"#B91C1C"}}>Rulebook is empty</div><div style={{fontSize:12,color:"#7F1D1D",marginTop:2}}>Load the default HUFT brand rules to get started.</div></div>{seeding?<Spin label="Seeding…"/>:<Btn small onClick={seedRules}style={{background:"#B91C1C",color:"#fff"}}>Load defaults</Btn>}</div>}
    {me.role==="admin"&&(copyRules.length+promptRules.length)>=5&&<div style={{marginBottom:14,textAlign:"right"}}><button onClick={seedRules}style={{fontSize:11.5,color:C.sub,background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>↺ Reset to default rules</button></div>}
    <Section title="CRM Copy rules"color={C.coral}rules={copyRules}type="copy"placeholder='e.g. Never say "cheap"; lead with value'/>
    <Section title="Design Prompt rules"color={C.teal}rules={promptRules}type="prompt"placeholder="e.g. Always real Indian-breed pets"/>
  </Drawer>;
}

function TeamDrawer({onClose,me}){
  const[users,setUsers]=useState(null);const[form,setForm]=useState({name:"",email:"",password:"",role:"content"});const[err,setErr]=useState("");const[busy,setBusy]=useState(false);
  useEffect(()=>{api.get("/api/users").then(setUsers).catch(()=>setUsers([]));},[]);
  const add=async()=>{setErr("");setBusy(true);try{await api.post("/api/users",form);setUsers(await api.get("/api/users"));setForm({name:"",email:"",password:"",role:"content"});}catch(e){setErr(e.message);}setBusy(false);};
  const remove=async(id)=>{try{await api.del("/api/users/"+id);setUsers(await api.get("/api/users"));}catch(e){setErr(e.message);}};
  const changeRole=async(id,role)=>{try{await api.put("/api/users/"+id,{role});setUsers(await api.get("/api/users"));}catch(e){setErr(e.message);}};
  const ROLES=["admin","business","content","design"];
  const roleColor={admin:C.coral,business:C.teal,content:C.purple,design:C.green};
  return<Drawer onClose={onClose}title={<><Users size={18}color={C.teal}/>Team</>}intro="Manage access. Each role lands on a different tab by default.">
    <div style={{marginBottom:18,background:C.paper,borderRadius:10,padding:12,fontSize:12.5}}>
      <div style={{fontWeight:700,marginBottom:6}}>Role → Default tab</div>
      {[["admin","Dashboard"],["business","Dashboard"],["content","Copy"],["design","Design"]].map(([r,t])=><div key={r}style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><span style={{background:roleColor[r]+"20",color:roleColor[r],fontSize:10.5,fontWeight:700,padding:"1px 7px",borderRadius:999}}>{r}</span><span style={{color:C.sub}}>→ {t}</span></div>)}
    </div>
    {me.role==="admin"&&<div style={{marginBottom:16,padding:14,border:`1px solid ${C.line}`,borderRadius:10}}>
      <div style={{fontWeight:700,marginBottom:10,fontSize:13.5}}>Add new user</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
        <input value={form.name}onChange={e=>setForm(f=>({...f,name:e.target.value}))}placeholder="Full name"style={{border:`1px solid ${C.line}`,borderRadius:8,padding:"7px 10px",fontSize:13,boxSizing:"border-box"}}/>
        <input value={form.email}onChange={e=>setForm(f=>({...f,email:e.target.value}))}placeholder="Email"style={{border:`1px solid ${C.line}`,borderRadius:8,padding:"7px 10px",fontSize:13,boxSizing:"border-box"}}/>
        <input type="password"value={form.password}onChange={e=>setForm(f=>({...f,password:e.target.value}))}placeholder="Temp password"style={{border:`1px solid ${C.line}`,borderRadius:8,padding:"7px 10px",fontSize:13,boxSizing:"border-box"}}/>
        <select value={form.role}onChange={e=>setForm(f=>({...f,role:e.target.value}))}style={{border:`1px solid ${C.line}`,borderRadius:8,padding:"7px 10px",fontSize:13}}>
          {ROLES.map(r=><option key={r}value={r}>{r}</option>)}
        </select>
      </div>
      {err&&<div style={{color:C.coral,fontSize:12.5,marginBottom:8}}>{err}</div>}
      <Btn small onClick={add}disabled={busy||!form.name||!form.email||!form.password}><Plus size={13}/>Add user</Btn>
    </div>}
    {users==null?<Spin label="Loading…"/>:users.map(u=><div key={u.id}style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderTop:`1px solid ${C.line}`}}>
      <span style={{width:32,height:32,borderRadius:999,background:C.coralSoft,color:C.coral,display:"inline-flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13,flexShrink:0}}>{u.name?u.name[0].toUpperCase():"?"}</span>
      <div style={{flex:1,minWidth:0}}><div style={{fontSize:13.5,fontWeight:600}}>{u.name}</div><div style={{fontSize:11.5,color:C.sub}}>{u.email}</div></div>
      {me.role==="admin"&&u.id!==me.id?<select value={u.role}onChange={e=>changeRole(u.id,e.target.value)}style={{border:`1px solid ${C.line}`,borderRadius:7,padding:"4px 8px",fontSize:12,color:roleColor[u.role]||C.sub,fontWeight:600}}>
        {ROLES.map(r=><option key={r}value={r}>{r}</option>)}
      </select>:<span style={{background:(roleColor[u.role]||C.sub)+"20",color:roleColor[u.role]||C.sub,fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:999}}>{u.role}</span>}
      {me.role==="admin"&&u.id!==me.id&&<button onClick={()=>remove(u.id)}style={{border:"none",background:"transparent",cursor:"pointer",color:C.sub}}><Trash2 size={15}/></button>}
    </div>)}
  </Drawer>;
}

function AudienceDrawer({onClose,audiences,setAudiences,me}){
  const blank={name:"",description:"",segment_code:"",pet_type:"both",lifecycle_stage:"",trigger_event:"",key_insight:"",size_estimate:"",channel_pref:"",notes:""};
  const[form,setForm]=useState(blank);const[editing,setEditing]=useState(null);const[busy,setBusy]=useState(false);const[err,setErr]=useState("");const[showForm,setShowForm]=useState(false);
  const f=(k,v)=>setForm(x=>({...x,[k]:v}));
  const save=async()=>{setBusy(true);setErr("");try{if(editing){await api.put("/api/audiences/"+editing,form);setAudiences(a=>a.map(x=>x.id===editing?{...x,...form}:x));setEditing(null);}else{const r=await api.post("/api/audiences",form);setAudiences(a=>[r,...a]);}setForm(blank);setShowForm(false);}catch(e){setErr(e.message);}setBusy(false);};
  const del=async(id)=>{try{await api.del("/api/audiences/"+id);setAudiences(a=>a.filter(x=>x.id!==id));}catch(e){setErr(e.message);}};
  const startEdit=(aud)=>{setForm({name:aud.name||"",description:aud.description||"",segment_code:aud.segment_code||"",pet_type:aud.pet_type||"both",lifecycle_stage:aud.lifecycle_stage||"",trigger_event:aud.trigger_event||"",key_insight:aud.key_insight||"",size_estimate:aud.size_estimate||"",channel_pref:aud.channel_pref||"",notes:aud.notes||""});setEditing(aud.id);setShowForm(true);};
  return<Drawer onClose={onClose}title={<><Target size={18}color={C.coral}/>Audiences</>}intro="Define audience segments with insights. These feed directly into brief generation.">
    {!showForm&&<Btn onClick={()=>{setShowForm(true);setEditing(null);setForm(blank);}}style={{marginBottom:16}}><Plus size={14}/>New audience</Btn>}
    {showForm&&<div style={{background:C.paper,borderRadius:12,padding:14,marginBottom:16,border:`1px solid ${C.line}`}}>
      <div style={{fontWeight:700,marginBottom:12,fontSize:14}}>{editing?"Edit audience":"New audience"}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
        <div style={{gridColumn:"1/-1"}}><Field label="Audience name *"value={form.name}onChange={v=>f("name",v)}placeholder="e.g. Lapsed Meowsi buyers"/></div>
        <Field label="Segment code"value={form.segment_code}onChange={v=>f("segment_code",v)}placeholder="e.g. LapsedCat60"/>
        <label style={{display:"block"}}><div style={{fontSize:12.5,fontWeight:600,color:C.sub,marginBottom:5}}>Pet type</div>
          <select value={form.pet_type}onChange={e=>f("pet_type",e.target.value)}style={{width:"100%",border:`1px solid ${C.line}`,borderRadius:10,padding:"9px 11px",fontSize:14}}>
            <option value="both">Dog + Cat</option><option value="dog">Dog only</option><option value="cat">Cat only</option><option value="other">Other</option>
          </select>
        </label>
        <Field label="Lifecycle stage"value={form.lifecycle_stage}onChange={v=>f("lifecycle_stage",v)}placeholder="e.g. Lapsed 60–90d"/>
        <Field label="Estimated size"value={form.size_estimate}onChange={v=>f("size_estimate",v)}placeholder="e.g. ~12,000 users"/>
        <div style={{gridColumn:"1/-1"}}><Field label="Trigger event"value={form.trigger_event}onChange={v=>f("trigger_event",v)}placeholder="e.g. No purchase in 90 days"/></div>
        <div style={{gridColumn:"1/-1"}}><Field label="Key insight"textarea value={form.key_insight}onChange={v=>f("key_insight",v)}placeholder="The consumer truth for this segment…"/></div>
        <Field label="Preferred channel"value={form.channel_pref}onChange={v=>f("channel_pref",v)}placeholder="e.g. WhatsApp"/>
      </div>
      {err&&<div style={{color:C.coral,fontSize:13,marginBottom:8}}>{err}</div>}
      <div style={{display:"flex",gap:8}}><Btn onClick={save}disabled={busy||!form.name.trim()}><Check size={14}/>{editing?"Save changes":"Create"}</Btn><Btn variant="ghost"onClick={()=>{setShowForm(false);setEditing(null);setForm(blank);}}>Cancel</Btn></div>
    </div>}
    {audiences.length===0?<div style={{color:C.sub,fontSize:13,padding:"20px 0",textAlign:"center"}}>No audiences yet.</div>
    :audiences.map(a=><div key={a.id}style={{border:`1px solid ${C.line}`,borderRadius:12,padding:14,marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
        <div><div style={{fontWeight:700,fontSize:14}}>{a.name}</div>
          <div style={{fontSize:12,color:C.sub,display:"flex",gap:8,flexWrap:"wrap",marginTop:3}}>
            {a.segment_code&&<span style={{background:C.coralSoft,color:C.coral,padding:"1px 7px",borderRadius:999,fontWeight:600}}>{a.segment_code}</span>}
            {a.size_estimate&&<span>{a.size_estimate}</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>startEdit(a)}style={{border:`1px solid ${C.line}`,borderRadius:7,padding:"4px 8px",cursor:"pointer",background:"#fff",color:C.sub}}><PenLine size={13}/></button>
          {(me.role==="admin"||me.role==="business")&&<button onClick={()=>del(a.id)}style={{border:`1px solid ${C.line}`,borderRadius:7,padding:"4px 8px",cursor:"pointer",background:"#fff",color:C.sub}}><Trash2 size={13}/></button>}
        </div>
      </div>
      {a.trigger_event&&<div style={{fontSize:12.5,color:C.sub,marginBottom:4}}><b style={{color:C.ink}}>Trigger:</b> {a.trigger_event}</div>}
      {a.key_insight&&<div style={{fontSize:13,background:C.coralSoft,borderRadius:8,padding:"8px 10px",color:"#7D3D24",lineHeight:1.5,marginTop:6}}><b>Insight:</b> {a.key_insight}</div>}
    </div>)}
  </Drawer>;
}

function Drawer({onClose,title,intro,children}){return<div onClick={onClose}style={{position:"fixed",inset:0,background:"rgba(15,18,30,.45)",display:"flex",justifyContent:"flex-end",zIndex:50}}><div onClick={e=>e.stopPropagation()}style={{width:480,maxWidth:"94vw",background:"#fff",height:"100%",overflowY:"auto",padding:22}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><div style={{display:"flex",alignItems:"center",gap:8,fontWeight:800,fontSize:17}}>{title}</div><button onClick={onClose}style={{border:"none",background:"transparent",cursor:"pointer"}}><X size={20}color={C.sub}/></button></div><div style={{fontSize:13,color:C.sub,marginBottom:18}}>{intro}</div>{children}</div></div>;}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
