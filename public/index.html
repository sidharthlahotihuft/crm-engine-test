/* ===== api =============================================================== */
const API_BASE = "";
let TOKEN = localStorage.getItem("huft_token") || null;
const api = {
  async req(method, path, body) {
    const res = await fetch(API_BASE + path, {
      method,
      headers:{"content-type":"application/json",...(TOKEN?{Authorization:"Bearer "+TOKEN}:{})},
      body:body?JSON.stringify(body):undefined,
    });
    if (res.status===401){TOKEN=null;localStorage.removeItem("huft_token");window.location.reload();return;}
    if (!res.ok){const e=await res.json().catch(()=>({}));const err=new Error(e.error||"HTTP "+res.status);err.status=res.status;throw err;}
    return res.json();
  },
  get(p){return this.req("GET",p)},post(p,b){return this.req("POST",p,b)},
  put(p,b){return this.req("PUT",p,b)},del(p){return this.req("DELETE",p)},
};
async function callClaude(system,prompt,expectJson){
  const data=await api.post("/api/generate",{system,prompt});
  const text=data.text||"";
  if(!expectJson)return text;
  const clean=text.replace(/```json|```/g,"").trim();
  const s=clean.search(/[\[{]/);
  return JSON.parse(s>=0?clean.slice(s):clean);
}

// British English grammar/spelling proofread. Returns {hasIssues, issues:[{wrong,right,why}], corrected:{header,body,subject,cta}}
async function grammarCheckCopy(fields){
  const sys=`You are a British English copy editor for HUFT (a premium Indian pet care brand). Proofread the supplied marketing copy.
RULES:
- Enforce British English spelling and conventions (e.g. "flavour" not "flavor", "realise" not "realize", "personalised" not "personalized", "centre" not "center", single quotes for quotations, no Oxford comma unless needed for clarity).
- Fix grammar, punctuation, spacing, capitalisation and obvious typos.
- DO NOT change tone, voice, meaning, line breaks, emoji, bullet markers (✓) or CTA intent. Preserve formatting and structure exactly.
- If the copy is already correct, return hasIssues:false and leave corrected identical to input.
Return ONLY JSON: {"hasIssues":boolean,"issues":[{"wrong":"original phrase","right":"corrected phrase","why":"short reason"}],"corrected":{"subject":"","header":"","body":"","cta":""}}. Include only the fields that were provided in corrected.`;
  const usr=`Proofread these fields:\n${fields.subject!=null?`SUBJECT: ${fields.subject}\n`:""}HEADER: ${fields.header||""}\nBODY: ${fields.body||""}\nCTA: ${fields.cta||""}`;
  return await callClaude(sys,usr,true);
}

const groupByDate=(items)=>{
  const groups={};

    if(!groups[d])groups[d]=[];
    groups[d].push(c);
  });

};

const hoursAgo=(ts)=>ts?Math.round((Date.now()-new Date(ts).getTime())/36e5):null;
const tatStatus=(startedAt,dueAt,done)=>{
  if(done)return{label:"Done",color:"#16A34A",bg:"#DCFCE7"};
  if(!startedAt)return{label:"Not started",color:"#6B7280",bg:"#F3F4F6"};
  const now=Date.now();const due=new Date(dueAt||0).getTime();
  if(due&&now>due)return{label:"Overdue",color:"#B91C1C",bg:"#FEF2F2"};
  const h=hoursAgo(startedAt);
  if(h!==null&&h>TAT_HOURS[Object.keys(TAT_HOURS).find(k=>TAT_HOURS[k]===TAT_HOURS.brief)||"brief"])return{label:"Running late",color:"#D97706",bg:"#FEF3C7"};
  return{label:"On track",color:"#0E9488",bg:"#E2F4F1"};
};

/* ===== BRAND CONTEXT (full — sourced from all 5 brand docs) ============= */
const BRAND_CONTEXT = `
════════════════════════════════════════════════════════
HUFT BRAND INTELLIGENCE — MASTER CONTEXT v2.0
Source: Brand Architecture, Communication Playbook, Edibles Brand Positioning, Brand Intelligence Brief
════════════════════════════════════════════════════════

▌ BRAND OVERVIEW
HUFT (Heads Up For Tails) — India's leading purpose-led pet care brand. 100+ retail stores, D2C, grooming & spa, nutrition, lifestyle products, and the HUFT Foundation. Founded because the founder couldn't find a thoughtful gift for her Labrador, Sara. That emotional origin informs everything — the warmth, the honesty, the obsession with quality.

▌ NORTH STAR & MISSION
North Star: "Pets are family." Every product, service, and word flows from this. Family isn't defined by species, but by the love we share.
Core Promise: We never compromise on quality. Every product is designed for pets as family — because family deserves only the best.
Mission: Strengthen the bond between pets and their families by providing the best quality of products and services that make the lives of pets happier, healthier and more comfortable at accessible price points.
Brand Purpose: HUFT was created to improve the lives of pets. Pets make humans kinder, more patient, and more compassionate — so HUFT aims to improve the quality of life for pets, educate pet parents, build a kinder ecosystem for animals, and support community animals through welfare.

▌ BRAND ARCHITECTURE
Endorsed brand structure — each sub-brand has a distinct personality while sharing HUFT's core "For Family" promise.
Master brand communicates: family bonds, quality commitment, trust, community.
Premium segment: Sara's (nutrition expert), DashDog (style & joy).
Mass-premium segment: Hearty (care essentials), Meowsi (feline specialist).
Accessible/standalone: NutriMeow (daily cat nutrition — does NOT carry HUFT branding), NutriWag (dog fuel).

▌ CRM STRATEGY
Marketing Flywheel: Care → Trust → Love → Advocacy → Reach → Care again.
The Belonging Ladder: Discover → Relate → Trust → Belong → Advocate. Every campaign should move the customer one rung up.
CRM Emotional Pillars: Importance 40% (make every pet parent feel seen and valued), Trust 30% (honest, reliable, made with love), Edutainment 20% (curious, kind, "did you know?"), Brand Values 10% (born in India, built with kindness).

▌ BRAND PERSONALITY
Caring · Knowledgeable · Honest · Thoughtful · Joyful.
Feels like: "A trusted friend who deeply understands pets." Not a corporate marketer.

▌ TONE & VOICE
Warm · Human · Empathetic · Trustworthy · Positive · Approachable.
Write like a human — natural sentences, clear language, emotion where appropriate.
Emotional territory: love, trust, companionship, joy, responsibility, kindness.
Key truths: pets make life better; caring for pets makes us better people; small acts of kindness toward animals matter.

▌ VOCABULARY
Words to use: thoughtful, gentle, trusted, honest, real, care, comfort, love, joy, family, better.
Words to AVOID: premium, luxury, cutting-edge, state-of-the-art, revolutionary, game-changing. Say "pet parents" not "consumers" or "customers". Say "furry family" not "fur baby". No corporate jargon, no clichés, no fear-based messaging, no shame, no exaggerated claims.
Language: British English only. Clarity first, warmth second.

▌ NON-NEGOTIABLE GUARDRAILS
• No medical/cure claims — use "supportive," "gentle," "vet-aware."
• Never invent prices or discounts — write "Rs.XX [confirm]" as placeholder.
• Never shame pet parents for feeding choices or care mistakes. Always guide kindly.
• One message rule — one clear takeaway per asset.

const parseName=(name)=>{
  if(!name)return{date:"",product:"",hook:"",full:"Untitled asset"};
  const parts=name.split("_");
  const dateMatch=parts[0]&&/^[A-Z][a-z]{2}\d{2}$/.test(parts[0]);
  const date=dateMatch?parts[0]:"";
  const rest=dateMatch?parts.slice(1):parts;
  const product=rest[0]||"";
  const hook=rest.slice(1).join(" ");
  return{date,product,hook,full:name};
};
const displayName=(name)=>{
  if(!name)return"Untitled asset";
  const{date,product,hook}=parseName(name);
  if(!date&&!product)return name.replace(/_/g," ");
  return[date,product,hook].filter(Boolean).join(" · ");
};

async function genCopyOptionsFor(c, ruleStr, fb){
  const isPush=c.channel==="Push notification";
  const isEmail=c.channel==="Email"||c.channel==="WhatsApp + Email";
  const channelRules=isPush
    ?`PUSH NOTIFICATION RULES (NON-NEGOTIABLE):\n- Title: MAX 50 chars. Short, punchy.\n- Body: MAX 90 chars. One sentence. No bullets.\n- Max 1 emoji. 2-second read.\n- CTA: 2-3 words.`
    :isEmail
    ?`EMAIL RULES:\n- Subject line: under 50 chars, curiosity or benefit-led.\n- Header / image copy: 2-3 short punchy lines for the hero image overlay.\n- Body: warm opener + 3-4 ✓ proof bullets + sign-off. Slightly longer than WhatsApp is fine.\n- CTA: clear action phrase.`
    :`WHATSAPP RULES:\n- Header: 2-3 short punchy lines.\n- Body: opener + 3-4 ✓ bullets + sign-off.\n- CTA: clear action phrase.`;
  const nOpts=copyOptionCount(c.channel);
  const shape=isPush
    ?"each: {direction,header,body,cta}. header=push title MAX 50 chars, body=MAX 90 chars one sentence, cta=2-3 words"
    :isEmail
    ?"each: {direction,subject,header,body,cta}. subject=email subject line under 50 chars, header=image copy/overlay 2-3 short lines, body=email opener+✓ bullets+sign-off, cta=action phrase"
    :"each: {direction,header,body,cta}. header=image overlay 2-3 short punchy lines, body=WhatsApp opener+bullets+sign-off, cta=action phrase";
  const sys="You write "+(c.channel||"WhatsApp")+" CRM copy for HUFT.\n"+BRAND_CONTEXT+"\n"+channelRules+"\nRULEBOOK:\n"+ruleStr+(fb?"\nTeam feedback:\n"+fb:"")+"\nReturn ONLY JSON array of "+nOpts+" options, "+shape;
  return await callClaude(sys, briefBlockFor(c), true);
}
// One-click "Copy text" button with copied-state feedback
function CopyBtn({text,label="Copy text",small=true,style}){
  const[done,setDone]=useState(false);
  const doCopy=async(e)=>{
    if(e)e.stopPropagation();
    const t=typeof text==="function"?text():text;
    try{
      if(navigator.clipboard&&navigator.clipboard.writeText){await navigator.clipboard.writeText(t||"");}
      else{const ta=document.createElement("textarea");ta.value=t||"";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);}
      setDone(true);setTimeout(()=>setDone(false),1600);
    }catch(err){alert("Couldn't copy automatically — please select and copy manually.");}
  };
  return<button onClick={doCopy}style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:small?11.5:13,fontWeight:600,padding:small?"4px 10px":"8px 14px",borderRadius:8,border:`1px solid ${done?C.green:C.line}`,background:done?C.green+"14":"#fff",color:done?C.green:C.ink,cursor:"pointer",...style}}>{done?<><Check size={small?12:14}/>Copied</>:<><Copy size={small?12:14}/>{label}</>}</button>;
}

function exportBriefTxt(active){
  const b=active.data?.brief||{};
  const proofLines=(b.proofPoints||[]).map(p=>"• "+p);
  const base=[`HUFT CRM BRIEF — ${active.name||"Untitled"}`,``,`Product: ${active.product}  |  Channel: ${active.channel}`,`Segment: ${active.audience||active.segment}  |  Objective: ${active.objective}`,active.offer?`Offer: ${active.offer}`:"",`Pillar: ${b.pillar||"—"}`,``,`STRATEGIC INSIGHT`,b.strategicInsight,``,`THE IDEA`,b.idea,``,`PROOF POINTS`];
  const mid=proofLines;
  const tail=[``,b.copyDirection?`COPY DIRECTION\n${b.copyDirection}`:"",``,b.whatsappNote?`WHATSAPP\n${b.whatsappNote}`:"",
    ...(b.rtbs&&b.rtbs.length?[``,`RTBs IN FOCUS`,...b.rtbs.map(r=>"• "+r)]:[]),
    ...(b.references&&b.references.length?[``,`REFERENCE LINKS`,...b.references.map(r=>"• "+r)]:[]),
    ``,`Generated: ${new Date().toLocaleDateString("en-IN")}`];
  const lines=base.concat(mid).concat(tail).filter(l=>l!==undefined);
  const blob=new Blob([lines.join("\n")],{type:"text/plain"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`${(active.name||"brief").replace(/\s+/g,"_")}.txt`;a.click();
}
function exportDesignBriefTxt(active,copy,approvedPrompt){

  const blob=new Blob([lines.join("\n")],{type:"text/plain"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`${(active.name||"design").replace(/\s+/g,"_")}_design-brief.txt`;a.click();

  const[busy,setBusy]=useState(false);
  const[err,setErr]=useState("");
  const go=async()=>{
    if(!email.trim()||!password.trim())return;
    setBusy(true);setErr("");
    try{
      const data=await api.post("/api/auth/login",{email:email.trim(),password});
      if(!data||!data.token){setErr("Login failed — please try again.");setBusy(false);return;}
      TOKEN=data.token;
      localStorage.setItem("huft_token",data.token);
      onAuth(data.user);
    }catch(e){setErr(e.message||"Login failed");}
    setBusy(false);
  };
  return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.navy}}>
    <div style={{background:"#fff",borderRadius:18,padding:"40px 36px",width:400,boxShadow:"0 20px 60px rgba(0,0,0,.3)"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:48,height:48,borderRadius:14,background:C.coral,color:"#fff",marginBottom:14}}><Sparkles size={24}/></div>
        <h1 style={{margin:"0 0 6px",fontSize:22,fontWeight:800,color:C.ink}}>CRM Creative Engine</h1>
        <div style={{color:C.sub,fontSize:14}}>Sign in to your HUFT account</div>
      </div>
      <Field label="Email" value={email} onChange={setEmail} placeholder="you@headsupfortails.com"/>
      <label style={{display:"block",marginBottom:20}}>
        <div style={{fontSize:12.5,fontWeight:600,color:C.sub,marginBottom:5}}>Password</div>
        <input type="password" value={password} onChange={e=>setPassword(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&go()}
          placeholder="••••••••"
          style={{width:"100%",border:`1px solid ${C.line}`,borderRadius:10,padding:"9px 11px",fontSize:14,color:C.ink,boxSizing:"border-box"}}/>
      </label>
      {err&&<div style={{background:"#FEF2F2",color:"#B91C1C",borderRadius:8,padding:"9px 12px",fontSize:13,marginBottom:14}}>{err}</div>}
      <Btn onClick={go} disabled={busy||!email.trim()||!password.trim()} style={{width:"100%",justifyContent:"center"}}>
        {busy?<><Loader2 size={15} style={{animation:"spin 1s linear infinite"}}/>Signing in…</>:"Sign in"}
      </Btn>
      <div style={{marginTop:18,fontSize:12,color:C.sub,textAlign:"center"}}>Contact your admin to get access.</div>
    </div>
  </div>;
}

/* ===== App ============================================================== */
// Self-heal legacy data: a Push notification with approved copy needs no design step,
// so it should be "done". Fixes assets created before push-skips-design logic existed.
function normalizeCampaigns(cs){
  return (cs||[]).map(c=>{
    if(c.channel==="Push notification"&&c.stage!=="done"&&c.stage!=="brief"
       &&c.data?.selectedCopyIdx!=null){
      return{...c,stage:"done",design_approver:null,
        went_live_at:c.went_live_at||c.updated_at||new Date().toISOString()};
    }
    return c;
  });
}

function App(){
  const[me,setMe]=useState(null);
  const[checking,setChecking]=useState(true);
  const[tab,setTab]=useState("dashboard");
  const[campaigns,setCampaigns]=useState([]);
  const[rules,setRules]=useState([]);
  const[feedback,setFeedback]=useState([]);
  const[audiences,setAudiences]=useState([]);
  const[activeId,setActiveId]=useState(null);
  const[drawer,setDrawer]=useState(null);
  const[showMonthlyPrompt,setShowMonthlyPrompt]=useState(true);

  // Auto-login from stored token
  useEffect(()=>{
    if(TOKEN){
      api.get("/api/auth/me")
        .then(user=>{
          setMe(user);
          setTab(ROLE_TAB[user.role]||"dashboard");
          // Load all data on refresh
          Promise.all([
            api.get("/api/campaigns"),
            api.get("/api/rules"),
            api.get("/api/feedback").catch(()=>[]),
            api.get("/api/audiences").catch(()=>[]),
          ]).then(([cs,rs,fb,auds])=>{
            const fixed=normalizeCampaigns(cs);
            setCampaigns(fixed);setRules(rs);setFeedback(fb);setAudiences(auds);
            // Persist any auto-healed push assets so the fix sticks server-side
            fixed.forEach(c=>{const orig=cs.find(x=>x.id===c.id);if(orig&&orig.stage!==c.stage){api.put("/api/campaigns/"+c.id,{stage:c.stage,design_approver:c.design_approver,went_live_at:c.went_live_at}).catch(()=>{});}});
          }).finally(()=>setChecking(false));
        })
        .catch(()=>{TOKEN=null;localStorage.removeItem("huft_token");setChecking(false);});
    } else { setChecking(false); }
  },[]);

  const loadAll=async()=>{
    const[cs,rs,fb,auds]=await Promise.all([
      api.get("/api/campaigns"),api.get("/api/rules"),
      api.get("/api/feedback").catch(()=>[]),api.get("/api/audiences").catch(()=>[]),
    ]);
    setCampaigns(normalizeCampaigns(cs));setRules(rs);setFeedback(fb);setAudiences(auds);
  };

  const onAuth=(user)=>{setMe(user);setTab(ROLE_TAB[user.role]||"dashboard");loadAll();};
  const safeData=(cs)=>cs.map(c=>({...c,data:c.data?(typeof c.data==="string"?JSON.parse(c.data):c.data):{}}));

  const logout=()=>{TOKEN=null;localStorage.removeItem("huft_token");setMe(null);setCampaigns([]);setRules([]);setFeedback([]);setAudiences([]);};

  const[toasts,setToasts]=useState([]);
  const toast=(msg,type="success",dur=3500)=>{const id=Date.now();setToasts(t=>[...t,{id,msg,type}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),dur);};

  if(checking)return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.navy}}><Loader2 size={32} color="#fff" style={{animation:"spin 1s linear infinite"}}/></div>;
  if(!me)return<Login onAuth={onAuth}/>;
  const recentFeedback=(stage)=>feedback.filter(f=>f.stage===stage).slice(0,3).map(f=>`- ${f.text}`).join("\n")||"";
  const saveFeedback=(f)=>setFeedback(x=>[{...f,at:Date.now()},...x]);
  const copyRules=rules.filter(r=>r.type==="copy");
  const promptRules=rules.filter(r=>r.type==="prompt");
  const addRule=async(type,text)=>{const r=await api.post("/api/rules",{type,text});setRules(x=>[r,...x]);};
  const toggleRule=async(id)=>{const r=rules.find(x=>x.id===id);const active=!r.active;setRules(x=>x.map(y=>y.id===id?{...y,active}:y));api.put("/api/rules/"+id,{active}).catch(()=>{});};
  const delRule=async(id)=>{setRules(x=>x.filter(y=>y.id!==id));api.del("/api/rules/"+id).catch(()=>{});};
  const active=campaigns.find(c=>c.id===activeId)||null;

  const patch=(id,fields)=>{
    const TOP=["name","channel","product","audience_id","audience_label","segment","objective","offer","crm_type","stage","copy_approver","design_approver","go_live_date","campaign_week","campaign_month","tat_brief_due","tat_content_due","tat_design_due","brief_started_at","content_started_at","design_started_at","went_live_at"];
    const topFields={};const dataFields={};
    Object.entries(fields).forEach(([k,v])=>{
      if(k==="data"){Object.assign(dataFields,v);}
      else if(TOP.includes(k)){topFields[k]=v;}
      else{dataFields[k]=v;}
    });
    setCampaigns(cs=>{
      const cur=cs.find(c=>c.id===id)||{};
      // Always parse cur.data safely
      const curData=cur.data?(typeof cur.data==="string"?JSON.parse(cur.data):cur.data):{};
      const mergedData={...curData,...dataFields};
      const next=cs.map(c=>c.id===id?{...c,...topFields,data:mergedData,updatedAt:Date.now()}:c);
      const payload={...topFields};
      if(Object.keys(dataFields).length)payload.data=mergedData;
      api.put("/api/campaigns/"+id,payload).catch(e=>console.error("patch error:",e));
      return next;
    });
  };

  const delCampaign=async(id)=>{
    if(!window.confirm("Delete permanently? Cannot be undone."))return;
    try{
      await api.del("/api/campaigns/"+id);
      setCampaigns(cs=>cs.filter(c=>c.id!==id));
      if(activeId===id)setActiveId(null);
    }catch(e){alert("Delete failed: "+e.message);}
  };
  const newCampaign=async()=>{
    const c=await api.post("/api/campaigns",{channel:"WhatsApp",stage:"brief"});
    setCampaigns(cs=>[c,...cs]);setActiveId(c.id);setTab("brief");
  };

  // Multi-copy split: turn 2+ generated copies into separate assets; optionally archive the rest.
  const splitCopyAssets=async(src,indices,archiveRest)=>{
    const opts=src.data?.copyOptions||[];
    if(!indices||indices.length<1)return;
    const base={name:src.name,channel:src.channel,product:src.product,audience_id:src.audience_id,audience_label:src.audience_label,segment:src.segment,objective:src.objective,offer:src.offer,crm_type:src.crm_type,go_live_date:src.go_live_date,campaign_week:src.campaign_week,campaign_month:src.campaign_month,rtbs:src.rtbs,references:src.references};
    const sorted=[...indices].sort((a,b)=>a-b);
    const first=sorted[0], rest=sorted.slice(1);
    try{
      await api.put("/api/campaigns/"+src.id,{data:{...(src.data||{}),selectedCopyIdx:first},stage:"brand_review",copy_approver:me.name});
      const made=[];
      for(const idx of rest){
        const nc=await api.post("/api/campaigns",{...base,stage:"brand_review",data:{...(src.data||{}),copyOptions:[opts[idx]],selectedCopyIdx:0,splitFrom:src.id}});
        await api.put("/api/campaigns/"+nc.id,{copy_approver:me.name}).catch(()=>{});
        made.push({...nc,copy_approver:me.name});
      }
      if(archiveRest){
        const leftover=opts.map((o,i)=>i).filter(i=>!sorted.includes(i));
        for(const idx of leftover){
          const nc=await api.post("/api/campaigns",{...base,stage:"content",data:{...(src.data||{}),copyOptions:[opts[idx]],selectedCopyIdx:null,archived:true,splitFrom:src.id}});
          made.push(nc);
        }
      }
      setCampaigns(cs=>[...made,...cs.map(x=>x.id===src.id?{...x,data:{...(x.data||{}),selectedCopyIdx:first},stage:"brand_review",copy_approver:me.name}:x)]);
      if(toast)toast("Split into "+sorted.length+" asset"+(sorted.length>1?"s":"")+(archiveRest?" · extras archived":"")+" ✓","success");
      setTab("content");
    }catch(e){if(toast)toast("Split failed: "+(e.message||"error"),"error");}
  };

  // Bulk generate: run the copy engine for every brief that has no copy yet.
  const bulkGenerate=async(onProgress)=>{
    const ruleStr=activeRuleText(rules.filter(r=>r.type==="copy"));
    const pending=(campaigns||[]).filter(c=>!isArchived(c)&&c.data&&c.data.brief&&c.stage==="content"&&!c.data.copyOptions);
    const total=pending.length; let done=0;
    if(onProgress)onProgress(0,total);
    for(const c of pending){
      try{
        const fb=recentFeedback("content");
        const j=await genCopyOptionsFor(c,ruleStr,fb);
        await api.put("/api/campaigns/"+c.id,{data:{...(c.data||{}),copyOptions:j,selectedCopyIdx:null},copy_approver:null,stage:"content"});
        setCampaigns(cs=>cs.map(x=>x.id===c.id?{...x,data:{...(x.data||{}),copyOptions:j,selectedCopyIdx:null}}:x));
      }catch(e){console.error("bulk gen failed:",c.id,e);}
      done++; if(onProgress)onProgress(done,total);
    }
    if(toast)toast("Generated copy for "+done+" of "+total+" briefs ✓","success");
    return {done,total};
  };

  // Bulk import: takes normalised rows, runs each through the AI brief engine, creates campaigns.
  // Returns {created, failed, errors}. onProgress(done,total) for UI feedback.
  const bulkImportBriefs=async(rows,onProgress)=>{
    let created=0,failed=0;const errors=[];
    for(let i=0;i<rows.length;i++){
      const r=rows[i];
      try{
        const isRetail=(r.crmType||"").toLowerCase()==="retail";
        const channel=isRetail?"WhatsApp":(r.channel||"WhatsApp");
        const sys=`You write tight CRM creative briefs for HUFT.\n${BRAND_CONTEXT}\nReturn ONLY JSON:\n{"campaignName":"MonYY_Product_Hook_AudienceCode","strategicInsight":"1-2 sharp lines","idea":"single-minded message","proofPoints":["3 short proof points"],"pillar":"Trust|Importance|Edutainment|Brand Values","copyDirection":"1-2 lines","whatsappNote":"one line"}`;
        const rtbs=(r.rtbs||[]).filter(Boolean),refs=(r.references||[]).filter(Boolean);
        const usr=`CRM type: ${r.crmType||"D2C"}\nChannel: ${channel}\nProduct/Brand: ${r.product||""}\nPillar: ${r.pillar||"Importance"}\nAudience/Trigger: ${r.audience||""}\nObjective: ${r.objective||""}\nOffer: ${r.offer||"none"}\nHook/Angle: ${r.hook||"derive"}\nRTBs to focus on: ${rtbs.length?rtbs.join("; "):"derive"}\nReference links: ${refs.length?refs.join(" , "):"none"}\nGo-live date: ${r.goLive||"not set"}`;
        const j=await callClaude(sys,usr,true);
        if(rtbs.length)j.proofPoints=rtbs;
        const now=Date.now();
        const glDate=r.goLive||null;
        const c=await api.post("/api/campaigns",{
          name:j.campaignName,channel,product:r.product||"",
          audience_label:r.audience||"",segment:r.audience||"",objective:r.objective||"",
          offer:r.offer||"",crm_type:r.crmType||"D2C",
          go_live_date:glDate,
          campaign_week:glDate?weekOfMonth(glDate):null,campaign_month:glDate?monthLabel(glDate):null,
          tat_brief_due:new Date(now+TAT_HOURS.brief*36e5).toISOString(),
          tat_content_due:new Date(now+(TAT_HOURS.brief+TAT_HOURS.content)*36e5).toISOString(),
          tat_design_due:new Date(now+(TAT_HOURS.brief+TAT_HOURS.content+TAT_HOURS.design)*36e5).toISOString(),
          brief_started_at:new Date(now).toISOString(),
          rtbs,references:refs,
          data:{brief:{...j,rtbs,references:refs,source:"import"}},
          stage:"content",
        });
        setCampaigns(cs=>[c,...cs]);
        created++;
      }catch(e){failed++;errors.push(`Row ${i+1} (${r.product||"?"}): ${e.message||"failed"}`);}
      if(onProgress)onProgress(i+1,rows.length);
    }
    return{created,failed,errors};
  };
  const open=(id,jt)=>{const c=campaigns.find(x=>x.id===id);setActiveId(id);setTab(jt||(c?(c.stage==="done"?"done":c.stage==="content"?"content":c.stage==="design"?"design":"brief"):"brief"));};

  // Pending counts per stage (for nav badges)
  const pending={brief:campaigns.filter(c=>c.stage==="brief"&&!isArchived(c)).length,content:campaigns.filter(c=>c.stage==="content"&&!isArchived(c)).length,brand_review:campaigns.filter(c=>c.stage==="brand_review"&&!isArchived(c)).length,design:campaigns.filter(c=>c.stage==="design"&&c.channel!=="Push notification"&&!isArchived(c)).length};

  // Tabs visible per role
  const allTabs=[
    {k:"dashboard",label:"Dashboard",icon:<LayoutDashboard size={16}/>},
    {k:"brief",label:"Brief",icon:<FileText size={16}/>},
    {k:"content",label:"Copy",icon:<MessageSquare size={16}/>,count:pending.brand_review||undefined},
    {k:"design",label:"Design",icon:<Palette size={16}/>},
    {k:"library",label:"Image library",icon:<ImageIcon size={16}/>},
    {k:"done",label:"Finalized Assets",icon:<CheckCircle2 size={16}/>,count:(campaigns||[]).filter(c=>c.stage==="done"&&!isArchived(c)).length},
    {k:"analytics",label:"Analytics",icon:<BarChart3 size={16}/>},
    {k:"archive",label:"Archive",icon:<ArchiveIcon size={16}/>,count:(campaigns||[]).filter(c=>isArchived(c)).length},
  ];
  const TABS=(me.role==="admin"||me.role==="brand")?allTabs:allTabs.filter(t=>t.k==="dashboard"||t.k===ROLE_TAB[me.role]||t.k==="done"||t.k==="analytics"||(t.k==="archive"&&me.role==="business"));

  const RoleBadge=()=>{
    const cols={admin:C.coral,business:C.teal,content:C.purple,design:C.green,brand:"#9333EA"};
    return<span style={{background:(cols[me.role]||C.sub)+"22",color:cols[me.role]||C.sub,fontSize:10.5,fontWeight:700,padding:"2px 8px",borderRadius:999,textTransform:"capitalize"}}>{me.role}</span>;
  };

  const sideBtn={display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:9,border:"none",cursor:"pointer",background:"transparent",color:"rgba(255,255,255,.7)",fontSize:13,fontWeight:600,width:"100%",textAlign:"left"};

  return<div style={{minHeight:"100vh",background:C.paper,display:"flex"}}>
    {/* ===== LEFT SIDEBAR ===== */}
    <div style={{width:230,flexShrink:0,background:C.navy,color:"#fff",position:"sticky",top:0,height:"100vh",display:"flex",flexDirection:"column",boxShadow:"2px 0 14px rgba(0,0,0,.14)",zIndex:30}}>
      <div style={{padding:"18px 16px 16px",display:"flex",alignItems:"center",gap:10,borderBottom:"1px solid rgba(255,255,255,.08)"}}>
        <div style={{width:34,height:34,borderRadius:9,background:C.coral,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Sparkles size={18}color="#fff"/></div>
        <div style={{lineHeight:1.15,minWidth:0}}>
          <div style={{fontWeight:800,fontSize:15,letterSpacing:-.3}}>CRM Engine</div>
          <div title="Frontend build loaded" style={{fontSize:9,fontWeight:600,color:"rgba(255,255,255,.32)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{BUILD}</div>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"12px 10px",display:"flex",flexDirection:"column",gap:3}}>
        {TABS.map(t=>{
          const count=pending[t.k]||0;const on=tab===t.k;
          return<button key={t.k}onClick={()=>setTab(t.k)}style={{display:"flex",alignItems:"center",gap:11,padding:"10px 12px",borderRadius:9,border:"none",cursor:"pointer",fontSize:13.5,fontWeight:600,width:"100%",textAlign:"left",background:on?C.coral:"transparent",color:on?"#fff":"rgba(255,255,255,.62)",transition:"all .15s"}}>
            <span style={{display:"flex",alignItems:"center"}}>{t.icon}</span>
            <span style={{flex:1}}>{t.label}</span>
            {count>0&&t.k!=="dashboard"&&<span style={{background:on?"rgba(255,255,255,.28)":C.coral,color:"#fff",fontSize:10,fontWeight:800,padding:"1px 7px",borderRadius:999}}>{count}</span>}
          </button>;
        })}
      </div>
      <div style={{padding:"10px 10px 12px",borderTop:"1px solid rgba(255,255,255,.08)",display:"flex",flexDirection:"column",gap:3}}>
        <button onClick={()=>setDrawer("rules")}style={sideBtn}><BookMarked size={15}/>Rulebook</button>
        {me.role==="admin"&&<button onClick={()=>setDrawer("team")}style={sideBtn}><Users size={15}/>Team</button>}
        <button onClick={()=>setDrawer("audiences")}style={sideBtn}><Target size={15}/>Audiences</button>
        <div style={{marginTop:8,padding:"10px 12px",borderRadius:10,background:"rgba(255,255,255,.06)",display:"flex",alignItems:"center",gap:8}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{me.name}</div>
            <div style={{marginTop:3}}><RoleBadge/></div>
          </div>
          <button onClick={logout}title="Log out"style={{background:"transparent",border:"none",cursor:"pointer",color:"rgba(255,255,255,.5)",padding:2}}><LogOut size={15}/></button>
        </div>
      </div>
    </div>
    {/* ===== MAIN ===== */}
    <div style={{flex:1,minWidth:0,height:"100vh",overflowY:"auto"}}>
    <div style={{maxWidth:1120,margin:"0 auto",padding:"28px 28px"}}>
      {tab==="dashboard"&&<Dashboard campaigns={campaigns}onNew={newCampaign}onOpen={open}me={me}setTab={setTab}/>}
      {tab==="brief"&&<BriefTab active={active}patch={patch}setTab={setTab}me={me}recentFeedback={recentFeedback}saveFeedback={saveFeedback}campaigns={campaigns}onOpen={open}audiences={audiences}onDelete={delCampaign}onNew={newCampaign}onBulkImport={bulkImportBriefs}onBulkGenerate={bulkGenerate}toast={toast}/>}
      {(tab==="content"||tab==="brand_review")&&<ContentTab active={active}patch={patch}copyRules={copyRules}addRule={addRule}setTab={setTab}me={me}recentFeedback={recentFeedback}saveFeedback={saveFeedback}campaigns={campaigns}onOpen={open}toast={toast}onDelete={delCampaign}onSplit={splitCopyAssets}/>}
      {tab==="design"&&<DesignTab active={active}patch={patch}promptRules={promptRules}addRule={addRule}me={me}recentFeedback={recentFeedback}saveFeedback={saveFeedback}campaigns={campaigns}onOpen={open}onDelete={delCampaign}/>}
      {tab==="library"&&<ImageLibraryTab me={me}toast={toast}/>}
      {tab==="done"&&<DoneTab campaigns={campaigns}patch={patch}onOpen={open}me={me}setTab={setTab}onDelete={delCampaign}/>}
      {tab==="analytics"&&<AnalyticsTab campaigns={campaigns}patch={patch}onOpen={open}me={me}/>}
      {tab==="archive"&&<ArchiveTab campaigns={campaigns}patch={patch}onOpen={open}me={me}onDelete={delCampaign}/>}
    </div></div>
    {showMonthlyPrompt&&<MonthlyPrompt me={me}campaigns={campaigns}onClose={()=>setShowMonthlyPrompt(false)}/>}
    <div style={{position:"fixed",bottom:24,right:24,zIndex:9999,display:"flex",flexDirection:"column",gap:8,pointerEvents:"none"}}>{toasts.map(t=><div key={t.id}style={{background:t.type==="success"?"#15192B":"#B91C1C",color:"#fff",padding:"12px 18px",borderRadius:10,fontSize:13.5,fontWeight:600,display:"flex",alignItems:"center",gap:8,boxShadow:"0 4px 16px rgba(0,0,0,.25)",minWidth:260}}>{t.type==="success"?<CheckCircle2 size={16}/>:<X size={16}/>}{t.msg}</div>)}</div>
    {drawer==="rules"&&<RulesDrawer onClose={()=>setDrawer(null)}copyRules={copyRules}promptRules={promptRules}addRule={addRule}toggleRule={toggleRule}delRule={delRule}me={me}feedback={feedback}/>}
    {drawer==="team"&&<TeamDrawer onClose={()=>setDrawer(null)}me={me}/>}
    {drawer==="audiences"&&<AudienceDrawer onClose={()=>setDrawer(null)}audiences={audiences}setAudiences={setAudiences}me={me}/>}
  </div>;
}

/* ===== Monthly Prompt Popup ============================================= */
function MonthlyPrompt({me,campaigns,onClose}){
  const isLastWeek=isLastWeekOfMonth();
  const isFirstWeek=isFirstWeekOfMonth();
  if(!isLastWeek&&!isFirstWeek)return null;

  // Last week — prompt content/design to close out campaigns
  if(isLastWeek&&(me.role==="content"||me.role==="design"||me.role==="admin")){
    const inProgress=campaigns.filter(c=>c.stage!=="done").length;
    if(!inProgress)return null;
    return<div style={{position:"fixed",inset:0,background:"rgba(15,18,30,.5)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:18,padding:28,maxWidth:420,width:"90%",boxShadow:"0 20px 60px rgba(0,0,0,.25)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
          <div style={{width:36,height:36,borderRadius:10,background:C.coralSoft,display:"flex",alignItems:"center",justifyContent:"center"}}><BellIcon size={18}color={C.coral}/></div>

  if(isFirstWeek&&(me.role==="business"||me.role==="admin")){
    const doneWithoutReport=campaigns.filter(c=>c.stage==="done"&&!c.has_report).length;
    if(!doneWithoutReport)return null;

        </div>

          <b style={{color:C.teal}}>{doneWithoutReport} completed asset{doneWithoutReport!==1?"s":""}</b> from last month still need performance data. Upload reports so the team can see what worked.
        </div>
        <div style={{display:"flex",gap:8}}>
          <Btn variant="teal"onClick={onClose}><UploadIcon size={14}/>Upload reports</Btn>
          <Btn variant="ghost"onClick={onClose}>Later</Btn>
        </div>
      </div>
    </div>;
  }
  return null;
}

/* ===== Performance Report Uploader ====================================== */
function ReportUploader({campaign,me,onUploaded}){
  const[open,setOpen]=useState(false);
  const[metrics,setMetrics]=useState({opens:"",clicks:"",conversions:"",revenue:""});
  const[notes,setNotes]=useState("");
  const[file,setFile]=useState(null);
  const[busy,setBusy]=useState(false);
  const[err,setErr]=useState("");
  const[done,setDone]=useState(false);

  const mf=(k,v)=>setMetrics(m=>({...m,[k]:v}));

  const handleFile=(e)=>{
    const f=e.target.files[0];
    if(!f)return;
    if(f.size>5*1024*1024){setErr("File must be under 5MB");return;}
    const reader=new FileReader();
    reader.onload=(ev)=>setFile({name:f.name,type:f.type,data:ev.target.result.split(",")[1]});
    reader.readAsDataURL(f);
  };

  const submit=async()=>{
    setBusy(true);setErr("");
    try{
      const month=campaign.campaign_month||monthLabel(new Date().toISOString());
      await api.post("/api/reports",{
        campaign_id:campaign.id,
        report_month:month,
        file_name:file?.name||null,
        file_data:file?.data||null,
        file_type:file?.type||null,
        notes,
        metrics:{
          opens:metrics.opens?Number(metrics.opens):null,
          clicks:metrics.clicks?Number(metrics.clicks):null,
          conversions:metrics.conversions?Number(metrics.conversions):null,
          revenue:metrics.revenue?Number(metrics.revenue):null,
        },
      });
      setDone(true);if(onUploaded)onUploaded();
    }catch(e){setErr(e.message);}
    setBusy(false);
  };

  if(done)return<div style={{display:"flex",alignItems:"center",gap:7,color:C.teal,fontSize:13,fontWeight:600,padding:"8px 0"}}><CheckCircle2 size={15}/>Report uploaded — thanks!</div>;

  return<div style={{marginTop:10}}>
    {!open
      ?<button onClick={()=>setOpen(true)}style={{display:"flex",alignItems:"center",gap:6,background:C.tealSoft,border:`1px solid ${C.teal}22`,borderRadius:8,padding:"7px 12px",cursor:"pointer",color:C.teal,fontSize:13,fontWeight:600}}>
        <UploadIcon size={13}/>Upload performance report
      </button>
      :<div style={{background:C.tealSoft,borderRadius:12,padding:14,border:`1px solid ${C.teal}33`}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:12,color:C.teal,display:"flex",alignItems:"center",gap:7}}><UploadIcon size={15}/>Performance Report — {campaign.campaign_month||"this campaign"}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          {[["opens","Opens / Impressions"],["clicks","Clicks"],["conversions","Conversions"],["revenue","Revenue (₹)"]].map(([k,l])=>(
            <div key={k}>
              <div style={{fontSize:11.5,fontWeight:600,color:C.sub,marginBottom:3}}>{l}</div>
              <input value={metrics[k]}onChange={e=>mf(k,e.target.value)}type="number"placeholder="0"
                style={{width:"100%",border:`1px solid ${C.line}`,borderRadius:8,padding:"7px 10px",fontSize:13,boxSizing:"border-box"}}/>
            </div>
          ))}
        </div>
        <Field label="Notes / learnings"textarea value={notes}onChange={setNotes}placeholder="What worked? What didn't? Key takeaway for next time…"rows={2}/>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:11.5,fontWeight:600,color:C.sub,marginBottom:5}}>Attach report file (PDF, image, CSV — max 5MB)</div>
          <input type="file"accept=".pdf,.png,.jpg,.jpeg,.csv,.xlsx"onChange={handleFile}
            style={{fontSize:12.5,color:C.sub}}/>
          {file&&<div style={{fontSize:12,color:C.teal,marginTop:4}}>✓ {file.name} ready to upload</div>}
        </div>
        {err&&<div style={{color:C.coral,fontSize:13,marginBottom:8}}>{err}</div>}
        <div style={{display:"flex",gap:8}}>
          <Btn variant="teal"onClick={submit}disabled={busy}><UploadIcon size={13}/>{busy?"Uploading…":"Upload report"}</Btn>
          <Btn variant="ghost"onClick={()=>setOpen(false)}>Cancel</Btn>
        </div>
      </div>}
  </div>;
}


/* ===== Calendar View ==================================================== */
function CalendarView({campaigns,onOpen,filterStage}){
  const now=new Date();
  const[month,setMonth]=useState(now.getMonth());
  const[year,setYear]=useState(now.getFullYear());

  const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();

  // Group campaigns by created_at date
  const byDate={};
  campaigns.forEach(c=>{
    if(filterStage&&c.stage!==filterStage)return;
    const d=new Date(c.created_at||c.updatedAt||Date.now());
    if(d.getMonth()===month&&d.getFullYear()===year){
      const key=d.getDate();
      if(!byDate[key])byDate[key]=[];
      byDate[key].push(c);
    }
  });

  const stageCol={brief:C.coral,content:C.purple,design:C.teal,done:C.green};

  const prev=()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);};
  const next=()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);};

  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push(null);
  for(let i=1;i<=daysInMonth;i++)cells.push(i);
  while(cells.length%7!==0)cells.push(null);

  const isToday=(d)=>{
    const t=new Date();
    return d===t.getDate()&&month===t.getMonth()&&year===t.getFullYear();
  };

  return<div>
    {/* Month nav */}
    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
      <button onClick={prev}style={{border:`1px solid ${C.line}`,borderRadius:8,padding:"6px 12px",cursor:"pointer",background:"#fff",fontWeight:600}}>←</button>
      <span style={{fontWeight:700,fontSize:16,flex:1,textAlign:"center"}}>{MONTHS[month]} {year}</span>
      <button onClick={next}style={{border:`1px solid ${C.line}`,borderRadius:8,padding:"6px 12px",cursor:"pointer",background:"#fff",fontWeight:600}}>→</button>
    </div>
    {/* Day headers */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:2}}>
      {DAYS.map(d=><div key={d}style={{textAlign:"center",fontSize:11,fontWeight:700,color:C.sub,padding:"4px 0"}}>{d}</div>)}
    </div>
    {/* Calendar grid */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
      {cells.map((d,i)=>{
        const items=d?byDate[d]||[]:[];
        const today=d&&isToday(d);
        return<div key={i}style={{
          minHeight:72,border:`1px solid ${C.line}`,borderRadius:8,padding:4,
          background:today?"#FFF7F5":d?"#fff":"#f9f9f9",
          borderColor:today?C.coral:C.line,
        }}>
          {d&&<div style={{fontSize:11,fontWeight:today?800:500,color:today?C.coral:C.sub,marginBottom:3}}>{d}</div>}
          {items.slice(0,3).map((c,ci)=><div key={ci}
            onClick={()=>onOpen(c.id)}
            style={{
              fontSize:9.5,fontWeight:600,padding:"2px 4px",borderRadius:4,marginBottom:1,
              background:(stageCol[c.stage]||C.sub)+"18",color:stageCol[c.stage]||C.sub,
              cursor:"pointer",lineHeight:1.3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"
            }}
            title={c.product||c.name}
          >{c.product||parseName(c.name).product||"Asset"}</div>)}
          {items.length>3&&<div style={{fontSize:9,color:C.sub}}>+{items.length-3} more</div>}
        </div>;
      })}
    </div>
    <div style={{marginTop:10,fontSize:12,color:C.sub,display:"flex",gap:12,flexWrap:"wrap"}}>
      {Object.entries({brief:"Brief",content:"Copy",design:"Design",done:"Ready"}).map(([k,v])=>(
        <span key={k}style={{display:"flex",alignItems:"center",gap:4}}>
          <span style={{width:8,height:8,borderRadius:2,background:stageCol[k],display:"inline-block"}}/>
          {v}
        </span>
      ))}
      <span style={{color:C.sub}}>· Showing assets by date created</span>
    </div>
  </div>;
}
